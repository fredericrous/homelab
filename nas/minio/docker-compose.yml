version: '3.8'

services:
  minio:
    image: minio/minio:RELEASE.2024-08-29T01-40-52Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
      MINIO_BROWSER_REDIRECT_URL: http://192.168.1.42:9001
    volumes:
      - /VMs/minio/data:/data
      - /VMs/minio/config:/root/.minio
    command: server /data --console-address ":9001"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - minio-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  minio-net:
    driver: overlay
    attachable: true