kubeProxyReplacement: true
k8sServiceHost: 192.168.1.67
k8sServicePort: 6443

routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: 10.244.0.0/16  # adjust if your pod CIDR differs

ipam:
  mode: kubernetes

# Talos specifics (immutable host)
sysctl:
  enabled: false
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Talos CNI paths
cni:
  binPath: /opt/cni/bin
  confPath: /etc/cni/net.d
  exclusive: false  # Allow Cilium to write CNI config

# Capabilities recommended for Talos (no SYS_MODULE)
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

operator:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 50Mi
    limits:
      cpu: 200m
      memory: 200Mi

# Resource limits for cilium agent
resources:
  requests:
    cpu: 100m
    memory: 100Mi
  limits:
    cpu: 500m
    memory: 500Mi

# Allow scheduling on control-plane if tainted
tolerations:
  - key: "node.cilium.io/agent-not-ready"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node.kubernetes.io/not-ready"
    operator: "Exists"
    effect: "NoSchedule"

  # keep the usual ones as well:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node.kubernetes.io/not-ready"
    operator: "Exists"
    effect: "NoExecute"
    tolerationSeconds: 300
  - key: "node.kubernetes.io/unreachable"
    operator: "Exists"
    effect: "NoExecute"
    tolerationSeconds: 300
