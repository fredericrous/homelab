apiVersion: batch/v1
kind: Job
metadata:
  name: istio-tls-setup
  namespace: lldap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "3"
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: tls-setup
        image: bitnami/kubectl:1.28
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          echo "🔒 Setting up Istio TLS with client CA..."
          
          # Check if secret already exists
          if kubectl get secret lldap-tls-secret -n lldap >/dev/null 2>&1; then
            echo "✅ lldap-tls-secret already exists"
            exit 0
          fi
          
          # Wait for cert-manager certificate to be ready
          echo "⏳ Waiting for TLS certificate..."
          kubectl wait --for=condition=Ready certificate lldap-tls -n lldap --timeout=300s
          
          # Get TLS certificate and key
          TLS_CRT=$(kubectl get secret lldap-tls -n lldap -o jsonpath='{.data.tls\.crt}' | base64 -d)
          TLS_KEY=$(kubectl get secret lldap-tls -n lldap -o jsonpath='{.data.tls\.key}' | base64 -d)
          
          # Get client CA certificate
          CA_CRT=$(kubectl get secret client-ca-cert -n haproxy-ingress -o jsonpath='{.data.ca\.crt}' | base64 -d)
          
          # Create Istio TLS secret with client CA
          kubectl create secret generic lldap-tls-secret -n lldap \
            --from-literal=tls.crt="$TLS_CRT" \
            --from-literal=tls.key="$TLS_KEY" \
            --from-literal=ca.crt="$CA_CRT"
          
          # Label it for Istio
          kubectl label secret lldap-tls-secret -n lldap istio/tls-secret=true
          
          echo "✅ Istio TLS setup complete!"
      serviceAccountName: istio-tls-setup