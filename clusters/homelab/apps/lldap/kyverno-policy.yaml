apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: lldap-pod-security-exemption
  namespace: lldap
spec:
  validationFailureAction: audit
  background: false
  rules:
  - name: add-pod-security-exemption
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - lldap
          names:
          - "lldap-*"
    exclude:
      any:
      # Exclude vault setup jobs - they don't need init containers
      - resources:
          names:
          - "lldap-vault-setup-*"
    mutate:
      patchStrategicMerge:
        metadata:
          labels:
            pod-security.kubernetes.io/enforce-policy: "privileged"
          annotations:
            pod-security.kubernetes.io/exempt: "User"
            pod-security.kubernetes.io/exempt-reason: "LLDAP requires init container with elevated privileges for data directory setup"