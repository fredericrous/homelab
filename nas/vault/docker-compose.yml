version: '3.8'

services:
  vault:
    image: hashicorp/vault:1.17.6
    ports:
      - "8200:8200"
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
      VAULT_API_ADDR: http://0.0.0.0:8200
    volumes:
      - /VMs/vault:/vault/data
      - ./config:/vault/config
    command: vault server -config=/vault/config/vault.hcl
    cap_add:
      - IPC_LOCK
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - vault-net

networks:
  vault-net:
    driver: overlay
    attachable: true