# ApplicationSet for core platform components
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      repoURL: https://github.com/fredericrous/homelab
      revision: main
      files:
      - path: "manifests/core/**/app.yaml"

  template:
    metadata:
      name: '{{.name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{.project}}'
      source:
        repoURL: https://github.com/fredericrous/homelab.git
        targetRevision: main
        path: '{{.path.path}}'
        plugin:
          name: '{{.plugin | default ""}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace={{if .createNamespace}}{{.createNamespace}}{{else}}true{{end}}
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSyncOnly=true
        - ServerSideApply={{if .serverSideApply}}{{.serverSideApply}}{{else}}false{{end}}
        - Replace=true  # Needed for CRDs
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3

      # Standard ignore differences for common operators
      ignoreDifferences:
      # CloudNativePG
      - group: postgresql.cnpg.io
        kind: Cluster
        jsonPointers:
        - /spec/instances
        - /status
      # Cert-manager
      - group: cert-manager.io
        kind: Certificate
        jsonPointers:
        - /status
      # External Secrets Operator
      - group: external-secrets.io
        kind: ExternalSecret
        jsonPointers:
        - /status
        - /status/refreshTime
        - /status/syncedResourceVersion
      # Rook-Ceph
      - group: ceph.rook.io
        kind: CephCluster
        jsonPointers:
        - /status
      - group: ceph.rook.io
        kind: CephBlockPool
        jsonPointers:
        - /status
