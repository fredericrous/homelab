# ApplicationSet for Harbor with special patches
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: harbor
  namespace: argocd
spec:
  generators:
  - matrix:
      generators:
      - list:
          elements:
          - name: harbor
            project: apps
            namespace: harbor
            path: manifests/apps/harbor
            syncWave: "25"
      - git:
          repoURL: GITHUB_HOMELAB_VALUES_REPO_PLACEHOLDER
          revision: main
          files:
          - path: "global-config.yaml"
  
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/fredericrous/homelab.git
        targetRevision: main
        path: '{{path}}'
        kustomize:
          patches:
          # Harbor Ingress
          - target:
              kind: Ingress
              name: harbor
            patch: |
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: harbor
              spec:
                tls:
                - hosts:
                  - harbor.{{defaultExternalDomain}}
                rules:
                - host: harbor.{{defaultExternalDomain}}
          # Harbor IP pool
          - target:
              kind: IPAddressPool
              name: harbor-pool
            patch: |
              apiVersion: metallb.io/v1beta1
              kind: IPAddressPool
              metadata:
                name: harbor-pool
                namespace: metallb-system
              spec:
                addresses:
                - {{harborIP}}-192.168.1.91
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3