apiVersion: batch/v1
kind: Job
metadata:
  name: vault-populate-ovh-dns
  namespace: external-dns
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: default
      restartPolicy: OnFailure
      containers:
      - name: populate
        image: hashicorp/vault:1.18.0
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-admin-token
              key: token
        # External-DNS OVH credentials - these should be provided during deployment
        - name: EXTERNAL_DNS_OVH_APPLICATION_KEY
          value: "PLACEHOLDER_EXTERNAL_DNS_OVH_APPLICATION_KEY"
        - name: EXTERNAL_DNS_OVH_APPLICATION_SECRET
          value: "PLACEHOLDER_EXTERNAL_DNS_OVH_APPLICATION_SECRET"
        - name: EXTERNAL_DNS_OVH_CONSUMER_KEY
          value: "PLACEHOLDER_EXTERNAL_DNS_OVH_CONSUMER_KEY"
        command:
        - sh
        - -c
        - |
          set -e
          echo "Checking if OVH DNS credentials exist in Vault..."
          
          # Check if the secret exists
          if vault kv get secret/external-dns/ovh >/dev/null 2>&1; then
            echo "External-DNS OVH credentials already exist in Vault"
            exit 0
          fi
          
          echo "Creating OVH DNS credentials in Vault..."
          
          # Validate that placeholders have been replaced
          if [ "$EXTERNAL_DNS_OVH_APPLICATION_KEY" = "PLACEHOLDER_EXTERNAL_DNS_OVH_APPLICATION_KEY" ]; then
            echo "ERROR: External-DNS OVH credentials have not been configured!"
            echo "Please update the vault-populate-job.yaml with actual credentials"
            exit 1
          fi
          
          # Create the secret with correct key names for external-dns
          vault kv put secret/external-dns/ovh \
            applicationKey="$EXTERNAL_DNS_OVH_APPLICATION_KEY" \
            applicationSecret="$EXTERNAL_DNS_OVH_APPLICATION_SECRET" \
            consumerKey="$EXTERNAL_DNS_OVH_CONSUMER_KEY"
          
          echo "OVH DNS credentials created successfully"