apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plex

resources:
  # Include shared vault auth base
  - ../../base/vault-auth
  # Include job templates
  - ../../base/job-templates
  # App-specific resources
  - namespace.yaml
  # - vault-connection.yaml  # Now provided by base/vault-auth
  # - job-vault-configure-plex.yaml  # Replaced by job template
  # - vault-setup-job.yaml  # Replaced by job-vault-configure-plex.yaml
  # - plex-vault-auth.yaml  # Now provided by base/vault-auth
  - plex-vault-secret.yaml
  - pvc-config.yaml
  - pvc-nfs-media.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

patches:
  # Customize the vault auth from base
  - target:
      kind: VaultAuth
      name: vault-auth
    patch: |-
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultAuth
      metadata:
        name: plex-auth
        namespace: plex
      spec:
        kubernetes:
          role: plex
          serviceAccount: plex
  
  # Customize the RBAC for vault token reader
  - target:
      kind: RoleBinding
      name: PLACEHOLDER-vault-admin-token-reader
      namespace: vault
    patch: |-
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: plex-vault-admin-token-reader
        namespace: vault
      subjects:
      - kind: ServiceAccount
        name: vault-config
        namespace: plex
  
  # Add backup annotations
  - target:
      kind: Deployment
      name: plex
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plex
      spec:
        template:
          metadata:
            annotations:
              backup.velero.io/backup-volumes: plex-config
  
  # Patch vault configure job template
  - target:
      kind: Job
      name: vault-configure
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: vault-configure-plex
        namespace: plex
      spec:
        template:
          spec:
            containers:
            - name: vault-configure
              env:
              - name: VAULT_POLICY_NAME
                value: "plex"
              - name: VAULT_POLICY_CONTENT
                value: |
                  path "secret/data/plex" {
                    capabilities = ["read"]
                  }
                  path "secret/data/nfs" {
                    capabilities = ["read"]
                  }
              - name: VAULT_ROLE_NAME
                value: "plex"
              - name: VAULT_ROLE_SERVICE_ACCOUNTS
                value: "plex"
              - name: VAULT_ROLE_NAMESPACES
                value: "plex"