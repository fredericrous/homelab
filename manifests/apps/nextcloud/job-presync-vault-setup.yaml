apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-vault-setup
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  template:
    spec:
      serviceAccountName: vault-configurator
      restartPolicy: OnFailure
      containers:
      - name: vault-setup
        image: vault:1.13.3
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "🔐 Setting up Vault secrets for Nextcloud..."
          
          # Check if token file exists
          if [ ! -f /var/run/secrets/vault-token/token ]; then
            echo "⚠️  Vault admin token not found. Vault might not be initialized yet."
            echo "This is expected on fresh cluster deployment. Exiting gracefully."
            exit 0
          fi
          
          # Get Vault token from secret
          export VAULT_TOKEN=$(cat /var/run/secrets/vault-token/token)
          
          # Check if nextcloud secret exists
          if vault kv get -format=json secret/nextcloud >/dev/null 2>&1; then
            echo "✓ Nextcloud secrets already exist in Vault"
          else
            echo "Creating Nextcloud secrets in Vault..."
            ADMIN_PASSWORD=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9!@#$%^&*()_+' | fold -w 32 | head -n 1)
            DB_PASSWORD=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9!@#$%^&*()_+' | fold -w 32 | head -n 1)
            
            vault kv put secret/nextcloud \
              database-host="postgres-apps-rw.postgres.svc.cluster.local" \
              database-port="5432" \
              database-name="nextcloud" \
              database-user="nextcloud" \
              database-password="$DB_PASSWORD" \
              admin-username="admin" \
              admin-password="$ADMIN_PASSWORD" \
              trusted-domains="drive.daddyshome.fr,drive-mobile.daddyshome.fr" \
              redis-host="redis-standalone.ot-operators.svc.cluster.local" \
              redis-port="6379" \
              redis-password=""
            
            echo "✓ Created Nextcloud credentials"
            echo "Admin password: $ADMIN_PASSWORD"
          fi
          
          echo "✅ Vault setup complete"
        volumeMounts:
        - name: vault-token
          mountPath: /var/run/secrets/vault-token
      volumes:
      - name: vault-token
        secret:
          secretName: vault-admin-token
          defaultMode: 0400
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-configurator
  namespace: nextcloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-configurator
  namespace: vault
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nextcloud-vault-configurator
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-configurator
subjects:
- kind: ServiceAccount
  name: vault-configurator
  namespace: nextcloud