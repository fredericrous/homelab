# ApplicationSet for user applications
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  generators:
  # Single git generator for app configurations
  - git:
      repoURL: https://github.com/fredericrous/homelab.git
      revision: main
      files:
      - path: "manifests/apps/**/app.yaml"
  
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/fredericrous/homelab.git
        targetRevision: main
        path: '{{path}}'
        # Use Kustomize patches to substitute values from global-config.yaml
        kustomize:
          patches:
          # Common patch for all apps with Ingress
          - target:
              kind: Ingress
              name: '{{name}}'
            patch: |
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: '{{name}}'
              spec:
                tls:
                - hosts:
                  - '{{name}}.{{config.externalDomain}}'
                rules:
                - host: '{{name}}.{{config.externalDomain}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3