apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-registry-htpasswd
  namespace: harbor
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-registry-htpasswd
    template:
      type: Opaque
  data:
  - secretKey: REGISTRY_HTPASSWD
    remoteRef:
      key: secret/harbor/registry
      property: htpasswd