apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ztunnel
  namespace: istio-system
spec:
  interval: 30m
  dependsOn:
  - name: istio-base
  - name: istio-cni
  - name: istiod
  chart:
    spec:
      chart: ztunnel
      version: "1.23.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # ztunnel configuration for ambient mode
    env:
      # Enable ambient mode
      ISTIO_META_ENABLE_HBONE: "true"