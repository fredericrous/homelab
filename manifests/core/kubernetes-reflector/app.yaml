apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-reflector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/FredericRous/homelab.git
    targetRevision: main
    path: manifests/core/kubernetes-reflector
  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-reflector
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m