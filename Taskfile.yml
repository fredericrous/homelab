version: '3'

includes:
  nas:
    taskfile: ./nas/Taskfile.yml
    dir: ./nas

vars:
  TERRAFORM_DIR: './terraform'
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  TALOSCONFIG: '{{.ROOT_DIR}}/terraform/talosconfig'
  GLOBAL_CONFIG: '{{.ROOT_DIR}}/manifests/argocd/root/global-config.yaml'

env:
  KUBECONFIG: '{{.KUBECONFIG}}'
  SHELL: /bin/bash

tasks:
  default:
    desc: Run full deployment
    cmds:
      - task: deploy

  # Helper task to load environment from global-config.yaml
  load-env:
    desc: Load environment variables from global-config.yaml
    silent: true
    cmds:
      - |
        # Convert YAML to env vars and source them
        python3 scripts/yaml-to-env.py {{.GLOBAL_CONFIG}} > /tmp/global-config.env
        # Also preserve any local overrides from .env if it exists
        if [ -f .env ]; then
          grep -E '^(QNAP_VAULT_TOKEN|CERT_MANAGER_|EXTERNAL_DNS_)' .env >> /tmp/global-config.env || true
        fi

  deploy:
    desc: Deploy complete Kubernetes cluster
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    defer:
      - task: cleanup
    cmds:
      - task: prereq
      - task: stage1
      - task: stage2
      - task: stage3
      - task: stage4
      - task: stage5
      - task: stage6
      - task: stage7
      - task: stage8a
      - task: stage8b
      - task: stage8c
      - task: stage8-post
      - task: stage9
      - task: stage10
      - task: stage11

  prereq:
    desc: Pre-flight checks
    dir: '{{.TERRAFORM_DIR}}'
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    preconditions:
      - sh: test -f terraform.tfvars
      - msg: "terraform.tfvars not found. Copy terraform.tfvars.example and update with your values"
    cmds:
      - terraform init -upgrade

  stage1:
    desc: "Stage 1: Create VMs with Terraform"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - echo "Creating VMs..."
      - terraform apply -target=module.vms -auto-approve

  stage2:
    desc: "Stage 2: Wait for VMs and configure Talos"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - echo "Waiting for VMs to get IP addresses..."
      - sleep 30
      - terraform apply -auto-approve

  stage3:
    desc: "Stage 3: Bootstrap Talos cluster"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
      TALOSCONFIG: '{{.TALOSCONFIG}}'
    cmds:
      - echo "Bootstrapping Talos cluster..."
      - talosctl bootstrap -n $ARGO_CONTROL_PLANE_IP
      - echo "Waiting for cluster to be ready..."
      - sleep 60

  stage4:
    desc: "Stage 4: Get kubeconfig"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
      TALOSCONFIG: '{{.TALOSCONFIG}}'
    cmds:
      - talosctl kubeconfig -n $ARGO_CONTROL_PLANE_IP -f {{.KUBECONFIG}}
      - chmod 600 {{.KUBECONFIG}}
      - echo "Waiting for Kubernetes API..."
      - kubectl wait --for=condition=Ready nodes --all --timeout=300s

  stage5:
    desc: "Stage 5: Apply initial Cilium and MetalLB configs"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - echo "Applying core networking..."
      - kubectl kustomize manifests/core/cilium | kubectl apply -f -
      - sleep 30
      - kubectl wait --for=condition=Ready -n kube-system pods -l k8s-app=cilium --timeout=300s
      - kubectl kustomize manifests/core/metallb | kubectl apply -f -

  stage6:
    desc: "Stage 6: Deploy storage (local-path and optional rook)"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - echo "Installing storage providers..."
      - kubectl apply -k manifests/core/local-path-provisioner
      - kubectl wait --for=condition=Ready -n local-path-storage pods --all --timeout=300s
      # Optionally deploy rook-ceph if you have extra disks
      # - kubectl apply -k manifests/core/rook-ceph

  stage7:
    desc: "Stage 7: Deploy Vault"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - echo "Installing Vault..."
      - kubectl apply -k manifests/core/vault
      - kubectl wait --for=condition=Ready -n vault pods -l app.kubernetes.io/name=vault --timeout=300s || true
      - sleep 30
      # Auto-unseal will handle initialization

  stage8a:
    desc: "Stage 8a: Deploy cert-manager"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - kubectl apply -k manifests/core/cert-manager
      - kubectl wait --for=condition=Ready -n cert-manager pods --all --timeout=300s

  stage8b:
    desc: "Stage 8b: Deploy VSO"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - kubectl apply -k manifests/core/vault-secrets-operator
      - kubectl wait --for=condition=Ready -n vault-secrets-operator-system pods --all --timeout=300s || true

  stage8c:
    desc: "Stage 8c: Deploy External Secrets Operator"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - kubectl apply -k manifests/core/external-secrets-operator
      - kubectl wait --for=condition=Ready -n external-secrets-system deployment/external-secrets-operator --timeout=300s

  stage8-post:
    desc: "Post stage 8: Apply cluster secret stores"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - echo "Configuring cluster secret stores..."
      - kubectl apply -f manifests/core/external-secrets-operator/cluster-secret-store.yaml
      - kubectl wait --for=condition=Ready clustersecretstore vault-backend --timeout=60s || true

  stage9:
    desc: "Stage 9: Deploy ArgoCD"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - echo "Installing ArgoCD..."
      - ./deploy-argocd.sh

  stage10:
    desc: "Stage 10: Deploy remaining core services via ArgoCD"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - echo "Deploying remaining core services..."
      - kubectl apply -k manifests/argocd/root
      - sleep 30
      - kubectl wait --for=condition=Ready -n argocd applications --all --timeout=600s || true

  stage11:
    desc: "Stage 11: Deploy applications"
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    cmds:
      - echo "Applications will be automatically deployed by ArgoCD ApplicationSets"
      - kubectl get applications -n argocd

  cleanup:
    desc: Clean up temporary files
    cmds:
      - rm -f /tmp/global-config.env

  destroy:
    desc: Destroy the cluster
    dir: '{{.TERRAFORM_DIR}}'
    deps: [load-env]
    env:
      sh: cat /tmp/global-config.env 2>/dev/null || true
    prompt: This will destroy the entire cluster. Are you sure?
    cmds:
      - terraform destroy -auto-approve
      - rm -f {{.KUBECONFIG}} {{.TALOSCONFIG}}

  show-env:
    desc: Show environment variables from global-config.yaml
    deps: [load-env]
    cmds:
      - cat /tmp/global-config.env