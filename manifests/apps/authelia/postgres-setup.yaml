apiVersion: batch/v1
kind: Job
metadata:
  name: authelia-db-setup
  namespace: authelia
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: setup
        image: postgres:16
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-superuser-ref
              key: password
        - name: AUTHELIA_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: authelia-secrets
              key: STORAGE_PASSWORD
        command:
        - /bin/bash
        - -c
        - |
          # Wait for PostgreSQL to be ready
          until psql -h postgres-apps-rw.postgres.svc.cluster.local -U postgres -c "SELECT 1"; do
            echo "Waiting for PostgreSQL..."
            sleep 5
          done

          # Create database and user for Authelia
          psql -h postgres-apps-rw.postgres.svc.cluster.local -U postgres <<EOF
          CREATE DATABASE authelia;
          CREATE USER authelia WITH ENCRYPTED PASSWORD '$AUTHELIA_DB_PASSWORD';
          GRANT ALL PRIVILEGES ON DATABASE authelia TO authelia;
          \c authelia
          GRANT ALL ON SCHEMA public TO authelia;
          EOF

          echo "Authelia database setup complete!"
