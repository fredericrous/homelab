apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-ovh-webhook
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@daddyshome.fr
    privateKeySecretRef:
      name: letsencrypt-ovh-webhook-private-key
    solvers:
    - dns01:
        webhook:
          groupName: ovh.acme.cert-manager.io
          solverName: ovh
          config:
            endpoint: ovh-eu
            applicationKey: ${CERT_MANAGER_OVH_APPLICATION_KEY}
            applicationSecretRef:
              name: ovh-credentials
              key: applicationSecret
            consumerKey: ${CERT_MANAGER_OVH_CONSUMER_KEY}