apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plex

resources:
  - namespace.yaml
  - service-account.yaml
  - external-secret.yaml
  - certificate.yaml
  - pvc-config.yaml
  - pvc-nfs-media.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

patches:
  # Add backup annotations
  - target:
      kind: Deployment
      name: plex
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plex
      spec:
        template:
          metadata:
            annotations:
              backup.velero.io/backup-volumes: plex-config
  # Enable GPU support - uncomment when GPU node is fixed
  # - path: patch-gpu-resources.yaml
  #   target:
  #     kind: Deployment
  #     name: plex