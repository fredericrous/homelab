apiVersion: batch/v1
kind: Job
metadata:
  name: pki-setup
  namespace: haproxy-ingress
spec:
  template:
    spec:
      serviceAccountName: default
      containers:
      - name: pki-setup
        image: hashicorp/vault:1.17
        command:
        - sh
        - -c
        - |
          set -e
          echo "🔐 Setting up PKI certificates in Vault..."
          
          # Configure vault client
          export VAULT_ADDR=http://vault-vault.vault.svc.cluster.local:8200
          export VAULT_TOKEN=${token}
          
          # Wait for Vault to be available
          until vault status > /dev/null 2>&1; do
            echo "⏳ Waiting for Vault to be available..."
            sleep 5
          done
          
          # Check if PKI CA already exists
          if vault kv get secret/pki/ca > /dev/null 2>&1; then
            echo "✅ PKI CA already exists in Vault"
            exit 0
          fi
          
          echo "🔧 Generating self-signed CA certificate for client authentication..."
          
          # Generate CA private key
          openssl genrsa -out ca.key 4096
          
          # Generate CA certificate
          openssl req -new -x509 -days 3650 -key ca.key -out ca.crt \
            -subj "/C=FR/ST=France/L=Lyon/O=DaddysHome/OU=Homelab/CN=DaddysHome Client CA"
          
          # Store in Vault
          echo "📤 Storing PKI CA in Vault..."
          vault kv put secret/pki/ca \
            certificate="$(cat ca.crt)" \
            private_key="$(cat ca.key)"
          
          echo "✅ PKI CA certificates stored successfully in Vault"
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault