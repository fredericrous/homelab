apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
spec:
  template:
    spec:
      serviceAccountName: vault
      containers:
      - name: vault-init
        image: hashicorp/vault:1.18.2
        command:
        - sh
        - -c
        - |
          set -e
          echo "Waiting for Vault to be ready..."
          until vault status 2>/dev/null; do
            echo "Vault not ready yet..."
            sleep 5
          done
          
          # Check if already initialized
          if vault status | grep -q "Initialized.*false"; then
            echo "Initializing Vault..."
            vault operator init -key-shares=1 -key-threshold=1 -format=json > /tmp/init.json
            
            # Store the keys in Kubernetes secrets
            UNSEAL_KEY=$(cat /tmp/init.json | jq -r '.unseal_keys_b64[0]')
            ROOT_TOKEN=$(cat /tmp/init.json | jq -r '.root_token')
            
            kubectl create secret generic vault-keys \
              --from-literal=unseal-key=$UNSEAL_KEY \
              --namespace=vault --dry-run=client -o yaml | kubectl apply -f -
              
            kubectl create secret generic vault-admin-token \
              --from-literal=token=$ROOT_TOKEN \
              --namespace=vault --dry-run=client -o yaml | kubectl apply -f -
              
            echo "Vault initialized successfully!"
            
            # Unseal vault
            echo "Unsealing Vault..."
            vault operator unseal $UNSEAL_KEY
          else
            echo "Vault already initialized"
          fi
        env:
        - name: VAULT_ADDR
          value: http://vault:8200
        - name: SKIP_CHOWN
          value: "true"
      restartPolicy: OnFailure