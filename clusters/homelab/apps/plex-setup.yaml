apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex-setup
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: ./charts/app-setup
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: flux-system
  dependsOn:
    - name: vault-transit-config
      namespace: flux-system
    - name: external-secrets-config
      namespace: flux-system
  values:
    appName: plex
    vault:
      secrets:
        - path: plex/config
          data:
            claim: "claim-ABC123REPLACEME"
            timezone: "Europe/Paris"