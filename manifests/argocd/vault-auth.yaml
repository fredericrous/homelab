apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: argocd-auth
  namespace: argocd
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: argocd
    serviceAccount: default
    audiences:
      - vault
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: argocd
spec:
  address: http://vault.vault.svc.cluster.local:8200
  skipTLSVerify: true