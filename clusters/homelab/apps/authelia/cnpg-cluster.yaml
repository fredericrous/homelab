apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authelia-postgres
  namespace: authelia
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  
  bootstrap:
    initdb:
      database: authelia
      owner: authelia
      secret:
        name: authelia-db-app
      encoding: UTF8
      localeCollate: en_US.utf8
      localeCType: en_US.utf8
  
  storage:
    size: 1Gi
    storageClass: rook-ceph-block
  
  monitoring:
    enabled: false
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"