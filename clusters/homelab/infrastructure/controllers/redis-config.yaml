apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: redis-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/homelab/infrastructure/configs/redis
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  dependsOn:
    - name: redis-operator
      namespace: flux-system