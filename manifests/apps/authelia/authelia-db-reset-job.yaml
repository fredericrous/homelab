apiVersion: batch/v1
kind: Job
metadata:
  name: authelia-db-reset
  namespace: authelia
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: psql
        image: ghcr.io/cloudnative-pg/postgresql:16.6
        command:
        - sh
        - -c
        - |
          set -e
          echo "Resetting authelia database..."
          
          # Use peer authentication by connecting through Unix socket
          psql -U postgres -d postgres <<EOF
          DROP DATABASE IF EXISTS authelia;
          CREATE DATABASE authelia OWNER authelia;
          GRANT ALL PRIVILEGES ON DATABASE authelia TO authelia;
          \c authelia
          GRANT ALL ON SCHEMA public TO authelia;
          EOF
          
          echo "Database reset completed!"
        volumeMounts:
        - name: postgres-socket
          mountPath: /var/run/postgresql
      volumes:
      - name: postgres-socket
        emptyDir: {}