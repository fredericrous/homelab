# LLDAP secrets from Vault using External Secrets Operator
# Plugin hint: ${ARGO_PLUGIN_HINT:-ensure-file-copied}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lldap-secrets
  namespace: lldap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  refreshInterval: 5m
  
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: lldap-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  
  # Fetch individual keys and map them to expected file names
  data:
  - secretKey: database-url
    remoteRef:
      key: secret/data/lldap
      property: LLDAP_DATABASE_URL
  - secretKey: jwt-secret
    remoteRef:
      key: secret/data/lldap
      property: LLDAP_JWT_SECRET
  - secretKey: ldap-user-pass
    remoteRef:
      key: secret/data/lldap
      property: LLDAP_LDAP_USER_PASS
  - secretKey: key-seed
    remoteRef:
      key: secret/data/lldap
      property: LLDAP_JWT_SECRET  # Use JWT secret as key seed
  - secretKey: user-pass
    remoteRef:
      key: secret/data/lldap
      property: LLDAP_USER_PASS  # Admin web UI password