# Cilium day-0 on Talos (Services via kube-proxy, datapath via eBPF)

kubeProxyReplacement: false   # IMPORTANT - let kube-proxy handle services
tunnelProtocol: "vxlan"            # reliable in virtualized L2
routingMode: "tunnel"

ipam:
  mode: "kubernetes"

# Talos KubePrism configuration
k8sServiceHost: localhost
k8sServicePort: 7445

# Talos specifics (immutable host)
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: "/sys/fs/cgroup"

# Talos CNI paths
cni:
  binPath: /opt/cni/bin
  confPath: /etc/cni/net.d

# Host features
enableHostPort: true
hostServices:
  enabled: true
enableHostFirewall: false
enableL7Proxy: false

# Hubble (optional but handy)
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: false

# Resources
operator:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 50Mi

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Tolerations for control plane
tolerations:
  - operator: "Exists"