# Recovery job to generate a new root token for already-initialized Vault
# This should only be used when the original root token is lost
# Requires manual execution: kubectl create job --from=job/vault-recover-root-token vault-recover-root-token-manual
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-recover-root-token
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: Skip  # Don't run automatically
    argocd.argoproj.io/sync-options: Prune=false  # Don't delete this job
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
      - name: recover-token
        image: hashicorp/vault:1.20.1
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          echo "🔐 Vault Root Token Recovery"
          echo "============================"
          echo ""
          echo "⚠️  WARNING: This will generate a new root token."
          echo "    Only use this if the original root token is lost!"
          echo ""
          
          export VAULT_ADDR=http://vault:8200
          
          # Check if admin token already exists
          if kubectl get secret vault-admin-token -n vault &>/dev/null; then
              echo "❌ Admin token secret already exists!"
              echo "    If you need to regenerate, delete it first:"
              echo "    kubectl delete secret vault-admin-token -n vault"
              exit 1
          fi
          
          # Wait for Vault to be unsealed
          echo "⏳ Checking Vault status..."
          if ! vault status 2>/dev/null | grep -q "Sealed.*false"; then
              echo "❌ Vault is sealed. With transit unseal, it should auto-unseal."
              exit 1
          fi
          
          echo "✅ Vault is unsealed"
          
          # With transit unseal, we need to use recovery keys to generate a new root token
          # However, if we're using transit unseal without recovery keys, we need another approach
          
          echo ""
          echo "📝 Generating new root token..."
          echo ""
          echo "With transit unseal, root token generation requires one of:"
          echo "1. Recovery keys (if configured during init)"
          echo "2. An existing token with sufficient privileges"
          echo "3. Re-initialization (data loss!)"
          echo ""
          
          # Check if we have recovery keys
          if kubectl get secret vault-recovery-keys -n vault &>/dev/null; then
              echo "📂 Found recovery keys secret"
              RECOVERY_KEY=$(kubectl get secret vault-recovery-keys -n vault -o jsonpath='{.data.recovery-key}' | base64 -d)
              
              # Start root token generation
              echo "🎲 Starting root token generation..."
              
              # Generate OTP
              OTP=$(vault operator generate-root -init -format=json | jq -r '.otp')
              NONCE=$(vault operator generate-root -init -format=json | jq -r '.nonce')
              
              # Provide recovery key
              ENCODED_TOKEN=$(echo -n "$RECOVERY_KEY" | vault operator generate-root -nonce="$NONCE" -format=json - | jq -r '.encoded_root_token')
              
              # Decode the token
              ROOT_TOKEN=$(vault operator generate-root -decode="$ENCODED_TOKEN" -otp="$OTP")
              
              # Store in secret
              kubectl create secret generic vault-admin-token \
                  --namespace=vault \
                  --from-literal=token="$ROOT_TOKEN" \
                  --dry-run=client -o yaml | kubectl apply -f -
              
              echo "✅ New root token generated and stored in vault-admin-token secret"
          else
              echo "❌ No recovery keys found"
              echo ""
              echo "Manual recovery required:"
              echo ""
              echo "Option 1: If you have ANY existing Vault token:"
              echo "  1. kubectl exec -it -n vault vault-0 -- sh"
              echo "  2. export VAULT_TOKEN=<your-token>"
              echo "  3. vault token create -policy=root -format=json"
              echo ""
              echo "Option 2: If Vault was initialized without recovery keys:"
              echo "  You may need to re-initialize Vault (WARNING: Data loss!)"
              echo ""
              echo "Option 3: Check if the init job saved the token somewhere:"
              echo "  - Check logs: kubectl logs -n vault job/vault-init"
              echo "  - Check persistent storage"
              exit 1
          fi
        env:
        - name: VAULT_SKIP_VERIFY
          value: "true"