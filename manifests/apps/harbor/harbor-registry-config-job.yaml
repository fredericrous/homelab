apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-registry-config-script
  namespace: harbor
data:
  configure.sh: |
    #!/bin/sh
    set -e
    
    echo "Starting Harbor registry configuration..."
    
    # Install kubectl if not present
    if ! command -v kubectl &> /dev/null; then
      echo "Installing kubectl..."
      apk add --no-cache curl
      curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      chmod +x kubectl
      mv kubectl /usr/local/bin/
    fi
    
    # Wait for necessary secrets to be available
    echo "Waiting for registry secret..."
    until kubectl get secret harbor-registry-secret -n harbor >/dev/null 2>&1; do
      echo -n "."
      sleep 2
    done
    echo " Found!"
    
    # Wait for Harbor to generate its CA (when using certSource: auto)
    echo "Waiting for Harbor CA certificate..."
    until kubectl get secret harbor-ca -n harbor >/dev/null 2>&1 || \
          kubectl get secret harbor-core-internal-tls -n harbor >/dev/null 2>&1; do
      echo -n "."
      sleep 5
    done
    echo " Found!"
    
    # Get registry credentials from secret (synced from Vault)
    USERNAME=$(kubectl get secret harbor-registry-secret -n harbor -o jsonpath='{.data.username}' | base64 -d)
    PASSWORD=$(kubectl get secret harbor-registry-secret -n harbor -o jsonpath='{.data.password}' | base64 -d)
    
    # Extract CA certificate from Harbor's auto-generated certs
    # When certSource is auto, Harbor creates internal certs but we need to extract the CA
    if kubectl get secret harbor-ca -n harbor >/dev/null 2>&1; then
      echo "Using harbor-ca secret for CA certificate"
      CA_CERT=$(kubectl get secret harbor-ca -n harbor -o jsonpath='{.data.ca\.crt}' | base64 -d)
    else
      echo "Extracting CA from Harbor's auto-generated certificate..."
      # Get the registry certificate and extract the CA from it
      CERT=$(kubectl get secret harbor-registry-internal-tls -n harbor -o jsonpath='{.data.tls\.crt}' 2>/dev/null | base64 -d)
      if [ -z "$CERT" ]; then
        CERT=$(kubectl get secret harbor-core-internal-tls -n harbor -o jsonpath='{.data.tls\.crt}' | base64 -d)
      fi
      # Extract the last certificate in the chain (should be the CA)
      CA_CERT=$(echo "$CERT" | awk '/-----BEGIN CERTIFICATE-----/{cert=""} {cert=cert $0 "\n"} /-----END CERTIFICATE-----/{ca=cert}END{print ca}')
    fi
    
    # Save CA cert to file for copying
    echo "$CA_CERT" > /tmp/ca.crt
    
    # Create containerd registry config for each host
    for HOST in "harbor-registry.harbor.svc.cluster.local:5443" "192.168.1.90:5443" "registry.daddyshome.fr"; do
      mkdir -p "/host/etc/containerd/certs.d/${HOST}"
      
      # Write hosts.toml for each registry
      cat > "/host/etc/containerd/certs.d/${HOST}/hosts.toml" <<EOF
    server = "https://192.168.1.90:5443"
    
    [host."https://192.168.1.90:5443"]
      ca = "/etc/containerd/certs.d/${HOST}/ca.crt"
      skip_verify = false
      [host."https://192.168.1.90:5443".header]
        authorization = ["Basic $(echo -n ${USERNAME}:${PASSWORD} | base64)"]
    EOF
      
      # Copy CA certificate
      cp /tmp/ca.crt "/host/etc/containerd/certs.d/${HOST}/ca.crt"
    done
    
    # Reload containerd configuration
    echo "Reloading containerd configuration..."
    nsenter --target 1 --mount --uts --ipc --net --pid -- systemctl reload containerd || \
    nsenter --target 1 --mount --uts --ipc --net --pid -- systemctl restart containerd
    
    echo "Registry configuration applied successfully!"
    sleep 30  # Give time for the configuration to propagate
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: harbor-registry-config
  namespace: harbor
spec:
  selector:
    matchLabels:
      app: harbor-registry-config
  template:
    metadata:
      labels:
        app: harbor-registry-config
    spec:
      serviceAccountName: harbor-registry-config
      hostPID: true
      hostNetwork: true
      initContainers:
      - name: configure-registry
        image: docker.io/library/alpine:3.19
        securityContext:
          privileged: true
        command: ["/bin/sh"]
        args: ["/scripts/configure.sh"]
        env:
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: host-etc
          mountPath: /host/etc
          mountPropagation: Bidirectional
      containers:
      - name: pause
        image: gcr.io/google_containers/pause:3.5
      volumes:
      - name: scripts
        configMap:
          name: harbor-registry-config-script
          defaultMode: 0755
      - name: host-etc
        hostPath:
          path: /etc
          type: Directory
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-registry-config
  namespace: harbor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harbor-registry-config
  namespace: harbor
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["create", "get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harbor-registry-config
  namespace: harbor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: harbor-registry-config
subjects:
- kind: ServiceAccount
  name: harbor-registry-config
  namespace: harbor