apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-secret-sync
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-writer
  namespace: default
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-secret-sync-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: vault-secret-sync
  namespace: default
roleRef:
  kind: Role
  name: secret-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-sync-smb-secret
  namespace: default
spec:
  template:
    metadata:
      name: vault-sync-smb-secret
    spec:
      serviceAccountName: vault-secret-sync
      restartPolicy: OnFailure
      containers:
      - name: sync
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          # Get the secret from Vault
          VAULT_ADDR=http://vault.vault.svc.cluster.local:8200
          VAULT_TOKEN=$(cat /var/run/secrets/vault-token/token)  # Should be mounted from vault-admin-token secret
          
          # Fetch credentials from Vault
          RESPONSE=$(curl -s -H "X-Vault-Token: $VAULT_TOKEN" $VAULT_ADDR/v1/secret/data/smb)
          USERNAME=$(echo $RESPONSE | sed -n 's/.*"username":"\([^"]*\)".*/\1/p')
          PASSWORD=$(echo $RESPONSE | sed -n 's/.*"password":"\([^"]*\)".*/\1/p')
          
          # Create or update the Kubernetes secret
          kubectl create secret generic smbcreds \
            --from-literal=username="$USERNAME" \
            --from-literal=password="$PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "Secret synced successfully"