image:
  repository: velero/velero
  tag: v1.16.2
  pullPolicy: IfNotPresent

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.9.0
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: homelab-backups-rook
      config:
        region: eu-west-1
        s3ForcePathStyle: "false"
      credential:
        name: velero-credentials
        key: cloud
  volumeSnapshotLocation:
    - name: rook-ceph
      provider: csi
      config: {}
  # Configure restic for file system backups
  resticTimeout: 6h

snapshotsEnabled: true
features: 
  - EnableCSI

schedules:
  harbor-smb-backup:
    schedule: "0 2 */2 * *"  # Every 2 days at 2 AM
    template:
      ttl: 360h  # 15 days (will maintain 15 backups max with 2-day interval)
      includedNamespaces:
        - harbor
      defaultVolumesToFsBackup: true
      volumeSnapshotLocations:
        - rook-ceph
  
  # AWS Glacier backup schedule (every 25 days)
  harbor-aws-backup:
    schedule: "0 3 */25 * *"  # Every 25 days at 3 AM
    template:
      ttl: 87600h  # 10 years (effectively forever)
      includedNamespaces:
        - harbor
      storageLocation: default
      volumeSnapshotLocations:
        - rook-ceph
  nextcloud-smb-backup:
    schedule: "0 2 */2 * *"  # Every 2 days at 2 AM
    template:
      ttl: 87600h  # 10 years (effectively forever)
      includedNamespaces:
        - nextcloud
      # Using file system backup via restic
      volumeSnapshotLocations:
        - rook-ceph
  
  # AWS Glacier backup schedule (every 25 days)
  nextcloud-aws-backup:
    schedule: "0 3 */25 * *"  # Every 25 days at 3 AM
