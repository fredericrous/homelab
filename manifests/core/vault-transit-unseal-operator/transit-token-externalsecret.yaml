# ExternalSecret for Vault Transit Token
# This pulls the transit token from a secure location
# NOTE: Requires External Secrets Operator to be installed
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-transit-token
  namespace: vault
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-transit-token
    creationPolicy: Owner
  data:
  - secretKey: token
    remoteRef:
      key: secret/infrastructure/qnap-vault
      property: transit_token