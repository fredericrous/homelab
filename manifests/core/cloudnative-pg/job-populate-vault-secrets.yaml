apiVersion: batch/v1
kind: Job
metadata:
  name: cloudnative-pg-populate-secrets
  namespace: postgres
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
      - name: populate-secrets
        image: hashicorp/vault:1.20.1
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "🔐 Populating CloudNativePG secrets in Vault..."
          
          # Vault address from main cluster Vault
          export VAULT_ADDR=http://vault.vault.svc.cluster.local:8200
          
          # Get admin token from reflected secret
          export VAULT_TOKEN=$(cat /vault-admin-token/token)
          
          # Function to check if secret exists
          secret_exists() {
            vault kv get "$1" >/dev/null 2>&1
          }
          
          # Create postgres superuser secret if it doesn't exist
          if ! secret_exists "secret/postgres/superuser"; then
            echo "📝 Creating postgres superuser secret..."
            POSTGRES_PASSWORD=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 32 | head -n 1)
            vault kv put secret/postgres/superuser \
              username="postgres" \
              password="$POSTGRES_PASSWORD"
            echo "✅ Postgres superuser secret created"
          else
            echo "✅ Postgres superuser secret already exists"
          fi
          
          # Create nextcloud database credentials if they don't exist
          if ! secret_exists "secret/nextcloud"; then
            echo "📝 Creating nextcloud database secret..."
            NEXTCLOUD_DB_PASSWORD=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 32 | head -n 1)
            NEXTCLOUD_ADMIN_PASSWORD=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 16 | head -n 1)
            
            vault kv put secret/nextcloud \
              "database-host"="postgres-apps-rw.postgres.svc.cluster.local" \
              "database-port"="5432" \
              "database-name"="nextcloud" \
              "database-user"="nextcloud" \
              "database-password"="$NEXTCLOUD_DB_PASSWORD" \
              "admin-username"="admin" \
              "admin-password"="$NEXTCLOUD_ADMIN_PASSWORD" \
              "trusted-domains"="drive.daddyshome.fr,drive-mobile.daddyshome.fr" \
              "redis-host"="nextcloud-redis" \
              "redis-port"="6379" \
              "redis-password"=""
            echo "✅ Nextcloud secrets created"
          else
            echo "✅ Nextcloud secrets already exist"
          fi
          
          # Create other app database credentials as needed
          # Add more apps here following the same pattern
          
          echo "✅ All secrets populated successfully"
        volumeMounts:
        - name: vault-admin-token
          mountPath: /vault-admin-token
          readOnly: true
      volumes:
      - name: vault-admin-token
        secret:
          secretName: vault-admin-token  # Reflected from vault namespace by Reflector
