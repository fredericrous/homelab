apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
    - PLACEHOLDER_METALLB_POOL
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: allow-all
  namespace: metallb-system
spec:
  ipAddressPools:
    - default-pool