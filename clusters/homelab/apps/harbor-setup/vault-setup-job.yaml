apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-vault-setup
  namespace: vault
spec:
  template:
    metadata:
      name: harbor-vault-setup
    spec:
      serviceAccountName: vault-admin
      containers:
      - name: vault-setup
        image: vault:1.14.0
        env:
        - name: VAULT_ADDR
          value: http://vault.vault.svc.cluster.local:8200
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-admin-token
              key: token
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Function to check if secret exists
          check_secret_exists() {
            vault kv get -mount=secret "$1" >/dev/null 2>&1
          }
          
          # Generate secure password
          generate_password() {
            openssl rand -base64 24 | tr -d "=+/" | cut -c1-24
          }
          
          # Create Harbor admin secret if it doesn't exist
          if ! check_secret_exists "harbor/admin"; then
            echo "Creating Harbor admin secret..."
            ADMIN_PASSWORD=$(generate_password)
            vault kv put -mount=secret harbor/admin \
              username="admin" \
              password="$ADMIN_PASSWORD"
          else
            echo "Harbor admin secret already exists"
          fi
          
          # Create Harbor database secrets if they don't exist
          if ! check_secret_exists "harbor/database"; then
            echo "Creating Harbor database secret..."
            DB_PASSWORD=$(generate_password)
            vault kv put -mount=secret harbor/database \
              password="$DB_PASSWORD"
          else
            echo "Harbor database secret already exists"
          fi
          
          # Create Harbor registry secret if it doesn't exist
          if ! check_secret_exists "harbor/registry"; then
            echo "Creating Harbor registry secret..."
            REGISTRY_PASSWORD=$(generate_password)
            vault kv put -mount=secret harbor/registry \
              username="_registry_user" \
              password="$REGISTRY_PASSWORD"
          else
            echo "Harbor registry secret already exists"
          fi
          
          # Create Harbor registry user secret if it doesn't exist
          if ! check_secret_exists "harbor/registry-user"; then
            echo "Creating Harbor registry user secret..."
            USER_PASSWORD=$(generate_password)
            vault kv put -mount=secret harbor/registry-user \
              username="stremio" \
              password="$USER_PASSWORD"
          else
            echo "Harbor registry user secret already exists"
          fi
          
          # Create Harbor registry htpasswd if it doesn't exist
          if ! check_secret_exists "harbor/registry-htpasswd"; then
            echo "Creating Harbor registry htpasswd secret..."
            # This will be populated by a separate job after Harbor is running
            vault kv put -mount=secret harbor/registry-htpasswd \
              htpasswd=""
          else
            echo "Harbor registry htpasswd secret already exists"
          fi
          
          # Create OVH credentials for cert-manager if they don't exist
          if ! check_secret_exists "ovh/harbor"; then
            echo "Creating OVH credentials secret..."
            vault kv put -mount=secret ovh/harbor \
              endpoint="ovh-eu" \
              applicationKey="REPLACE_WITH_KEY" \
              applicationSecret="REPLACE_WITH_SECRET" \
              consumerKey="REPLACE_WITH_CONSUMER_KEY"
            echo "WARNING: OVH credentials need to be updated with real values"
          else
            echo "OVH credentials secret already exists"
          fi
          
          echo "Harbor vault setup completed!"
      restartPolicy: OnFailure
  backoffLimit: 3