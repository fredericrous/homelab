apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argo-workflows

resources:
  - namespace.yaml
  - workflow-controller-vault-rbac.yaml

patches:
- target:
    kind: Role
    name: argo-workflows-workflow-controller
    namespace: argo-workflows
  path: workflow-controller-role-patch.yaml

patchesStrategicMerge:
- workflow-controller-cluster-role.yaml

helmCharts:
- name: argo-workflows
  repo: https://argoproj.github.io/argo-helm
  version: 0.45.2
  releaseName: argo-workflows
  namespace: argo-workflows
  includeCrds: true
  valuesInline:
    # CRDs installation
    crds:
      install: true
      keep: true
    
    # Multi-namespace mode to watch vault namespace too
    singleNamespace: false
    
    # Namespaces to watch (in addition to controller namespace)
    workflowNamespaces:
      - vault
    
    # Controller configuration
    controller:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # Server configuration (UI)
    server:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      extraArgs:
        - --auth-mode=server
      # Ingress will be configured later
      ingress:
        enabled: false

    # Executor configuration
    executor:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # Disable persistence for now (requires PostgreSQL)
    persistence:
      archive: false
    
    # Configure artifact repository (disabled for now)
    artifactRepository: {}