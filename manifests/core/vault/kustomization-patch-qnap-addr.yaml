# Example patch file for changing QNAP vault address
# To use: Add this to patchesStrategicMerge in kustomization.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: qnap-vault-config
  namespace: vault
data:
  config.yaml: |
    transit:
      address: "http://YOUR-QNAP-IP:61200"
      mountPath: "transit"
      keyName: "autounseal"
      tlsSkipVerify: true