apiVersion: v1
kind: Service
metadata:
  name: haproxy-ingress-haproxy-ingress
  namespace: haproxy-ingress
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 80
    nodePort: 30080
  - name: https
    port: 443
    protocol: TCP
    targetPort: 443
    nodePort: 30443
  selector:
    app.kubernetes.io/name: haproxy-ingress