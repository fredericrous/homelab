{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app-setup.fullname" . }}-postgres-script
  labels:
    {{- include "app-setup.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-setup
data:
  create-db.sh: |
    #!/bin/sh
    set -e
    
    echo "🗄️  Setting up PostgreSQL database for {{ .Values.appName }}..."
    
    # Read credentials that were fetched by init container
    if [ -f /vault-data/db-creds.env ]; then
      . /vault-data/db-creds.env
      echo "Using credentials for user: $DB_USER"
    else
      echo "ERROR: No credentials file found from Vault init container"
      exit 1
    fi
    
    # Wait for PostgreSQL to be ready
    until pg_isready -h "$PGHOST" -p 5432; do
      echo "Waiting for PostgreSQL to be ready..."
      sleep 5
    done
    
    # Check if database exists
    if psql -lqt | cut -d \| -f 1 | grep -qw "{{ include "app-setup.databaseName" . }}"; then
      echo "✅ Database {{ include "app-setup.databaseName" . }} already exists"
      # Update user password if user exists
      if psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1; then
        echo "Updating password for existing user $DB_USER..."
        psql -c "ALTER USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
      fi
    else
      echo "Creating database {{ include "app-setup.databaseName" . }}..."
      # Check if user already exists
      if ! psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='$DB_USER'" | grep -q 1; then
        echo "Creating user $DB_USER..."
        psql -c "CREATE USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
      else
        echo "User $DB_USER already exists, updating password..."
        psql -c "ALTER USER \"$DB_USER\" WITH PASSWORD '$DB_PASS';"
      fi
      psql -c "CREATE DATABASE \"{{ include "app-setup.databaseName" . }}\" OWNER \"$DB_USER\";"
      psql -c "GRANT ALL PRIVILEGES ON DATABASE \"{{ include "app-setup.databaseName" . }}\" TO \"$DB_USER\";"
      echo "✅ Database {{ include "app-setup.databaseName" . }} created"
    fi
{{- end }}