# ApplicationSet for core platform components
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/fredericrous/homelab.git
      revision: main
      files:
      - path: "manifests/core/**/app.yaml"
  
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/fredericrous/homelab.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSyncOnly=true
        - ServerSideApply=true
        - Replace=true  # Needed for CRDs
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3
      
      # Standard ignore differences for common operators
      ignoreDifferences:
      # CloudNativePG
      - group: postgresql.cnpg.io
        kind: Cluster
        jsonPointers:
        - /spec/instances
        - /status
      # Cert-manager
      - group: cert-manager.io
        kind: Certificate
        jsonPointers:
        - /status
      # Vault Secrets Operator
      - group: secrets.hashicorp.com
        kind: VaultStaticSecret
        jsonPointers:
        - /status
      # Rook-Ceph
      - group: ceph.rook.io
        kind: CephCluster
        jsonPointers:
        - /status
      - group: ceph.rook.io
        kind: CephBlockPool
        jsonPointers:
        - /status