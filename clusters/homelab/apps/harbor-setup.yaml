apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: harbor-setup
  namespace: flux-system
spec:
  interval: 10m
  timeout: 10m
  path: ./clusters/homelab/apps/harbor-setup
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: external-secrets-config
      namespace: flux-system
    - name: postgres-setup
      namespace: flux-system