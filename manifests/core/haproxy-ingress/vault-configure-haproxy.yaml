apiVersion: batch/v1
kind: Job
metadata:
  name: vault-configure-haproxy
  namespace: haproxy-controller
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: vault-config
      containers:
      - name: configure
        image: hashicorp/vault:1.20.1
        command:
        - sh
        - -c
        - |
          set -e
          export VAULT_ADDR=http://vault.vault.svc.cluster.local:8200
          
          # Get admin token from secret
          export VAULT_TOKEN=$(cat /vault-admin-token/token)
          
          # Check if CA cert already exists in Vault
          if vault kv get secret/client-ca >/dev/null 2>&1; then
            echo "✓ Client CA already exists in Vault"
          else
            echo "! Client CA not found in Vault. Please upload it manually:"
            echo "  kubectl exec -it vault-0 -n vault -- vault kv put secret/client-ca ca.crt=@/path/to/ca.crt ca.key=@/path/to/ca.key"
            exit 1
          fi
          
          # Create policy for HAProxy ingress
          cat <<EOF | vault policy write haproxy-ingress -
          path "secret/data/client-ca" {
            capabilities = ["read"]
          }
          EOF
          
          echo "✓ Created haproxy-ingress policy"
          
          # Enable Kubernetes auth if not already enabled
          if ! vault auth list | grep -q "kubernetes/"; then
            vault auth enable kubernetes
          fi
          
          # Configure Kubernetes auth
          vault write auth/kubernetes/config \
            kubernetes_host="https://$KUBERNETES_PORT_443_TCP_ADDR:443"
          
          # Create role for HAProxy ingress
          vault write auth/kubernetes/role/haproxy-ingress \
            bound_service_account_names=default \
            bound_service_account_namespaces=haproxy-controller \
            policies=haproxy-ingress \
            ttl=24h
          
          echo "✓ Configured Kubernetes auth for HAProxy ingress"
        volumeMounts:
        - name: vault-admin-token
          mountPath: /vault-admin-token
          readOnly: true
      volumes:
      - name: vault-admin-token
        secret:
          secretName: vault-admin-token
      restartPolicy: OnFailure