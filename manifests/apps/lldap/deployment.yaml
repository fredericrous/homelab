apiVersion: apps/v1
kind: Deployment
metadata:
  name: lldap
  namespace: lldap
  annotations:
    # Auto-reload when secrets change
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lldap
  template:
    metadata:
      labels:
        app: lldap
    spec:
      serviceAccountName: lldap
      containers:
      - name: lldap
        image: lldap/lldap:latest
        ports:
        - containerPort: 3890
          name: ldap
        - containerPort: 17170
          name: http
        env:
        - name: LLDAP_HTTP_PORT
          value: "17170"
        - name: LLDAP_LDAP_PORT
          value: "3890"
        - name: LLDAP_LDAP_BASE_DN
          value: "dc=daddyshome,dc=fr"
        - name: LLDAP_HTTP_URL
          value: "https://lldap.daddyshome.fr"
        - name: LLDAP_DATABASE_URL_FILE
          value: "/secrets/database-url"
        - name: LLDAP_JWT_SECRET_FILE
          value: "/secrets/jwt-secret"
        - name: LLDAP_LDAP_USER_PASS_FILE
          value: "/secrets/ldap-user-pass"
        - name: LLDAP_USER_PASS_FILE
          value: "/secrets/user-pass"
        - name: LLDAP_KEY_SEED_FILE
          value: "/secrets/key-seed"
        - name: LLDAP_LDAP_USER_EMAIL
          value: "admin@daddyshome.fr"
        volumeMounts:
        - name: secrets
          mountPath: /secrets
          readOnly: true
        - name: lldap-data
          mountPath: /data
      volumes:
      - name: secrets
        secret:
          secretName: lldap-secrets
      - name: lldap-data
        persistentVolumeClaim:
          claimName: lldap-data