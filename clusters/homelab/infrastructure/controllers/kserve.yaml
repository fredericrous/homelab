apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kserve
  namespace: flux-system
spec:
  targetNamespace: kserve
  interval: 10m
  dependsOn:
    - name: kserve-crd
      namespace: flux-system
  chart:
    spec:
      chart: kserve
      version: v0.12.0
      sourceRef:
        kind: HelmRepository
        name: kserve
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    kserve:
      controller:
        image: kserve/kserve-controller:v0.12.0
      storageSpec: |
        key: minio
        schemaPath: s3
        storageSecretName: storage-config
      agent:
        image: kserve/agent:v0.12.0