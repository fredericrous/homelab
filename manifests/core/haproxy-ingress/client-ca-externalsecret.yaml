apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: client-ca-cert
  namespace: haproxy-controller
spec:
  refreshInterval: 30m
  
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: client-ca-cert
    creationPolicy: Owner
    deletionPolicy: Retain
    # Create as kubernetes.io/tls type
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: '{{ .ca_crt | toString }}'
        tls.key: '{{ .ca_key | toString }}'
  
  data:
  - secretKey: ca_crt
    remoteRef:
      key: secret/data/client-ca
      property: ca.crt
  - secretKey: ca_key
    remoteRef:
      key: secret/data/client-ca
      property: ca.key