apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Include shared vault auth base (for vault-config service account)
  - ../../base/vault-auth
  # Include job templates
  - ../../base/job-templates
  # App-specific resources
  - job-vault-configure-vso.yaml
  - vault-secret-sync.yaml
  - vault-auth-global.yaml

# Install Vault Secrets Operator via Helm
helmCharts:
- name: vault-secrets-operator
  repo: https://helm.releases.hashicorp.com
  version: 0.10.0
  namespace: vault-secrets-operator-system
  releaseName: vault-secrets-operator
  valuesInline:
    # Ensure CRDs are installed by Helm
    installCRDs: true
    controller:
      manager:
        image:
          repository: hashicorp/vault-secrets-operator
          tag: 0.10.0

patches:
  # VSO doesn't need the secret-copier job, so remove it
  - target:
      kind: ServiceAccount
      name: secret-copier
      namespace: PLACEHOLDER
    patch: |-
      $patch: delete
      
  - target:
      kind: ClusterRole
      name: PLACEHOLDER-secret-copier
    patch: |-
      $patch: delete
      
  - target:
      kind: ClusterRoleBinding
      name: PLACEHOLDER-secret-copier
    patch: |-
      $patch: delete
      
  - target:
      kind: Job
      name: secret-copier
      namespace: PLACEHOLDER
    patch: |-
      $patch: delete
      
  # Also remove vault-configure and vault-populate jobs that aren't used by VSO
  - target:
      kind: Job
      name: vault-configure
      namespace: default
    patch: |-
      $patch: delete
      
  - target:
      kind: Job
      name: vault-populate
      namespace: default
    patch: |-
      $patch: delete
  
  # Customize the vault auth from base
  - target:
      kind: VaultAuth
      name: vault-auth
    patch: |-
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultAuth
      metadata:
        name: vault-auth
        namespace: vault-secrets-operator-system
      spec:
        kubernetes:
          role: vault-secrets-operator
          serviceAccount: vault-secrets-operator
  
  # Customize the RBAC for vault token reader
  - target:
      kind: RoleBinding
      name: PLACEHOLDER-vault-admin-token-reader
      namespace: vault
    patch: |-
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: vso-vault-admin-token-reader
        namespace: vault
      subjects:
      - kind: ServiceAccount
        name: vault-config
        namespace: vault-secrets-operator-system
  
