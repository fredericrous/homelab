# ApplicationSet for applications that need variable substitution
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-patched
  namespace: argocd
spec:
  generators:
  # Matrix generator combines app configs with global defaults
  - matrix:
      generators:
      # First: Get app configurations that need patches
      - list:
          elements:
          - name: lldap
            project: apps
            namespace: lldap
            path: manifests/apps/lldap
            syncWave: "22"
          - name: harbor
            project: apps
            namespace: harbor
            path: manifests/apps/harbor
            syncWave: "25"
          - name: stremio
            project: apps
            namespace: stremio
            path: manifests/apps/stremio
            syncWave: "30"
      # Second: Get global configuration
      - git:
          repoURL: https://github.com/fredericrous/homelab.git
          revision: main
          files:
          - path: "manifests/argocd/root/global-config.yaml"
  
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/fredericrous/homelab.git
        targetRevision: main
        path: '{{path}}'
        # Use Kustomize with strategic merge patches for variable substitution
        kustomize:
          patches:
          # Common Ingress domain patch
          - target:
              kind: Ingress
              name: '{{name}}'
            patch: |
              apiVersion: networking.k8s.io/v1
              kind: Ingress
              metadata:
                name: '{{name}}'
              spec:
                tls:
                - hosts:
                  - '{{name}}.{{defaultExternalDomain}}'
                rules:
                - host: '{{name}}.{{defaultExternalDomain}}'
          # Harbor-specific patches
          - target:
              kind: IPAddressPool
              name: harbor-pool
            patch: |
              apiVersion: metallb.io/v1beta1
              kind: IPAddressPool
              metadata:
                name: harbor-pool
                namespace: metallb-system
              spec:
                addresses:
                - {{harborIP}}-192.168.1.91
          # Stremio-specific patches
          - target:
              kind: Deployment
              name: stremio-web
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: stremio-web
              spec:
                template:
                  spec:
                    initContainers:
                    - name: copy-build
                      image: {{harborRegistry}}/library/stremio-web:latest
          - target:
              kind: ConfigMap
              name: buildkitd-config
            patch: |
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: buildkitd-config
              data:
                buildkitd.toml: |
                  debug = true

                  [worker.oci]
                    max-parallelism = 4

                  [registry."harbor-registry.harbor.svc.cluster.local:5000"]
                    http = true
                    insecure = true
                    ca=["/etc/ssl/certs/ca-certificates.crt"]

                  [registry."{{harborRegistry}}"]
                    http = true
                    insecure = true
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3