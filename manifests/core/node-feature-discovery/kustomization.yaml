apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: node-feature-discovery

resources:
  - namespace.yaml

helmCharts:
- name: node-feature-discovery
  repo: https://kubernetes-sigs.github.io/node-feature-discovery/charts
  version: 0.16.3
  releaseName: node-feature-discovery
  namespace: node-feature-discovery
  includeCRDs: true
  valuesInline:
    master:
      crdController: false
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Equal
        effect: NoSchedule
    worker:
      config:
        core:
          # Use labels instead of CRDs
          sources:
            - "cpu"
            - "kernel"
            - "memory"
            - "network" 
            - "pci"
            - "system"
            - "usb"
            - "custom"
          labelSources:
            - "all"
      tolerations:
      - operator: Exists