# ArgoCD Config Management Plugin v2 - Environment Substitution Plugin
# This configures the envsubst plugin for ArgoCD
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmp-envsubst
  namespace: argocd
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: envsubst
    spec:
      version: v1.0
      generate:
        command: ["/plugin/plugin.sh", "generate"]
      discover:
        find:
          glob: "**/.argocd-envsubst"
      preserveFileMode: false