# Harbor admin credentials from Vault using External Secrets Operator
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-admin
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  refreshInterval: 5m

  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore

  target:
    name: harbor-admin-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        harborAdminPassword: "{{ .password }}"

  data:
  - secretKey: password
    remoteRef:
      key: secret/data/harbor/admin
      property: password
