apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # CloudNative-PG operator
  - https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.21/releases/cnpg-1.21.0.yaml
  # ArgoCD Sync Hooks
  - job-presync-vault-setup.yaml
  - job-post-sync-configure.yaml
  # External Secrets
  - postgres-superuser-externalsecret.yaml
  # Init SQL ConfigMap
  - init-sql-configmap.yaml
  # PostgreSQL cluster for apps
  - postgres-cluster.yaml

# Patches can be added here if needed