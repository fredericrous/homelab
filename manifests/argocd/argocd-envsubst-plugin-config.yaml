apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-envsubst-plugin-config
  namespace: argocd
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: argocd-envsubst-plugin
    spec:
      generate:
        command: ["sh", "-c"]
        args:
          - |
            # Fetch environment variables from the values repository
            VALUES_REPO_URL="https://raw.githubusercontent.com/fredericrous/homelab-values/main/.env"
            
            # Try to fetch .env file with environment variables
            if curl -s -f "$VALUES_REPO_URL" > /tmp/values.env 2>/dev/null; then
              echo "Loading environment variables from values repository"
              # Source the .env file to export all ARGO_ variables
              set -a
              . /tmp/values.env
              set +a
            else
              echo "Warning: Could not fetch environment variables from $VALUES_REPO_URL"
              echo "Continuing without environment substitution..."
            fi
            
            # Render manifests with Kustomize, handling Helm charts
            kustomize build . --enable-helm > all.yaml
            
            # Apply environment variable substitution
            envsubst < all.yaml
      discover:
        find:
          command: ["sh", "-c", "find . -name 'kustomization.yaml' -o -name 'kustomization.yml' | grep -q . && echo 'kustomization found'"]