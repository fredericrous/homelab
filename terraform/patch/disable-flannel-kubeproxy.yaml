# Turn off Talos' default CNI (flannel) and kube-proxy so Cilium can take over
cluster:
  network:
    cni: none                # <- disable flannel
    # keep your current subnets if you changed them elsewhere
    podSubnets:
      - 10.244.0.0/16
    serviceSubnets:
      - 10.96.0.0/12
  proxy:
    disabled: true           # <- required if you use Cilium's kube-proxy replacement