# Authelia secrets from Vault using External Secrets Operator
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authelia-secrets
  namespace: authelia
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  refreshInterval: 5m
  
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: authelia-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        JWT_SECRET: '{{ index . "jwt-secret" }}'
        SESSION_SECRET: '{{ index . "session-secret" }}'
        STORAGE_ENCRYPTION_KEY: '{{ index . "storage-encryption-key" }}'
        STORAGE_PASSWORD: '{{ index . "storage-password" }}'
        AUTHENTICATION_BACKEND_LDAP_PASSWORD: '{{ index . "ldap-password" }}'
  
  dataFrom:
  - extract:
      key: secret/data/authelia
      # Remap keys to match template
      # The VSO used dash, but the actual keys might use underscore
      conversionStrategy: Default