---
# RoleBinding to allow app service account to read postgres superuser secret
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-superuser-reader
  namespace: postgres
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: postgres-superuser-reader
subjects:
- kind: ServiceAccount
  name: default  # Will be patched by the app
  namespace: default  # Will be patched by the app