apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: openwebui
  namespace: openwebui
spec:
  selector:
    istio: gateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: openwebui-tls
    hosts:
    - ai.${PUBLIC_DOMAIN}