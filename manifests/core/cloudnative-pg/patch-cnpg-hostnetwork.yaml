# Patch to run CNPG webhook on host network
# This is required for Talos Linux where kube-apiserver runs on host network
# and needs to reach the webhook service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnpg-controller-manager
  namespace: cnpg-system
spec:
  template:
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet