# OVH DNS credentials from Vault using External Secrets Operator
# Plugin hint: ${ARGO_PLUGIN_HINT:-ensure-file-copied}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ovh-credentials
  namespace: lldap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  refreshInterval: 30m  # DNS credentials don't change often
  
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: ovh-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  
  # Fetch all OVH DNS credentials
  dataFrom:
  - extract:
      key: secret/data/ovh-dns