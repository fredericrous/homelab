# Force restart if operator gets stuck
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-transit-unseal-operator
  namespace: vault-transit-unseal-operator
spec:
  template:
    spec:
      containers:
      - name: manager
        # Add liveness probe to restart if stuck
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        # Ensure we always pull to get the latest v0.3.0 build
        imagePullPolicy: Always
        # Add environment variable to force reconciliation on startup
        env:
        - name: RECONCILE_ON_STARTUP
          value: "true"
        - name: LOG_LEVEL
          value: "info"
        - name: SKIP_CRD_INSTALL
          value: "true"  # CRDs are managed by ArgoCD
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name