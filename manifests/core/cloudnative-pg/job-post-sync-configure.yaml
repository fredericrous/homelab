apiVersion: batch/v1
kind: Job
metadata:
  name: cloudnative-pg-post-sync-configure
  namespace: cloudnative-pg
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: vault-auth
      restartPolicy: OnFailure
      containers:
      - name: configure
        image: bitnami/kubectl:1.28
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "🐘 Post-sync configuration for CloudNative-PG..."
          
          # Wait for operator to be ready
          echo "Waiting for CloudNative-PG operator..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=cloudnative-pg -n cloudnative-pg --timeout=300s || true
          
          # Check if postgres namespace exists
          if ! kubectl get namespace postgres >/dev/null 2>&1; then
            echo "Creating postgres namespace..."
            kubectl create namespace postgres
          fi
          
          # Check if ExternalSecret exists for postgres superuser
          if kubectl get externalsecret postgres-superuser-secret -n postgres >/dev/null 2>&1; then
            echo "✓ ExternalSecret for postgres superuser already exists"
          else
            echo "Creating ExternalSecret for postgres superuser..."
            kubectl apply -f - <<EOF
          apiVersion: external-secrets.io/v1beta1
          kind: ExternalSecret
          metadata:
            name: postgres-superuser-secret
            namespace: postgres
          spec:
            refreshInterval: 1m
            secretStoreRef:
              name: vault-backend
              kind: ClusterSecretStore
            target:
              name: postgres-superuser-secret
              creationPolicy: Owner
            dataFrom:
            - extract:
                key: secret/data/postgres-superuser
          EOF
          fi
          
          # Wait for secret to be created
          echo "Waiting for postgres superuser secret..."
          kubectl wait --for=condition=Ready externalsecret/postgres-superuser-secret -n postgres --timeout=60s || true
          
          echo "✅ CloudNative-PG post-sync configuration complete"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: cloudnative-pg
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudnative-pg-post-sync
rules:
- apiGroups: [""]
  resources: ["namespaces", "secrets"]
  verbs: ["get", "list", "create", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["external-secrets.io"]
  resources: ["externalsecrets"]
  verbs: ["get", "list", "create", "patch", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudnative-pg-post-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloudnative-pg-post-sync
subjects:
- kind: ServiceAccount
  name: vault-auth
  namespace: cloudnative-pg