{{- if .Values.postgres.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "app-setup.fullname" . }}-postgres
  labels:
    {{- include "app-setup.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-setup
spec:
  ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.jobs.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "app-setup.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-setup
    spec:
      serviceAccountName: {{ include "app-setup.serviceAccountName" . }}
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: vault-fetch-creds
        image: {{ .Values.jobs.vaultImage }}
        env:
        - name: VAULT_ADDR
          value: {{ .Values.vault.address }}
        command: ['/bin/sh', '/scripts/fetch-creds.sh']
        volumeMounts:
        - name: vault-init-script
          mountPath: /scripts
        - name: vault-token
          mountPath: /vault-token
          readOnly: true
        - name: vault-data
          mountPath: /vault-data
      containers:
      - name: postgres-setup
        image: {{ .Values.jobs.postgresImage }}
        env:
        - name: PGHOST
          value: {{ .Values.postgres.host }}
        - name: PGUSER
          value: postgres
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-apps-superuser
              key: password
        command: ['/bin/sh', '/scripts/create-db.sh']
        volumeMounts:
        - name: script
          mountPath: /scripts
        - name: vault-data
          mountPath: /vault-data
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: {{ include "app-setup.fullname" . }}-postgres-script
          defaultMode: 0755
      - name: vault-init-script
        configMap:
          name: {{ include "app-setup.fullname" . }}-postgres-vault-init
          defaultMode: 0755
      - name: vault-token
        secret:
          secretName: {{ .Values.vault.tokenSecret }}
          items:
          - key: token
            path: token
      - name: vault-data
        emptyDir: {}
{{- end }}