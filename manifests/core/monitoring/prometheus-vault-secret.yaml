# Prometheus secrets from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: prometheus-vault-config
  namespace: monitoring
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: 5m
  target:
    name: prometheus-config
    creationPolicy: Owner
  data:
    - secretKey: vault-token
      remoteRef:
        key: secret/monitoring/prometheus
        property: vault-token
    - secretKey: remote-write-username
      remoteRef:
        key: secret/monitoring/prometheus
        property: remote-write-username
    - secretKey: remote-write-password
      remoteRef:
        key: secret/monitoring/prometheus
        property: remote-write-password