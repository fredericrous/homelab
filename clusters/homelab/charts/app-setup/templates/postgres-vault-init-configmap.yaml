{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app-setup.fullname" . }}-postgres-vault-init
  labels:
    {{- include "app-setup.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-vault-init
data:
  fetch-creds.sh: |
    #!/bin/sh
    set -e
    
    echo "📥 Fetching database credentials from Vault..."
    
    export VAULT_TOKEN=$(cat /vault-token/token)
    
    # Get credentials from vault (should be created by vault setup job)
    DB_USER=$(vault kv get -field=postgres_username secret/{{ .Values.appName }} || echo "{{ include "app-setup.databaseUsername" . }}")
    DB_PASS=$(vault kv get -field=postgres_password secret/{{ .Values.appName }} || echo "generated-password")
    
    # Write credentials to shared volume
    cat > /vault-data/db-creds.env <<EOF
    DB_USER="$DB_USER"
    DB_PASS="$DB_PASS"
    EOF
    
    echo "✅ Credentials written to /vault-data/db-creds.env"
{{- end }}