apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plex
  namespace: plex
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-ovh-webhook-final"
    haproxy.org/ssl-redirect: "true"
    haproxy.org/auth-tls-secret: "haproxy-controller/client-ca-cert"
    haproxy.org/auth-tls-verify-client: "required"
    # Plex specific settings
    haproxy.org/timeout-client: "600s"
    haproxy.org/timeout-server: "600s"
    haproxy.org/backend-config-snippet: |
      # Allow WebSocket connections for Plex
      timeout tunnel 1h
spec:
  ingressClassName: haproxy
  tls:
  - hosts:
    - plex.daddyshome.fr
    secretName: plex-tls
  rules:
  - host: plex.daddyshome.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: plex
            port:
              number: 32400