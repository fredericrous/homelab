apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: cloudnative-pg-vault-populate
  namespace: postgres
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-10"  # Run early, before cluster creation
spec:
  entrypoint: populate-secrets
  serviceAccountName: argo-workflow
  
  templates:
  - name: populate-secrets
    dag:
      tasks:
      - name: wait-vault
        templateRef:
          name: vault-operations
          template: wait-vault-ready
          clusterScope: true
      
      - name: check-postgres-superuser
        dependencies: [wait-vault]
        templateRef:
          name: vault-operations
          template: check-secret-exists
          clusterScope: true
        arguments:
          parameters:
          - name: secret-path
            value: "secret/postgres-superuser"
      
      - name: generate-password
        dependencies: [check-postgres-superuser]
        when: "'{{tasks.check-postgres-superuser.outputs.parameters.exists}}' == 'not-exists'"
        templateRef:
          name: vault-operations
          template: generate-password
          clusterScope: true
        arguments:
          parameters:
          - name: length
            value: "32"
      
      - name: create-postgres-superuser-secret
        dependencies: [generate-password]
        when: "'{{tasks.check-postgres-superuser.outputs.parameters.exists}}' == 'not-exists'"
        templateRef:
          name: vault-operations
          template: populate-secret
          clusterScope: true
        arguments:
          parameters:
          - name: secret-path
            value: "secret/postgres-superuser"
          - name: secret-data
            value: |
              {
                "username": "postgres",
                "password": "{{tasks.generate-password.outputs.parameters.password}}"
              }