version: '3'

dotenv: ['.env']

includes:
  nas:
    taskfile: ./nas/Taskfile.yml
    dir: ./nas

vars:
  TERRAFORM_DIR: './terraform'
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  TALOSCONFIG: '{{.ROOT_DIR}}/talosconfig'

env:
  KUBECONFIG: '{{.KUBECONFIG}}'
  SHELL: /bin/bash

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Helper task to check prerequisites
  check-prereq:
    desc: Check prerequisites
    silent: true
    cmds:
      - |
        if ! command -v yq &> /dev/null; then
          echo "ERROR: yq is required but not installed. Install with: brew install yq"
          exit 1
        fi
      - |
        if [ ! -f ".env" ]; then
          echo "ERROR: .env file not found. Copy .env.example and update with your values"
          exit 1
        fi

  up:
    desc: Create cluster infrastructure (VMs + Talos)
    internal: true  # Hide from main task list - use bootstrap instead
    deps: [check-prereq]
    cmds:
      - task: init
      - task: provision
      - task: configure
      - task: kubeconfig
  
  install:
    desc: Full installation (cluster + GitOps + apps)
    deps: [check-prereq]
    cmds:
      - task: bootstrap
      - task: verify

  init:
    desc: Initialize Terraform
    dir: '{{.TERRAFORM_DIR}}'
    deps: [check-prereq]
    preconditions:
      - sh: test -f terraform.tfvars
      - msg: "terraform.tfvars not found. Copy terraform.tfvars.example and update with your values"
    cmds:
      - terraform init -upgrade

  provision:
    desc: "Provision VMs on Proxmox"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [check-prereq]
    cmds:
      - echo "Creating VMs..."
      - terraform apply -target=module.vms -auto-approve

  configure:
    desc: "Configure Talos on VMs"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [check-prereq]
    cmds:
      - echo "Waiting for VMs to get IP addresses..."
      - ./scripts/wait-vms-ready.sh {{.CONTROL_PLANE_IP}} {{.WORKER_1_IP}} {{.WORKER_2_IP}}
      - terraform apply -var="configure_talos=true" -auto-approve

  kubeconfig:
    desc: "Get kubeconfig from Talos"
    deps: [check-prereq]
    env:
      TALOSCONFIG: '{{.TALOSCONFIG}}'
    cmds:
      - talosctl kubeconfig -n {{.CONTROL_PLANE_IP}} -f {{.KUBECONFIG}}
      - chmod 600 {{.KUBECONFIG}}
      - echo "Waiting for Kubernetes API..."
      - kubectl wait --for=condition=Ready nodes --all --timeout=300s
      - |
        echo ""
        echo "✅ Kubernetes cluster is ready!"
        echo ""
        echo "Cluster created successfully. FluxCD bootstrap will continue..."

  bootstrap:
    desc: "Create cluster and bootstrap FluxCD"
    deps: [check-prereq]
    cmds:
      - |
        # Create cluster if kubeconfig doesn't exist
        if [ ! -f "{{.KUBECONFIG}}" ]; then
          echo "🚀 Creating Kubernetes cluster..."
          task up
        else
          echo "✅ Cluster already exists"
        fi
        
        # Skip if FluxCD is already installed
        if kubectl get ns flux-system >/dev/null 2>&1; then
          echo "✅ FluxCD is already installed"
          echo "Run 'task verify' to check infrastructure status"
          exit 0
        fi
        
        # Install flux CLI if needed
        if ! command -v flux &> /dev/null; then
          echo "Installing flux CLI..."
          curl -s https://fluxcd.io/install.sh | sudo bash
        fi
        
        echo "🚀 Bootstrapping FluxCD..."
        
        # Check for GitHub token in environment or .env file
        if [ -z "$FLUXCD_GITHUB_TOKEN" ] && [ -f .env ]; then
          source .env
        fi
        
        if [ -n "$FLUXCD_GITHUB_TOKEN" ]; then
          echo "Using GitHub token from environment"
          export GITHUB_TOKEN="$FLUXCD_GITHUB_TOKEN"
        else
          echo "You will be prompted for your GitHub token"
        fi
        
        flux bootstrap github \
          --owner=fredericrous \
          --repository=homelab \
          --branch=main \
          --path=clusters/homelab/flux-system \
          --personal \
          --token-auth
        
        echo "🔐 Creating vault-transit-token secret..."
        ./scripts/bootstrap-vault-transit-secret.sh
        
        echo "✅ Cluster created and FluxCD bootstrapped successfully!"


  verify:
    desc: "Verify all infrastructure components are ready"
    deps: [check-prereq]
    cmds:
      - echo "Waiting for all infrastructure components..."
      - ./scripts/wait-for-infrastructure.sh
      - echo ""
      - echo "✅ All infrastructure ready!"
      - echo ""
      - echo "Infrastructure status:"
      - kubectl get kustomization -n flux-system | grep -E 'NAME|vault|rook|cert-manager|haproxy|cloudnative-pg|external-secrets'
      - echo ""
      - echo "Application status:"
      - kubectl get kustomization -n flux-system | grep -E 'lldap|authelia' || echo "No applications deployed yet"

  suspend:
    desc: "Suspend Flux reconciliation (services keep running)"
    deps: [check-prereq]
    cmds:
      - |
        if kubectl get nodes >/dev/null 2>&1; then
          echo "⏸️  Suspending Flux reconciliation..."
          
          # Suspend all GitRepositories
          kubectl get gitrepository -n flux-system -o name 2>/dev/null | xargs -r -I {} kubectl patch {} -n flux-system --type='merge' -p='{"spec":{"suspend":true}}' || true
          
          # Suspend all HelmRepositories
          kubectl get helmrepository -n flux-system -o name 2>/dev/null | xargs -r -I {} kubectl patch {} -n flux-system --type='merge' -p='{"spec":{"suspend":true}}' || true
          
          # Suspend all HelmReleases
          kubectl get helmrelease -n flux-system -o name 2>/dev/null | xargs -r -I {} kubectl patch {} -n flux-system --type='merge' -p='{"spec":{"suspend":true}}' || true
          
          # Suspend all Kustomizations
          kubectl get kustomization -n flux-system -o name 2>/dev/null | xargs -r -I {} kubectl patch {} -n flux-system --type='merge' -p='{"spec":{"suspend":true}}' || true
          
          echo "✅ Flux reconciliation suspended"
          echo "ℹ️  Services continue running but won't be updated"
          echo "ℹ️  Run 'task resume' to re-enable reconciliation"
        else
          echo "⚠️  Cluster not accessible"
        fi
        
  resume:
    desc: "Resume Flux reconciliation"
    deps: [check-prereq]
    cmds:
      - |
        if kubectl get nodes >/dev/null 2>&1; then
          echo "▶️  Resuming Flux reconciliation..."
          # Resume all kustomizations
          kubectl get kustomization -n flux-system -o name | xargs -I {} kubectl patch {} -n flux-system --type='merge' -p='{"spec":{"suspend":false}}' || true
          
          echo "✅ Flux reconciliation resumed"
        else
          echo "⚠️  Cluster not accessible"
        fi
  
  destroy:
    desc: "Destroy FluxCD and all deployed resources (inverse of bootstrap)"
    deps: [check-prereq]
    prompt: This will remove FluxCD and all deployed resources. Are you sure?
    cmds:
      - |
        if ! kubectl get ns flux-system >/dev/null 2>&1; then
          echo "✅ FluxCD is not installed"
          exit 0
        fi
        
        echo "🗑️  Removing FluxCD and all resources..."
        
        # First suspend all Flux reconciliations
        task suspend
        
        # Wait a moment for reconciliations to stop
        echo "⏸️  Waiting for reconciliations to stop..."
        sleep 5
        
        # Delete application workloads in reverse dependency order
        echo "🗑️  Removing application workloads..."
        
        # Remove apps first (don't wait for finalization)
        kubectl delete kustomization apps -n flux-system --wait=false --ignore-not-found || true
        
        # Remove infrastructure (don't wait for finalization)
        kubectl delete kustomization infrastructure -n flux-system --wait=false --ignore-not-found || true
        
        # Remove infrastructure-core (don't wait for finalization)
        kubectl delete kustomization infrastructure-core -n flux-system --wait=false --ignore-not-found || true
        
        # Also delete any other kustomizations (like metallb-config, rook-ceph-cluster)
        kubectl delete kustomization -n flux-system --all --wait=false || true
        
        # Delete all resources in all non-system namespaces
        echo "🗑️  Cleaning up resources in all namespaces..."
        for ns in $(kubectl get ns -o name | grep -v -E "(kube-system|kube-public|kube-node-lease|default)" | cut -d/ -f2); do
          echo "  Cleaning namespace $ns..."
          # Delete all resources in the namespace dynamically (suppress "No resources found" messages)
          kubectl api-resources --verbs=list --namespaced -o name | xargs -n 1 -I {} sh -c "kubectl delete {} -n $ns --all --wait=false 2>&1 | grep -v 'No resources found' || true"
        done
        
        # Check if flux CLI is available
        if command -v flux &> /dev/null; then
          flux uninstall --silent
        else
          # Manual cleanup if flux CLI is not available
          echo "Flux CLI not found, performing manual cleanup..."
          
          # Delete all kustomizations first
          kubectl delete kustomization --all -n flux-system --timeout=60s || true
          
          # Delete all helm releases
          kubectl delete helmrelease --all -n flux-system --timeout=60s || true
          
          # Delete flux-system namespace (this will delete all resources in it)
          kubectl delete namespace flux-system --timeout=60s || true
          
          # Delete Flux CRDs
          kubectl get crd -o name | grep fluxcd.io | xargs kubectl delete || true
        fi
        
        # Clean up remaining namespaces created by FluxCD
        echo "🗑️  Cleaning up remaining namespaces..."
        # Get all namespaces except core k8s namespaces
        for ns in $(kubectl get ns -o name | grep -v -E "(kube-system|kube-public|kube-node-lease|default|flux-system)" | cut -d/ -f2); do
          echo "  Deleting namespace $ns..."
          kubectl delete namespace $ns --wait=false || true
        done
        
        # Clean up any remaining CRDs (excluding core k8s ones)
        echo "🗑️  Cleaning up CRDs..."
        # Get all CRDs that are NOT core Kubernetes CRDs
        kubectl get crd -o name | grep -v -E "(k8s.io|kubernetes.io|metrics.k8s.io|apiregistration.k8s.io|admissionregistration.k8s.io)" | xargs -r kubectl delete || true
        
        echo "✅ FluxCD and all resources removed"
        echo "ℹ️  Run 'task bootstrap' to reinstall"

  uninstall:
    desc: Uninstall everything (cluster + VMs + configs)
    dir: '{{.TERRAFORM_DIR}}'
    deps: [check-prereq]
    prompt: This will destroy the entire cluster and VMs. Are you sure?
    cmds:
      - echo "🗑️  Destroying VMs..."
      - terraform destroy -auto-approve
      - echo "🧹 Cleaning up configs..."
      - rm -f {{.KUBECONFIG}} {{.TALOSCONFIG}}
      - ./scripts/cleanup-vms.sh
      - |
        echo
        echo "=== IMPORTANT: GPU Passthrough Users ==="
        echo "If you have VMs with GPU passthrough, you MUST reboot the Proxmox host"
        echo "before creating new VMs with GPU, otherwise you'll get QEMU errors."
        echo
        echo "Run: task reboot"
        echo
        echo "This will prevent the 'pci_irq_handler: Assertion' error."
      - echo "✅ Uninstall complete"

  cleanup:
    desc: "Clean up existing VMs from Proxmox"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [check-prereq]
    prompt: This will stop and remove all VMs defined in terraform.tfvars. Are you sure?
    cmds:
      - ./scripts/cleanup-vms.sh

  reboot:
    desc: "Reboot Proxmox host (required after destroying VMs with GPU passthrough)"
    dir: '{{.TERRAFORM_DIR}}'
    prompt: This will reboot the Proxmox host. Are you sure?
    cmds:
      - ./scripts/reboot-proxmox.sh
