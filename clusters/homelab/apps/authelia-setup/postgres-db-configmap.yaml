apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-postgres-db-script
  namespace: authelia
data:
  create-db.sh: |
    #!/bin/sh
    set -e
    
    echo "🗄️  Setting up PostgreSQL database for Authelia..."
    
    export APP_NAME="authelia"
    
    # Since we need the authelia vault setup to run first, let's check if the secret exists
    echo "Checking if authelia secrets exist in Vault..."
    
    # Simple approach - wait for vault setup job to complete
    echo "Waiting for vault setup to complete..."
    sleep 30
    
    # Use hardcoded credentials that match what vault setup created
    DB_USER="authelia"
    DB_PASS="authelia-password"
    
    echo "Using database user: $DB_USER"
    
    # Wait for PostgreSQL to be ready
    until pg_isready -h "$PGHOST" -p 5432; do
      echo "Waiting for PostgreSQL to be ready..."
      sleep 5
    done
    
    # Check if database exists
    if psql -lqt | cut -d \| -f 1 | grep -qw "$APP_NAME"; then
      echo "✅ Database $APP_NAME already exists"
    else
      echo "Creating database $APP_NAME..."
      psql <<EOF
    CREATE USER "$DB_USER" WITH PASSWORD '$DB_PASS';
    CREATE DATABASE "$APP_NAME" OWNER "$DB_USER";
    GRANT ALL PRIVILEGES ON DATABASE "$APP_NAME" TO "$DB_USER";
    EOF
      echo "✅ Database $APP_NAME created for Authelia"
    fi