# ConfigMap containing environment variables for ArgoCD envsubst plugin
# These variables will be available for substitution in all applications
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-env-vars
  namespace: argocd
data:
  # Cluster configuration
  CLUSTER_NAME: "homelab"
  CLUSTER_DOMAIN: "cluster.local"
  
  # External domains
  EXTERNAL_DOMAIN: "daddyshome.fr"
  
  # Storage classes
  STORAGE_CLASS_DEFAULT: "rook-cephfs"
  STORAGE_CLASS_BLOCK: "rook-ceph-block"
  
  # Common namespaces
  VAULT_NAMESPACE: "vault"
  MONITORING_NAMESPACE: "monitoring"
  
  # Common service endpoints
  VAULT_ADDR: "http://vault.vault.svc.cluster.local:8200"
  POSTGRES_HOST: "postgres-cluster.cloudnative-pg.svc.cluster.local"
  
  # Resource defaults
  DEFAULT_REPLICAS: "1"
  DEFAULT_CPU_REQUEST: "50m"
  DEFAULT_MEMORY_REQUEST: "128Mi"
  DEFAULT_CPU_LIMIT: "500m"
  DEFAULT_MEMORY_LIMIT: "512Mi"