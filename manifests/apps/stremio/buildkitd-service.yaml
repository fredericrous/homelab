apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: stremio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
    spec:
      containers:
      - name: buildkitd
        image: moby/buildkit:latest
        args:
        - --addr
        - tcp://0.0.0.0:1234
        - --config
        - /etc/buildkit/buildkitd.toml
        env:
        - name: DOCKER_CONFIG
          value: /root/.docker
        ports:
        - containerPort: 1234
          protocol: TCP
        securityContext:
          privileged: true
        volumeMounts:
        - name: config
          mountPath: /etc/buildkit
          readOnly: true
        - name: docker-config
          mountPath: /root/.docker
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: buildkitd-config
      - name: docker-config
        secret:
          secretName: harbor-registry-creds
          items:
          - key: .dockerconfigjson
            path: config.json
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: stremio
spec:
  selector:
    app: buildkitd
  ports:
  - port: 1234
    targetPort: 1234
    protocol: TCP