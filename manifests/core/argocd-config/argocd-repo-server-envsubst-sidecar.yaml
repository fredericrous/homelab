# Patch to add the envsubst plugin sidecar to the ArgoCD repo-server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  template:
    spec:
      containers:
      # The envsubst plugin sidecar
      - name: envsubst-plugin
        image: ghcr.io/fredericrous/argocd-envsubst-plugin:v1.0.0
        imagePullPolicy: IfNotPresent
        command: [/var/run/argocd/argocd-cmp-server]
        # Mount the plugin config and socket
        volumeMounts:
        - name: plugins
          mountPath: /home/argocd/cmp-server/plugins
        - name: var-files
          mountPath: /var/run/argocd
        - name: cmp-plugin
          mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: plugin.yaml
        - name: cmp-tmp
          mountPath: /tmp
        # Environment variables that will be available for substitution
        envFrom:
        # Pull environment variables from ConfigMaps
        - configMapRef:
            name: argocd-env-vars
            optional: true
        # Pull environment variables from Secrets
        - secretRef:
            name: argocd-env-secrets
            optional: true
        env:
        - name: ARGOCD_ENV_CACHE_TTL
          value: "300"
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 128Mi
      volumes:
      - name: cmp-plugin
        configMap:
          name: argocd-cmp-envsubst
      - name: cmp-tmp
        emptyDir: {}