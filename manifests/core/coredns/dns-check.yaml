apiVersion: v1
kind: Pod
metadata:
  name: dns-check
  labels:
    app: dns-check
spec:
  restartPolicy: OnFailure
  securityContext:
    seccompProfile:
      type: RuntimeDefault
    runAsNonRoot: true
  containers:
  - name: dns-check
    image: busybox:1.36
    command: ["sh","-c","sleep 1d"]
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      runAsUser: 1000
    stdin: true
    tty: true
