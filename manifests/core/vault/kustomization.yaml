apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vault

# ConfigMaps for scripts
configMapGenerator:
  - name: vault-health-check
    namespace: vault
    files:
      - scripts/vault-health-check.sh
    options:
      disableNameSuffixHash: true
  - name: vault-validation
    namespace: vault
    files:
      - scripts/vault-health-check.sh
      - scripts/validate-vault-setup.sh
    options:
      disableNameSuffixHash: true

resources:
  # NOTE: Vault doesn't use base templates because:
  # 1. It doesn't need VSO to manage its own secrets
  # 2. This avoids circular dependency (VSO needs Vault, Vault needs VSO CRDs)
  # 3. Vault uses direct secret mounts and init containers
  # 4. It has its own specific job implementations
  # App-specific resources
  - namespace.yaml
  - vault-config.yaml
  - vault-config-serviceaccount.yaml  # Service account for vault-config jobs
  - vault-storage.yaml
  # - job-vault-force-init.yaml  # Only use if you need to wipe vault data
  - vault-service.yaml
  - ingress.yaml
  - rbac-vault-config-role.yaml
  - rbac-vault-secret-manager.yaml
  - vault-transit-token-secret-placeholder.yaml  # Placeholder to prevent ArgoCD from pruning the secret
  # Argo Workflows
  - argo-workflow-rbac.yaml
  # Workflows moved to vault-config app to avoid PostSync circular dependency
  # - job-vault-configure-kv.yaml  # Replaced by workflow-configure-kv.yaml
  # - vault-configure-argocd-job.yaml  # Replaced by workflow
  # - job-configure-app-ovh-access.yaml  # Replaced by workflow
  # - job-configure-cert-manager-vault-access.yaml  # Replaced by workflow
  # - job-vault-populate-secrets.yaml  # Replaced by app-specific workflows
  # - job-vault-validate.yaml  # Can be added to workflow if needed
  - vault-transit-unseal.yaml  # VaultTransitUnseal custom resource
  # vault-pvc.yaml is duplicate of vault-storage.yaml

patches:
  - path: patch-velero-backup.yaml
    target:
      kind: StatefulSet
      name: vault
  - path: patch-liveness-probe.yaml
    target:
      kind: StatefulSet
      name: vault

  # Add sync waves to jobs for proper ordering
  # Wave 0: StatefulSet and core resources (default)
  # Wave 1-2: Vault initialization - Now handled by vault-transit-unseal-operator
  # Wave 3: KV engine configuration
  - target:
      kind: Job
      name: vault-configure-kv
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: vault-configure-kv
        annotations:
          argocd.argoproj.io/sync-wave: "3"

  # Wave 4: Authentication configuration
  - target:
      kind: Job
      name: vault-configure
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: vault-configure
        annotations:
          argocd.argoproj.io/sync-wave: "4"

  # Wave 5: Application-specific access
  - target:
      kind: Job
      name: configure-app-ovh-access
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: configure-app-ovh-access
        annotations:
          argocd.argoproj.io/sync-wave: "5"

  - target:
      kind: Job
      name: configure-cert-manager-vault-access
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: configure-cert-manager-vault-access
        annotations:
          argocd.argoproj.io/sync-wave: "5"

  - target:
      kind: Job
      name: vault-populate
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: vault-populate
        annotations:
          argocd.argoproj.io/sync-wave: "6"

  - target:
      kind: Job
      name: vault-validate
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: vault-validate
        annotations:
          argocd.argoproj.io/sync-wave: "7"

  # Comment out secret-copier for now - it creates a circular dependency
  # The secret it's trying to copy (ovh-credentials) might not exist yet
  # TODO: Fix this dependency issue properly

