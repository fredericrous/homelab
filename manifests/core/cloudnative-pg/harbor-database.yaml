apiVersion: batch/v1
kind: Job
metadata:
  name: create-harbor-databases
  namespace: postgres
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: create-databases
        image: postgres:16
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-superuser-secret
              key: password
        - name: PGHOST
          value: postgres-apps-rw.postgres.svc.cluster.local
        - name: PGUSER
          value: postgres
        command:
        - sh
        - -c
        - |
          set -e  # Exit on error
          echo "Creating Harbor user and databases..."
          
          # Test connection first
          psql -c "SELECT version();" || { echo "Failed to connect to database"; exit 1; }
          
          # Create user if not exists
          psql -tc "SELECT 1 FROM pg_user WHERE usename = 'harbor'" | grep -q 1 || \
            psql -c "CREATE USER harbor WITH PASSWORD 'HarborDB123';"
          
          # Create databases one by one
          for db in registry core notary_signer notary_server; do
            echo "Creating database $db..."
            psql -tc "SELECT 1 FROM pg_database WHERE datname = '$db'" | grep -q 1 || \
              psql -c "CREATE DATABASE $db OWNER harbor;"
            psql -c "GRANT ALL PRIVILEGES ON DATABASE $db TO harbor;"
          done
          
          echo "Harbor databases created successfully!"
---
apiVersion: v1
kind: Secret
metadata:
  name: harbor-db-user
  namespace: postgres
type: kubernetes.io/basic-auth
stringData:
  username: harbor
  password: HarborDB123