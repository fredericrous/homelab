apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-vault-extras
  namespace: authelia
data:
  setup-extras.sh: |
    #!/bin/sh
    set -e
    
    echo "🔐 Setting up Authelia-specific secrets..."
    
    # Add Authelia-specific secrets to existing ones
    vault kv patch -mount=secret authelia \
      AUTHELIA_JWT_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '\n') \
      AUTHELIA_SESSION_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '\n') \
      AUTHELIA_STORAGE_ENCRYPTION_KEY=$(head -c 32 /dev/urandom | base64 | tr -d '\n') \
      LDAP_PASSWORD="INmsLY0M9Un2p58/f/l30Q=="
    
    echo "✅ Authelia-specific secrets configured"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: authelia-vault-extras
  namespace: authelia
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: authelia
      restartPolicy: OnFailure
      containers:
      - name: setup-extras
        image: hashicorp/vault:1.17.3
        command: ['/bin/sh', '-c']
        args:
          - |
            # Wait for main vault-setup job to complete
            echo "Waiting for main vault setup to complete..."
            sleep 30
            
            # Run the extras script
            /scripts/setup-extras.sh
        env:
        - name: VAULT_ADDR
          value: http://vault-vault.vault.svc.cluster.local:8200
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-admin-token
              key: token
        volumeMounts:
        - name: script
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: authelia-vault-extras
          defaultMode: 0755