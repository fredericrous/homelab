apiVersion: batch/v1
kind: Job
metadata:
  name: vault-configure-transit-token
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
spec:
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: OnFailure
      containers:
      - name: configure-transit
        image: bitnami/kubectl:1.31
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "🔍 Checking for transit token..."
          
          # Check if secret already exists
          if kubectl get secret vault-transit-token -n vault &>/dev/null; then
              echo "✅ Transit token secret already exists"
              exit 0
          fi
          
          # Check if token is provided via ConfigMap or external secret
          if [ -f /transit-token/token ]; then
              echo "📦 Creating transit token secret from mounted file..."
              kubectl create secret generic vault-transit-token \
                  --namespace=vault \
                  --from-literal=token="$(cat /transit-token/token)"
              echo "✅ Transit token secret created"
          else
              echo "❌ Transit token not found!"
              echo "Please create the secret manually:"
              echo "  kubectl create secret generic vault-transit-token \\"
              echo "    --namespace=vault \\"
              echo "    --from-literal=token=<your-transit-token>"
              echo ""
              echo "Get the token from QNAP Vault by running:"
              echo "  cd /path/to/homelab/nas"
              echo "  ./setup-vault-transit-k3s.sh"
              exit 1
          fi
        volumeMounts:
        - name: transit-token
          mountPath: /transit-token
          readOnly: true
      volumes:
      - name: transit-token
        secret:
          secretName: vault-transit-token-source
          optional: true