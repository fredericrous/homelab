apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # Run after vault StatefulSet
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
      - name: vault-init
        image: hashicorp/vault:1.20.1
        command: ["/scripts/init-vault.sh"]
        env:
        - name: VAULT_ADDR
          value: http://vault:8200
        - name: VAULT_SKIP_VERIFY
          value: "true"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: recovery
          mountPath: /recovery
          readOnly: true
      volumes:
      - name: scripts
        configMap:
          name: vault-init-scripts
          defaultMode: 0755
      - name: recovery
        configMap:
          name: vault-recovery
          optional: true