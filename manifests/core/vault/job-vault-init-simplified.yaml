apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
      - name: init-vault
        image: hashicorp/vault:1.20.1
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          echo "🔐 Initializing Vault with Transit Unseal"
          echo "========================================"
          
          export VAULT_ADDR=http://vault:8200
          
          # Wait for Vault to be ready
          echo "⏳ Waiting for Vault to be ready..."
          for i in {1..30}; do
              if vault status >/dev/null 2>&1; then
                  break
              fi
              echo "Attempt $i/30..."
              sleep 2
          done
          
          # Check if already initialized
          if vault status 2>/dev/null | grep -q "Initialized.*true"; then
              echo "✅ Vault is already initialized"
              
              # Check if sealed
              if vault status 2>/dev/null | grep -q "Sealed.*false"; then
                  echo "✅ Vault is unsealed"
              else
                  echo "⚠️  Vault is sealed - attempting to unseal..."
                  
                  # Try to get unseal key from secret
                  UNSEAL_KEY=$(kubectl get secret vault-keys -n vault -o jsonpath='{.data.unseal-key}' | base64 -d 2>/dev/null || echo "")
                  if [ -n "$UNSEAL_KEY" ]; then
                      vault operator unseal "$UNSEAL_KEY" || echo "Unseal failed"
                  else
                      echo "No unseal key found - manual unseal required"
                  fi
              fi
              
              # Ensure admin token exists
              if ! kubectl get secret vault-admin-token -n vault &>/dev/null; then
                  echo "⚠️  Admin token secret missing - cannot recreate for existing Vault"
              fi
              
              exit 0
          fi
          
          # Initialize Vault (no need for unseal keys with transit)
          echo "🎲 Initializing Vault..."
          init_output=$(vault operator init -format=json)
          
          # Extract root token
          root_token=$(echo "$init_output" | jq -r '.root_token')
          
          # Store root token in secret
          kubectl create secret generic vault-admin-token \
              --namespace=vault \
              --from-literal=token="$root_token" \
              --dry-run=client -o yaml | kubectl apply -f -
          
          echo "✅ Vault initialized successfully!"
          echo "✅ Root token stored in vault-admin-token secret"
          echo ""
          echo "📋 Note: With transit auto-unseal:"
          echo "   - No manual unseal keys are needed"
          echo "   - Vault will auto-unseal using QNAP Vault"
          echo "   - The root token is stored in the vault-admin-token secret"
        env:
        - name: VAULT_SKIP_VERIFY
          value: "true"