apiVersion: batch/v1
kind: CronJob
metadata:
  name: velero-backup-sync-nfs
  namespace: velero
spec:
  schedule: "0 4 */2 * *"  # Every 2 days at 4 AM (2 hours after NFS backups)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: velero
          restartPolicy: OnFailure
          containers:
          - name: backup-sync
            image: amazon/aws-cli:2.15.17
            command:
            - sh
            - -c
            - |
              set -e
              
              echo "Starting backup sync to NFS..."
              
              # Configure AWS credentials
              export AWS_ACCESS_KEY_ID=$(cat /credentials/cloud | grep aws_access_key_id | cut -d= -f2)
              export AWS_SECRET_ACCESS_KEY=$(cat /credentials/cloud | grep aws_secret_access_key | cut -d= -f2)
              export AWS_DEFAULT_REGION=eu-west-1
              
              # Source directory in MinIO
              SOURCE_BUCKET="velero"
              SOURCE_PREFIX="backups/"
              
              # Target directory on NFS mount
              TARGET_DIR="/nfs/velero-backups"
              
              # Create target directory if it doesn't exist
              mkdir -p "$TARGET_DIR"
              
              # List all backups in MinIO
              echo "Listing backups in MinIO..."
              aws --endpoint-url=http://minio.velero.svc.cluster.local:9000 \
                s3 ls "s3://${SOURCE_BUCKET}/${SOURCE_PREFIX}" --recursive | \
                grep -E '\.(tar|tar.gz|json)$' | \
                awk '{print $4}' > /tmp/backup-list.txt
              
              # Sync each backup
              while IFS= read -r backup_file; do
                echo "Syncing $backup_file..."
                # Create directory structure
                backup_dir=$(dirname "$backup_file")
                mkdir -p "$TARGET_DIR/$backup_dir"
                
                # Download and copy to NFS
                aws --endpoint-url=http://minio.velero.svc.cluster.local:9000 \
                  s3 cp "s3://${SOURCE_BUCKET}/$backup_file" "$TARGET_DIR/$backup_file" || \
                  echo "Warning: Failed to sync $backup_file"
              done < /tmp/backup-list.txt
              
              # Clean up old backups on NFS (keep last 10 backups)
              echo "Cleaning up old backups..."
              find "$TARGET_DIR" -name "*.tar" -o -name "*.tar.gz" | \
                sort -r | tail -n +11 | xargs -r rm -f
              
              echo "Backup sync completed successfully!"
            volumeMounts:
            - name: velero-credentials
              mountPath: /credentials
              readOnly: true
            - name: nfs-backup
              mountPath: /nfs
          volumes:
          - name: velero-credentials
            secret:
              secretName: velero-credentials
          - name: nfs-backup
            persistentVolumeClaim:
              claimName: velero-nfs-backups