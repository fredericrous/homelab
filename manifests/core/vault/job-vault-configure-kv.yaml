apiVersion: batch/v1
kind: Job
metadata:
  name: vault-configure-kv
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: PostSync
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
      - name: configure-kv
        image: hashicorp/vault:1.20.1
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          
          echo "🔐 Configuring Vault KV Secret Engine..."
          echo "========================================"
          
          # Health check functions
          check_vault_health() {
            local max_attempts=30
            local attempt=1
            
            echo "🏥 Performing health checks..."
            
            while [ $attempt -le $max_attempts ]; do
              if vault status >/dev/null 2>&1; then
                local sealed=$(vault status -format=json | jq -r '.sealed')
                local initialized=$(vault status -format=json | jq -r '.initialized')
                
                if [ "$initialized" = "true" ] && [ "$sealed" = "false" ]; then
                  echo "✅ Vault is initialized and unsealed"
                  return 0
                elif [ "$sealed" = "true" ]; then
                  echo "⚠️  Vault is sealed, waiting for auto-unseal..."
                else
                  echo "⚠️  Vault not initialized yet..."
                fi
              else
                echo "⏳ Waiting for Vault API to be ready... (attempt $attempt/$max_attempts)"
              fi
              
              sleep 5
              ((attempt++))
            done
            
            echo "❌ Vault health check failed after $max_attempts attempts"
            return 1
          }
          
          verify_admin_token() {
            echo "🔑 Verifying admin token..."
            
            if ! [ -f /vault-admin-token/token ]; then
              echo "❌ Admin token file not found"
              return 1
            fi
            
            local token=$(cat /vault-admin-token/token)
            if [ -z "$token" ] || [ "$token" = "temp-token" ]; then
              echo "❌ Invalid or temporary admin token"
              return 1
            fi
            
            export VAULT_TOKEN="$token"
            
            # Test token validity
            if ! vault token lookup >/dev/null 2>&1; then
              echo "❌ Admin token is not valid"
              return 1
            fi
            
            echo "✅ Admin token is valid"
            return 0
          }
          
          configure_kv_engine() {
            echo "🗄️  Configuring KV v2 secret engine..."
            
            # Check if secret engine already exists
            if vault secrets list -format=json | jq -e '."secret/"' >/dev/null 2>&1; then
              local engine_type=$(vault secrets list -format=json | jq -r '."secret/".type')
              local engine_version=$(vault secrets list -format=json | jq -r '."secret/".options.version // "1"')
              
              if [ "$engine_type" = "kv" ] && [ "$engine_version" = "2" ]; then
                echo "✅ KV v2 secret engine already enabled at secret/"
                return 0
              else
                echo "⚠️  Found $engine_type engine version $engine_version at secret/"
                echo "   Expected KV v2 engine"
                # Don't fail here - let ops team handle migration
              fi
            else
              echo "📝 Enabling KV v2 secret engine at secret/"
              if ! vault secrets enable -path=secret -version=2 kv; then
                echo "❌ Failed to enable KV secret engine"
                return 1
              fi
              echo "✅ KV v2 secret engine enabled successfully"
            fi
            
            return 0
          }
          
          test_kv_operations() {
            echo "🧪 Testing KV operations..."
            
            local test_path="secret/health-check"
            local test_value="kv-test-$(date +%s)"
            
            # Test write
            echo "  Writing test secret..."
            if ! vault kv put "$test_path" value="$test_value" >/dev/null 2>&1; then
              echo "❌ Failed to write test secret"
              return 1
            fi
            
            # Test read
            echo "  Reading test secret..."
            local read_value=$(vault kv get -field=value "$test_path" 2>/dev/null || echo "")
            if [ "$read_value" != "$test_value" ]; then
              echo "❌ Failed to read test secret correctly"
              echo "   Expected: $test_value"
              echo "   Got: $read_value"
              return 1
            fi
            
            # Test delete
            echo "  Deleting test secret..."
            if ! vault kv delete "$test_path" >/dev/null 2>&1; then
              echo "⚠️  Failed to delete test secret (non-critical)"
            fi
            
            echo "✅ KV operations test passed"
            return 0
          }
          
          # Main execution
          main() {
            # Run health checks
            check_vault_health || exit 1
            verify_admin_token || exit 1
            
            # Configure KV engine
            configure_kv_engine || exit 1
            
            # Test operations
            test_kv_operations || exit 1
            
            echo ""
            echo "✅ Vault KV configuration completed successfully!"
            echo "📊 Summary:"
            echo "  - Vault is healthy and unsealed"
            echo "  - KV v2 engine enabled at secret/"
            echo "  - Read/write operations verified"
          }
          
          # Install required tools
          echo "📦 Installing required tools..."
          apk add --no-cache bash jq >/dev/null 2>&1 || true
          
          # Run main function
          main
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_SKIP_VERIFY
          value: "true"
        volumeMounts:
        - name: vault-admin-token
          mountPath: /vault-admin-token
          readOnly: true
      volumes:
      - name: vault-admin-token
        secret:
          secretName: vault-admin-token