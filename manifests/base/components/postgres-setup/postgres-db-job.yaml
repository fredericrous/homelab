apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-db-create
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: default  # Will be patched by the app
      restartPolicy: OnFailure
      containers:
      - name: create-database
        image: hashicorp/vault:1.17.3
        env:
        - name: PGHOST
          value: postgres-apps-rw.postgres.svc.cluster.local
        - name: PGUSER
          value: postgres
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-superuser
              key: password
        - name: VAULT_ADDR
          value: http://vault-vault.vault.svc.cluster.local:8200
# APP_NAME will be added by patches
        command: ['/bin/sh', '/scripts/create-db.sh']
        volumeMounts:
        - name: script
          mountPath: /scripts
        - name: vault-token
          mountPath: /vault-token
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: postgres-db-script
          defaultMode: 0755
      - name: vault-token
        secret:
          secretName: vault-admin-token
          items:
          - key: token
            path: token