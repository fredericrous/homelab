apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lldap

resources:
  # App-specific resources
  - namespace.yaml
  - lldap-secrets-eso.yaml  # ESO resource for LLDAP secrets
  - ovh-credentials-eso.yaml  # ESO resource for OVH credentials
  - deployment.yaml
  - service.yaml
  - ingress.yaml

patches:
  # Add backup annotations for persistent volumes
  - target:
      kind: Deployment
      name: lldap
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: lldap
      spec:
        template:
          metadata:
            annotations:
              backup.velero.io/backup-volumes: lldap-data