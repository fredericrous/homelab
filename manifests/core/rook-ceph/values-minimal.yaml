# Minimal Rook-Ceph configuration for homelab
# Reduces resource usage and etcd pressure

# Reduce CRD creation to minimize etcd usage
crds:
  enabled: true

# Operator configuration - single replica for homelab
csi:
  # Reduce provisioner replicas
  provisionerReplicas: 1
  
  # Enable cephfs and rbd
  enableCephfsDriver: true
  enableRBDDriver: true
  
  # Reduce resource requests
  csiRBDProvisionerResource: |
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
      
  csiCephFSProvisionerResource: |
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
      
  # Reduce plugin resources
  csiRBDPluginResource: |
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi
      
  csiCephFSPluginResource: |
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

# Monitoring - disable for homelab to save resources
monitoring:
  enabled: false

# Operator settings
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Reduce log verbosity
logLevel: INFO

# Disable automatic CRD upgrades to reduce etcd churn
enableOBCWatchOperatorNamespace: false

# Discover all nodes but use node affinity in cluster.yaml
discover:
  # Don't exclude any nodes from discovery
  toleration: |
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  nodeAffinity: |
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - talos-cp-1
          - talos-wk-1-gpu  
          - talos-wk-2

# Disable features we don't need
enableDiscoveryDaemon: true
enableAdmissionController: false

# CSI specific settings to reduce overhead
csi:
  # Reduce sidecars
  enableCSIHostNetwork: false
  
  # Force delete pods on node failure (important for homelab)
  forceCephFSKernelClient: false
  
  # Timeouts
  grpcTimeoutInSeconds: 150
  
  # Reduce liveness probe frequency
  livenessSidecarResource: |
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 64Mi