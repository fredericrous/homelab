apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: authelia
  namespace: authelia
spec:
  host: authelia.authelia.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http2MaxRequests: 100
        maxRequestsPerConnection: 2
    outlierDetection:
      # Disable outlier detection to prevent marking pods as unhealthy
      splitExternalLocalOriginErrors: false
      consecutiveErrors: 50
      interval: 30s
      baseEjectionTime: 30s
    # Custom health check configuration
    healthCheck:
      interval: 10s
      timeout: 3s
      unhealthyThreshold: 3
      healthyThreshold: 1
      path: /api/health
      httpHeaders:
      - name: x-health-check
        value: istio