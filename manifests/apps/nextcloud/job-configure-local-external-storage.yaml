apiVersion: batch/v1
kind: Job
metadata:
  name: configure-local-external-storage
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "30"
spec:
  template:
    metadata:
      labels:
        app: nextcloud-config
    spec:
      serviceAccountName: nextcloud
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-nextcloud
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          echo "Waiting for Nextcloud to be ready..."
          until nc -z nextcloud.nextcloud.svc.cluster.local 80; do
            echo "Nextcloud is not ready yet..."
            sleep 10
          done
          echo "Nextcloud is ready!"
      containers:
      - name: configure-external-storage
        image: nextcloud:28
        command:
        - sh
        - -c
        - |
          echo "🔧 Configuring local external storage in Nextcloud..."

          # Enable external storage app
          echo "📦 Enabling external storage app..."
          su -s /bin/sh www-data -c "php occ app:enable files_external"

          # Create Media mount pointing to local path
          echo "📁 Creating Media external storage (local)..."
          su -s /bin/sh www-data -c "php occ files_external:create 'Media' 'local' null::null -c datadir='/var/www/html/data/media'" || echo "Media mount might already exist"

          # Create VMs mount pointing to local path
          echo "📁 Creating VMs external storage (local)..."
          su -s /bin/sh www-data -c "php occ files_external:create 'VMs' 'local' null::null -c datadir='/var/www/html/data/vms'" || echo "VMs mount might already exist"

          # List all mounts
          echo "📋 Current external storage configuration:"
          su -s /bin/sh www-data -c "php occ files_external:list"

          # Scan the external storage to make files visible
          echo "🔍 Scanning external storage..."
          su -s /bin/sh www-data -c "php occ files:scan --all" || echo "Scan might take a while for large shares"
        volumeMounts:
        - name: nextcloud-data
          mountPath: /var/www/html
        - name: nfs-media
          mountPath: /var/www/html/data/media
        - name: nfs-vms
          mountPath: /var/www/html/data/vms
      volumes:
      - name: nextcloud-data
        persistentVolumeClaim:
          claimName: nextcloud-data
      - name: nfs-media
        persistentVolumeClaim:
          claimName: nextcloud-nfs-media
      - name: nfs-vms
        persistentVolumeClaim:
          claimName: nextcloud-nfs-vms
