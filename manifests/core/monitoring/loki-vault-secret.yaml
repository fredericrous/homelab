# Loki secrets from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-s3-config
  namespace: monitoring
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: 5m
  target:
    name: loki-s3-config
    creationPolicy: Owner
  data:
    - secretKey: s3-endpoint
      remoteRef:
        key: secret/monitoring/loki
        property: s3-endpoint
    - secretKey: s3-access-key
      remoteRef:
        key: secret/monitoring/loki
        property: s3-access-key
    - secretKey: s3-secret-key
      remoteRef:
        key: secret/monitoring/loki
        property: s3-secret-key
    - secretKey: s3-bucket
      remoteRef:
        key: secret/monitoring/loki
        property: s3-bucket