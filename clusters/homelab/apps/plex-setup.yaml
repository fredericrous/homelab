apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex-setup
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  path: ./clusters/homelab/apps/plex-setup
  prune: false  # Don't prune setup jobs
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: plex
  healthChecks:
    - apiVersion: batch/v1
      kind: Job
      name: plex-vault-setup
      namespace: vault