# ArgoCD Vault Plugin configuration secret
# This will be created by terraform with the actual values
apiVersion: v1
kind: Secret
metadata:
  name: argocd-vault-plugin-config
  namespace: argocd
type: Opaque
stringData:
  AVP_TYPE: "vault"
  AVP_AUTH_TYPE: "token"
  AVP_VAULT_ADDR: "PLACEHOLDER_NAS_VAULT_ADDR"
  AVP_TOKEN: "PLACEHOLDER_NAS_VAULT_TOKEN"
  # Path to bootstrap secrets in NAS vault
  AVP_SECRET_PATH: "secret/data/bootstrap"