# ApplicationSet for core platform components
# Note: To use a different homelab-values repo, update the repoURL below
# and ensure you've created a repository secret with matching URL
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core
  namespace: argocd
spec:
  generators:
  - matrix:
      generators:
      # Get all core app configurations
      - git:
          repoURL: https://github.com/fredericrous/homelab
          revision: main
          files:
          - path: "manifests/core/**/app.yaml"
      # Get global configuration from private repo
      - git:
          repoURL: https://github.com/fredericrous/homelab-values
          revision: main
          files:
          - path: "global-config.yaml"
          pathParamPrefix: config

  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/fredericrous/homelab.git
        targetRevision: main
        path: '{{path}}'
        kustomize:
          patches:
          # Patch for Vault to use NAS vault address from global config
          - target:
              kind: ConfigMap
              name: vault-config
              namespace: vault
            patch: |
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: vault-config
                namespace: vault
              data:
                vault.hcl: |
                  ui = true
                  disable_mlock = true
                  
                  listener "tcp" {
                    tls_disable = 1
                    address = "[::]:8200"
                    cluster_address = "[::]:8201"
                  }
                  
                  storage "file" {
                    path = "/vault/data"
                  }
                  
                  # Transit auto-unseal using NAS Vault
                  seal "transit" {
                    address = "{{config.nasVaultAddr}}"
                    disable_renewal = "false"
                    key_name = "autounseal"
                    mount_path = "transit"
                    tls_skip_verify = "true"
                    # Token will be injected via init container
                    token = "TRANSIT_TOKEN_PLACEHOLDER"
                  }
                  
                  # API address
                  api_addr = "http://vault.vault.svc.cluster.local:8200"
                  
                  # Enable the database secrets engine
                  # This will be configured after initialization
          # Patch for Cilium to use control plane IP from global config
          - target:
              kind: DaemonSet
              name: cilium
              namespace: kube-system
            patch: |
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: cilium
                namespace: kube-system
              spec:
                template:
                  spec:
                    containers:
                    - name: cilium-agent
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '{{config.controlPlaneIp}}'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
                    initContainers:
                    - name: config
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '{{config.controlPlaneIp}}'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
                    - name: mount-cgroup
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '{{config.controlPlaneIp}}'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
                    - name: apply-sysctl-overwrites
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '{{config.controlPlaneIp}}'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
                    - name: clean-cilium-state
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '{{config.controlPlaneIp}}'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
                    - name: install-cni-binaries
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '{{config.controlPlaneIp}}'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace={{default "true" .createNamespace}}
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSyncOnly=true
        - ServerSideApply={{default "false" .serverSideApply}}
        - Replace=true  # Needed for CRDs
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3

      # Standard ignore differences for common operators
      ignoreDifferences:
      # CloudNativePG
      - group: postgresql.cnpg.io
        kind: Cluster
        jsonPointers:
        - /spec/instances
        - /status
      # Cert-manager
      - group: cert-manager.io
        kind: Certificate
        jsonPointers:
        - /status
      # External Secrets Operator
      - group: external-secrets.io
        kind: ExternalSecret
        jsonPointers:
        - /status
        - /status/refreshTime
        - /status/syncedResourceVersion
      # Rook-Ceph
      - group: ceph.rook.io
        kind: CephCluster
        jsonPointers:
        - /status
      - group: ceph.rook.io
        kind: CephBlockPool
        jsonPointers:
        - /status
