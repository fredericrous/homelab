apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-vault-setup
  namespace: vault
spec:
  template:
    metadata:
      name: nextcloud-vault-setup
    spec:
      serviceAccountName: vault-admin
      containers:
      - name: vault-setup
        image: vault:1.14.0
        env:
        - name: VAULT_ADDR
          value: http://vault.vault.svc.cluster.local:8200
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-admin-token
              key: token
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Function to check if secret exists
          check_secret_exists() {
            vault kv get -mount=secret "$1" >/dev/null 2>&1
          }
          
          # Generate secure password
          generate_password() {
            openssl rand -base64 24 | tr -d "=+/" | cut -c1-24
          }
          
          # Create Nextcloud admin secret if it doesn't exist
          if ! check_secret_exists "nextcloud/admin"; then
            echo "Creating Nextcloud admin secret..."
            ADMIN_PASSWORD=$(generate_password)
            vault kv put -mount=secret nextcloud/admin \
              username="admin" \
              password="$ADMIN_PASSWORD"
          else
            echo "Nextcloud admin secret already exists"
          fi
          
          # Create Nextcloud database secret if it doesn't exist
          if ! check_secret_exists "nextcloud/database"; then
            echo "Creating Nextcloud database secret..."
            DB_PASSWORD=$(generate_password)
            vault kv put -mount=secret nextcloud/database \
              username="nextcloud" \
              password="$DB_PASSWORD" \
              database="nextcloud" \
              host="postgres-apps-rw.postgres.svc.cluster.local"
          else
            echo "Nextcloud database secret already exists"
          fi
          
          # Create LDAP secret if it doesn't exist
          if ! check_secret_exists "nextcloud/ldap"; then
            echo "Creating Nextcloud LDAP secret..."
            vault kv put -mount=secret nextcloud/ldap \
              host="lldap.lldap.svc.cluster.local" \
              port="3890" \
              bind_dn="uid=admin,ou=people,dc=daddyshome,dc=fr" \
              bind_password="changeme" \
              base_dn="dc=daddyshome,dc=fr" \
              user_dn="ou=people,dc=daddyshome,dc=fr"
          else
            echo "Nextcloud LDAP secret already exists"
          fi
          
          echo "Nextcloud vault setup completed!"
      restartPolicy: OnFailure
  backoffLimit: 3