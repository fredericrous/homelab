---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-admin-token
  namespace: postgres
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: vault-admin-token
    creationPolicy: Owner
    
  dataFrom:
  - extract:
      key: secret/vault-admin-token