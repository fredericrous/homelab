apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex-setup
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  targetNamespace: flux-system
  chart:
    spec:
      chart: ./clusters/homelab/charts/app-setup
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: flux-system
  dependsOn:
    - name: vault
      namespace: flux-system
    - name: external-secrets
      namespace: flux-system
  values:
    appName: plex
    vault:
      secrets:
        - path: plex/config
          data:
            claim: "placeholder"  # Will be replaced by valuesFrom
            timezone: "Europe/Paris"
  valuesFrom:
    - kind: Secret
      name: cluster-vars
      valuesKey: PLEX_CLAIM_TOKEN
      targetPath: vault.secrets[0].data.claim