# Enhanced secret copier that waits for source secret to exist
apiVersion: batch/v1
kind: Job
metadata:
  name: secret-copier
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: secret-copier
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: secret-copier
        image: bitnami/kubectl:latest
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: SOURCE_SECRET
          value: ovh-credentials
        - name: SOURCE_NAMESPACE
          value: cert-manager
        - name: TARGET_NAMESPACE
          value: vault
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Waiting for secret ${SOURCE_SECRET} in namespace ${SOURCE_NAMESPACE}..."
          
          # Wait up to 5 minutes for the source secret to exist
          for i in {1..60}; do
            if kubectl get secret "${SOURCE_SECRET}" -n "${SOURCE_NAMESPACE}" &>/dev/null; then
              echo "✅ Secret ${SOURCE_SECRET} found in ${SOURCE_NAMESPACE}"
              break
            fi
            echo "⏳ Waiting for secret ${SOURCE_SECRET} to exist... ($i/60)"
            sleep 5
          done
          
          # Verify the secret exists
          if ! kubectl get secret "${SOURCE_SECRET}" -n "${SOURCE_NAMESPACE}" &>/dev/null; then
            echo "❌ Secret ${SOURCE_SECRET} not found in ${SOURCE_NAMESPACE} after 5 minutes"
            exit 1
          fi
          
          echo "Copying secret ${SOURCE_SECRET} from ${SOURCE_NAMESPACE} to ${TARGET_NAMESPACE}..."
          
          # Get the source secret
          kubectl get secret "${SOURCE_SECRET}" -n "${SOURCE_NAMESPACE}" -o yaml > /tmp/source-secret.yaml
          
          # Remove namespace-specific fields and apply to target namespace
          cat /tmp/source-secret.yaml | \
            sed "s/namespace: ${SOURCE_NAMESPACE}/namespace: ${TARGET_NAMESPACE}/" | \
            grep -v "uid:" | \
            grep -v "resourceVersion:" | \
            grep -v "creationTimestamp:" | \
            kubectl apply -f -
          
          echo "✅ Secret ${SOURCE_SECRET} copied to namespace ${TARGET_NAMESPACE}"