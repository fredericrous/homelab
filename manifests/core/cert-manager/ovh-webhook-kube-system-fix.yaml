# Fix for OVH webhook to read extension-apiserver-authentication configmap
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-webhook-ovh:extension-apiserver-authentication-reader
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-webhook-ovh:extension-apiserver-authentication-reader
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-webhook-ovh:extension-apiserver-authentication-reader
subjects:
- kind: ServiceAccount
  name: cert-manager-webhook-ovh
  namespace: cert-manager