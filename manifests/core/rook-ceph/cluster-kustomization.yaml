apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rook-ceph

# This is for the Ceph cluster deployment only
# The operator must be deployed first via the main kustomization.yaml

helmCharts:
- name: rook-ceph-cluster
  repo: https://charts.rook.io/release
  version: v1.15.5
  releaseName: rook-ceph-cluster
  namespace: rook-ceph
  valuesInline:
    operatorNamespace: rook-ceph
    configOverride: |
      [global]
      osd_pool_default_size = 2
      osd_pool_default_min_size = 1
      mon_warn_on_pool_no_redundancy = false
      # Reduce mon database size
      mon_data_size_warn = 1073741824  # 1GB warning
      mon_data_size_crit = 2147483648  # 2GB critical
      # Reduce recovery operations
      osd_recovery_max_active = 1
      osd_max_backfills = 1
      # Memory target for OSDs
      osd_memory_target = 1073741824  # 1GB
      # Reduce cache sizes
      bluestore_cache_size = 536870912  # 512MB
    cephClusterSpec:
      cephVersion:
        image: quay.io/ceph/ceph:v18.2.4
      dataDirHostPath: /var/lib/rook
      cleanupPolicy:
        confirmation: ""
        sanitizeDisks:
          method: complete
          dataSource: zero
          iteration: 1
        allowUninstallWithVolumes: false
      placement:
        all:
          tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
        # Allow MGR to run on any node including workers
        mgr:
          tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
        # Allow OSD to run only on worker nodes to save control plane resources
        osd:
          tolerations: []
      mon:
        count: 3  # Ceph requires 3 monitors for quorum
        allowMultiplePerNode: true  # Will put 2 on one node, 1 on the other
      mgr:
        count: 2  # Minimum 2 mgr for Rook-Ceph to function
        allowMultiplePerNode: true
        modules:
        - name: rook
          enabled: true
      dashboard:
        enabled: false  # Disable to save resources
        ssl: false
      crashCollector:
        disable: true  # Disable to reduce etcd objects
      # Disable log collector
      logCollector:
        enabled: false
      resources:
        mgr:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m  # Reduced from 500m
            memory: 512Mi
        mon:
          limits:
            memory: 2Gi
          requests:
            cpu: 100m  # Reduced from 500m
            memory: 1Gi
        osd:
          limits:
            memory: 4Gi
          requests:
            cpu: 200m  # Reduced from 500m
            memory: 2Gi
      storage:
        useAllNodes: false
        useAllDevices: false
        deviceFilter: "sdb"
        config:
          osdsPerDevice: "1"
          encryptedDevice: "false"
        nodes:
        - name: "talos-wk-1-gpu"
          devices:
          - name: "sdb"
            config:
              deviceClass: hdd
        - name: "talos-wk-2"
          devices:
          - name: "sdb"
            config:
              deviceClass: hdd
    cephBlockPools:
    - name: replicapool
      spec:
        failureDomain: host
        replicated:
          size: 2
          requireSafeReplicaSize: false
        # CRITICAL: Reduce PG count for small cluster
        parameters:
          pg_num: "32"  # Reduced from default 128
          pgp_num: "32"
      storageClass:
        enabled: true
        name: rook-ceph-block
        isDefault: true
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        parameters:
          imageFormat: "2"
          imageFeatures: layering
          csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
          csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
          csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
          csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
          csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
          csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
          csi.storage.k8s.io/fstype: ext4
    cephFileSystems:
    - name: myfs
      spec:
        metadataPool:
          replicated:
            size: 2
            requireSafeReplicaSize: false
          parameters:
            pg_num: "16"  # Reduced for metadata pool
        dataPools:
        - name: replicated
          failureDomain: host
          replicated:
            size: 2
            requireSafeReplicaSize: false
          parameters:
            pg_num: "32"  # Reduced for data pool
        metadataServer:
          activeCount: 1
          activeStandby: false  # Disable standby to save resources
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
      storageClass:
        enabled: true
        name: rook-cephfs
        reclaimPolicy: Delete
        allowVolumeExpansion: true
        parameters:
          csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
          csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
          csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
          csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
          csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
          csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
          csi.storage.k8s.io/fstype: ext4
    # Object store configuration for 2-node cluster
    cephObjectStores:
    - name: ceph-objectstore
      spec:
        metadataPool:
          failureDomain: host
          replicated:
            size: 2  # Reduced from default 3 for 2-node cluster
            requireSafeReplicaSize: false
          parameters:
            pg_num: "16"
        dataPool:
          failureDomain: osd  # Changed from host to osd since we only have 2 hosts
          replicated:
            size: 2  # Use replication instead of erasure coding for 2 nodes
            requireSafeReplicaSize: false
          parameters:
            pg_num: "32"
        preservePoolsOnDelete: false
        gateway:
          instances: 1  # Only 1 RGW instance to save resources
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 512Mi
      storageClass:
        enabled: true
        name: ceph-bucket
        reclaimPolicy: Delete