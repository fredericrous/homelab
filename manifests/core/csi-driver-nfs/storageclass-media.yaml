apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-media
provisioner: nfs.csi.k8s.io
parameters:
  server: "<path:secret/data/bootstrap/config#qnapNasIP>"
  share: "/Media"
  csi.storage.k8s.io/node-stage-secret-name: "nfscreds"
  csi.storage.k8s.io/node-stage-secret-namespace: "default"
mountOptions:
  - nfsvers=4.1
  - hard
  - timeo=600
  - retrans=2
  - noresvport