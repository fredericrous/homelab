apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-argocd-config
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-argocd-config-token-reader
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-admin-token-reader
subjects:
- kind: ServiceAccount
  name: vault-argocd-config
  namespace: vault
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-configure-argocd
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "5"  # Run after vault is initialized and configured
spec:
  backoffLimit: 3
  template:
    metadata:
      name: vault-configure-argocd
    spec:
      serviceAccountName: vault-argocd-config
      restartPolicy: OnFailure
      containers:
      - name: vault-configure
        image: hashicorp/vault:1.15
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_SKIP_VERIFY
          value: "true"
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for Vault to be ready..."
          until vault status 2>/dev/null; do
            echo "Vault not ready, waiting..."
            sleep 5
          done
          
          # Get Vault admin token
          export VAULT_TOKEN=$(cat /vault-admin-token/token)
          
          # Check if secrets already exist
          if vault kv get secret/argocd/ldap 2>/dev/null; then
            echo "LDAP secrets already exist in Vault, skipping..."
          else
            echo "Creating LDAP secrets in Vault..."
            vault kv put secret/argocd/ldap \
              dex.ldap.bindPW="lldap-admin-password"
          fi
          
          # Create or update policy
          echo "Creating Argo CD policy..."
          vault policy write argocd-policy - <<EOF
          path "secret/data/argocd/*" {
            capabilities = ["read"]
          }
          EOF
          
          # Create or update Kubernetes auth role
          echo "Configuring Kubernetes auth role for Argo CD..."
          vault write auth/kubernetes/role/argocd \
            bound_service_account_names=default,argocd-server,argocd-dex-server \
            bound_service_account_namespaces=argocd \
            policies=argocd-policy \
            ttl=24h
          
          echo "Vault configuration complete!"
        volumeMounts:
        - name: vault-admin-token
          mountPath: /vault-admin-token
          readOnly: true
      volumes:
      - name: vault-admin-token
        secret:
          secretName: vault-admin-token
          defaultMode: 0400