apiVersion: batch/v1
kind: Job
metadata:
  name: lldap-reset-admin-password
  namespace: lldap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: reset-password
        image: lldap/lldap:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "🔐 Resetting LLDAP admin password..."
          
          # Wait for LLDAP to be ready
          echo "⏳ Waiting for LLDAP to be ready..."
          for i in $(seq 1 30); do
            if nc -z lldap.lldap.svc.cluster.local 17170 2>/dev/null; then
              echo "✅ LLDAP is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 5
          done
          
          # Get passwords from mounted secrets
          LDAP_ADMIN_PASS=$(cat /secrets/ldap-user-pass)
          WEB_ADMIN_PASS=$(cat /secrets/user-pass)
          
          echo "🔑 Resetting admin password..."
          /app/lldap_set_password \
            --base-url http://lldap.lldap.svc.cluster.local:17170 \
            --admin-username admin \
            --admin-password "$LDAP_ADMIN_PASS" \
            --username admin \
            --password "$WEB_ADMIN_PASS"
          
          echo "✅ Admin password reset successfully"
        volumeMounts:
        - name: secrets
          mountPath: /secrets
          readOnly: true
      volumes:
      - name: secrets
        secret:
          secretName: lldap-secrets