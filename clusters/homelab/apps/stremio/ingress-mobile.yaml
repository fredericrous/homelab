apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stremio-mobile
  namespace: stremio
  annotations:
    haproxy-ingress.github.io/ssl-redirect: "true"
    # No client certificate verification for mobile access
spec:
  ingressClassName: haproxy
  tls:
  - hosts:
    - stremio-mobile.daddyshome.fr
    secretName: stremio-mobile-tls-certificate
  rules:
  - host: stremio-mobile.daddyshome.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: stremio-web
            port:
              number: 8080