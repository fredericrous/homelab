---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/homelab/infrastructure/postgres
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  force: true
  # No dependencies - included in infrastructure-data