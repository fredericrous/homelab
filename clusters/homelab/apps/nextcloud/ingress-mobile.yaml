apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud-mobile
  namespace: nextcloud
  annotations:
    haproxy-ingress.github.io/ssl-redirect: "true"
    haproxy-ingress.github.io/proxy-body-size: "10g"
    haproxy-ingress.github.io/timeout-server: "3600s"
    # No client certificate verification for mobile access
spec:
  ingressClassName: haproxy
  tls:
  - hosts:
    - drive-mobile.daddyshome.fr
    secretName: nextcloud-mobile-tls-certificate
  rules:
  - host: drive-mobile.daddyshome.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nextcloud
            port:
              number: 80