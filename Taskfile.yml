version: '3'

includes:
  nas:
    taskfile: ./nas/Taskfile.yml
    dir: ./nas

vars:
  TERRAFORM_DIR: './terraform'
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  TALOSCONFIG: '{{.ROOT_DIR}}/terraform/talosconfig'

env:
  KUBECONFIG: '{{.KUBECONFIG}}'

tasks:
  default:
    desc: Run full deployment
    cmds:
      - task: deploy

  deploy:
    desc: Deploy complete Kubernetes cluster
    cmds:
      - task: prereq
      - task: stage1
      - task: stage2
      - task: stage3
      - task: stage4
      - task: stage5
      - task: stage6
      - task: stage7
      - task: stage8
      - task: stage9
      - task: stage10
    
  prereq:
    desc: Pre-flight checks
    dir: '{{.TERRAFORM_DIR}}'
    preconditions:
      - sh: test -f terraform.tfvars
        msg: "terraform.tfvars not found. Copy terraform.tfvars.example and configure it"
    cmds:
      - |
        # Try to get transit token automatically
        if [ -z "$K8S_VAULT_TRANSIT_TOKEN" ]; then
          echo "🔍 Attempting to retrieve transit token from QNAP Vault..."
          
          # Try direct Vault access
          if command -v vault >/dev/null 2>&1; then
            export VAULT_ADDR=http://192.168.1.42:61200
            
            # Check if we have a token in environment or can read from QNAP
            if [ -n "$QNAP_VAULT_TOKEN" ]; then
              export VAULT_TOKEN="$QNAP_VAULT_TOKEN"
              K8S_VAULT_TRANSIT_TOKEN=$(vault kv get -field=token secret/k8s-transit 2>/dev/null || echo "")
            fi
          fi
          
          if [ -z "$K8S_VAULT_TRANSIT_TOKEN" ]; then
            echo "❌ Transit token not found"
            echo ""
            echo "To deploy, you need to:"
            echo "1. Deploy QNAP services first:"
            echo "   cd nas/"
            echo "   ./deploy-k3s-services.sh"
            echo ""
            echo "2. Initialize Vault and save the root token"
            echo ""
            echo "3. Export the QNAP Vault root token:"
            echo "   export QNAP_VAULT_TOKEN=<qnap-vault-root-token>"
            echo ""
            echo "The transit token will be automatically retrieved."
            exit 1
          else
            echo "✅ Found K8S_VAULT_TRANSIT_TOKEN"
            export K8S_VAULT_TRANSIT_TOKEN
          fi
        else
          echo "✅ K8S_VAULT_TRANSIT_TOKEN already set"
        fi
      - |
        if [ -f "./scripts/preflight-check.sh" ]; then
          echo "🔍 Running pre-flight checks..."
          ./scripts/preflight-check.sh || exit 1
        fi

  stage1:
    desc: "Stage 1: Create VMs and wait for Talos API"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [terraform-init]
    cmds:
      - 'echo "📦 Stage 1: Creating VMs and waiting for Talos API..."'
      - 'echo "  Using parallelism=1 to avoid Proxmox provider conflicts"'
      - 'terraform apply -auto-approve -parallelism=1 -target=data.external.schematic_base -target=data.external.schematic_gpu -target=proxmox_virtual_environment_download_file.talos_iso -target=module.vms -target=null_resource.wait_talos_ready'
    status:
      - 'terraform state show module.vms.proxmox_virtual_environment_vm.talos_nodes["controlplane"] 2>/dev/null'

  stage2:
    desc: "Stage 2: Configure control plane and bootstrap"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [stage1]
    cmds:
      - task: stage2a
      - task: stage2b

  stage2a:
    desc: "Stage 2a: Configure control plane"
    dir: '{{.TERRAFORM_DIR}}'
    cmds:
      - 'echo "🎯 Stage 2a: Configuring control plane..."'
      - 'terraform apply -auto-approve -parallelism=10 -var="configure_talos=true" -target=data.external.schematic_base -target=data.external.schematic_gpu -target=talos_machine_secrets.this -target=data.talos_machine_configuration.nodes -target=data.talos_client_configuration.this -target=null_resource.ensure_configs_dir -target=local_file.talosconfig -target=local_file.machine_configs -target=null_resource.apply_cp_config_smart -target=talos_machine_configuration_apply.cp'
    status:
      - 'terraform state show talos_machine_configuration_apply.cp 2>/dev/null'

  stage2b:
    desc: "Stage 2b: Bootstrap cluster and get kubeconfig"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [stage2a]
    cmds:
      - 'echo "🚀 Stage 2b: Bootstrapping Kubernetes and getting kubeconfig..."'
      - 'terraform apply -auto-approve -var="configure_talos=true" -target=talos_machine_bootstrap.this -target=talos_cluster_kubeconfig.this -target=local_file.kubeconfig'
    status:
      - 'test -f {{.KUBECONFIG}}'
      - 'terraform state show talos_machine_bootstrap.this 2>/dev/null'

  stage3:
    desc: "Stage 3: Add Helm repos and install Cilium CNI"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [stage2b]
    cmds:
      - 'echo "📦 Stage 3: Adding Helm repositories..."'
      - 'terraform apply -auto-approve -var="configure_talos=true" -target=null_resource.helm_repos'
      - 'echo "🌐 Stage 3b: Installing Cilium CNI (required before workers join)..."'
      - 'terraform apply -auto-approve -var="configure_talos=true" -target=null_resource.cilium_bootstrap'
    status:
      - 'kubectl get deployment -n kube-system cilium-operator 2>/dev/null'

  stage4:
    desc: "Stage 4: Configure workers"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [stage3]
    cmds:
      - 'echo "👷 Stage 4: Configuring workers..."'
      - 'terraform apply -auto-approve -parallelism=10 -var="configure_talos=true" -target=null_resource.apply_worker_configs_smart -target=talos_machine_configuration_apply.workers'
    status:
      - 'terraform state show talos_machine_configuration_apply.workers 2>/dev/null'

  stage5:
    desc: "Stage 5: Deploy ArgoCD and bootstrap GitOps"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [stage4]
    cmds:
      - 'echo "🚀 Stage 5: Deploying ArgoCD and bootstrapping GitOps..."'
      - 'terraform apply -auto-approve -var="configure_talos=true" -target=null_resource.argocd_install -target=null_resource.argocd_bootstrap -target=null_resource.argocd_info'
    status:
      - 'kubectl get deployment -n argocd argocd-server 2>/dev/null'

  stage6:
    desc: "Stage 6: Bootstrap DNS service"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [stage5]
    cmds:
      - 'echo "🌐 Stage 6: Bootstrapping DNS service..."'
      - 'terraform apply -auto-approve -var="configure_talos=true" -target=null_resource.dns_bootstrap'
    status:
      - 'kubectl get deployment -n kube-system coredns 2>/dev/null'

  stage7:
    desc: "Stage 7: Setup Vault transit token and bootstrap"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [kubeconfig-exists]
    preconditions:
      - sh: test -n "$K8S_VAULT_TRANSIT_TOKEN"
        msg: "K8S_VAULT_TRANSIT_TOKEN must be set"
    cmds:
      - 'echo "🔑 Stage 7: Setting up Vault transit unseal and bootstrapping..."'
      - |
        # Setup transit token
        if [ -f "./scripts/deploy-vault-transit.sh" ]; then
          ./scripts/deploy-vault-transit.sh "{{.KUBECONFIG}}"
        else
          ./scripts/setup-vault-transit-token.sh "{{.KUBECONFIG}}"
        fi
      - |
        # Bootstrap secrets for cert-manager and other services
        echo "🔐 Bootstrapping placeholder secrets..."
        echo "Using KUBECONFIG: ${KUBECONFIG}"
        kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
        
        if ! kubectl get secret ovh-credentials -n cert-manager &>/dev/null; then
          echo "📝 Creating placeholder OVH credentials for cert-manager..."
          kubectl create secret generic ovh-credentials \
            --namespace=cert-manager \
            --from-literal=applicationKey="placeholder" \
            --from-literal=applicationSecret="placeholder" \
            --from-literal=consumerKey="placeholder"
        fi
    status:
      - 'kubectl get secret vault-transit-token -n vault 2>/dev/null'
      - 'kubectl get secret ovh-credentials -n cert-manager 2>/dev/null'

  stage8:
    desc: "Stage 8: Deploy core services (Storage, Vault, VSO, cert-manager)"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [stage7]
    cmds:
      - 'echo "🔐 Stage 8: Deploying core services..."'
      - 'terraform apply -auto-approve -var="configure_talos=true" -target=null_resource.wait_for_appsets -target=null_resource.rook_ceph_sync -target=null_resource.vault_sync -target=null_resource.vso_sync -target=null_resource.cert_manager_sync'
    status:
      - 'kubectl get app -n argocd vault 2>/dev/null | grep -q "Synced"'
      - 'kubectl get app -n argocd rook-ceph 2>/dev/null | grep -q "Synced"'

  stage9:
    desc: "Stage 9: Wait for all nodes to be ready"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [stage8]
    cmds:
      - 'echo "⏳ Stage 9: Final verification..."'
      - 'terraform apply -auto-approve -var="configure_talos=true" -target=null_resource.wait_nodes_ready_updated'
    status:
      - 'kubectl get nodes | grep -v NotReady | grep -c Ready | grep -q 3'

  stage10:
    desc: "Stage 10: Verify cluster"
    deps: [stage9]
    cmds:
      - 'echo "✅ Stage 10: Verifying cluster..."'
      - 'kubectl get nodes'
      - 'echo ""'
      - 'kubectl get pods -n argocd'
      - |
        echo ""
        echo "🎉 Deployment complete!"
        echo ""
        echo "Next steps:"
        echo "  export KUBECONFIG={{.KUBECONFIG}}"
        echo "  export TALOSCONFIG={{.TALOSCONFIG}}"
        echo "  kubectl apply -k manifests/apps/  # Deploy applications via ArgoCD"
        echo ""
        echo "To check cluster health:"
        echo "  talosctl -n 192.168.1.67 health"

  # Helper tasks
  terraform-init:
    desc: Initialize Terraform
    dir: '{{.TERRAFORM_DIR}}'
    cmds:
      - 'terraform init'
    status:
      - 'test -d .terraform'

  kubeconfig-exists:
    desc: Check if kubeconfig exists
    preconditions:
      - sh: 'test -f {{.KUBECONFIG}}'
        msg: |
          Kubeconfig not found at {{.KUBECONFIG}}
          Run earlier stages first or specify custom path:
          KUBECONFIG=/path/to/kubeconfig task stage7

  # Utility tasks
  status:
    desc: Show deployment status
    cmds:
      - 'echo "🔍 Checking deployment status..."'
      - 'echo ""'
      - 'echo "Terraform state:"'
      - 'cd {{.TERRAFORM_DIR}} && terraform state list | grep -E "(vms|talos_machine|argocd)" | head -10'
      - |
        echo ""
        if [ -f {{.KUBECONFIG}} ]; then
          echo "Kubernetes nodes:"
          kubectl get nodes 2>/dev/null || echo "Cannot connect to cluster"
          echo ""
          echo "Core apps:"
          kubectl get app -n argocd 2>/dev/null | grep -E "(vault|rook-ceph|cert-manager)" || echo "ArgoCD not ready"
        else
          echo "Kubeconfig not found - cluster not bootstrapped yet"
        fi

  clean:
    desc: Clean up generated files (not terraform state!)
    prompt: This will remove generated configs. Continue?
    cmds:
      - 'rm -f {{.KUBECONFIG}}'
      - 'rm -f {{.TERRAFORM_DIR}}/talosconfig'
      - 'rm -f {{.TERRAFORM_DIR}}/configs/*.yaml'
      - 'echo "✅ Cleaned generated files (terraform state preserved)"'

  destroy:
    desc: Destroy the entire cluster
    dir: '{{.TERRAFORM_DIR}}'
    prompt: This will DESTROY the entire cluster. Are you sure?
    cmds:
      - 'terraform destroy -auto-approve'

  # Bootstrap tasks
  bootstrap-secrets:
    desc: Bootstrap secrets from QNAP Vault
    cmds:
      - |
        echo "🔐 Bootstrapping secrets from QNAP Vault..."
        
        # Create cert-manager namespace and OVH credentials
        kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
        
        # Check if placeholder secret exists
        if ! kubectl get secret ovh-credentials -n cert-manager &>/dev/null; then
          echo "📝 Creating placeholder OVH credentials..."
          kubectl create secret generic ovh-credentials \
            --namespace=cert-manager \
            --from-literal=applicationKey="placeholder" \
            --from-literal=applicationSecret="placeholder" \
            --from-literal=consumerKey="placeholder"
        fi
        
        echo "✅ Bootstrap secrets ready"

  configure-vault:
    desc: Configure Vault for services
    deps: [kubeconfig-exists]
    cmds:
      - |
        echo "🔐 Configuring Vault for services..."
        
        # Wait for Vault to be ready
        kubectl wait --for=condition=Ready pod/vault-0 -n vault --timeout=300s || true
        
        # Check if Vault is initialized
        if ! kubectl exec -n vault vault-0 -- vault status 2>&1 | grep -q "Initialized.*true"; then
          echo "⚠️  Vault not initialized yet"
          exit 1
        fi
        
        # Unseal if needed
        if kubectl exec -n vault vault-0 -- vault status 2>&1 | grep -q "Sealed.*true"; then
          echo "🔓 Unsealing Vault..."
          UNSEAL_KEY=$(kubectl get secret -n vault vault-keys -o jsonpath='{.data.unseal-key}' | base64 -d 2>/dev/null || echo "")
          if [ -n "$UNSEAL_KEY" ]; then
            kubectl exec -n vault vault-0 -- vault operator unseal "$UNSEAL_KEY"
          else
            echo "❌ No unseal key found"
            exit 1
          fi
        fi
        
        # Run configuration script
        if [ -f ./configure-vault-services.sh ]; then
          ./configure-vault-services.sh
        else
          echo "Configuration will be done by Vault jobs"
        fi

  # Quick access to specific services
  argocd-password:
    desc: Get ArgoCD admin password
    preconditions:
      - sh: 'test -f {{.KUBECONFIG}}'
        msg: "Kubeconfig not found"
    cmds:
      - 'kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d'
      - 'echo ""'

  vault-status:
    desc: Check Vault status
    preconditions:
      - sh: 'test -f {{.KUBECONFIG}}'
        msg: "Kubeconfig not found"
    cmds:
      - 'kubectl exec -n vault vault-0 -- vault status || echo "Vault not ready"'

  logs:
    desc: Show logs for a stage
    vars:
      STAGE: '{{.CLI_ARGS}}'
    cmds:
      - |
        case {{.STAGE}} in
          vault) kubectl logs -n vault -l app=vault --tail=50;;
          argocd) kubectl logs -n argocd -l app.kubernetes.io/name=argocd-server --tail=50;;
          *) echo "Usage: task logs -- [vault|argocd]";;
        esac