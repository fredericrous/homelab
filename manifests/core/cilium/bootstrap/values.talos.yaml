# Let Cilium replace kube-proxy
kubeProxyReplacement: true

# Overlay between nodes (simple & robust)
routingMode: "tunnel"
tunnelProtocol: "vxlan"
autoDirectNodeRoutes: false

# Host-reachable services so hostnetwork pods & the node can hit ClusterIPs
hostServices:
  enabled: true   # IMPORTANT for DNS from hostNetwork

# Turn off features that could interfere while you debug
enableL7Proxy: false
enableXDP: false

ipam:
  mode: "kubernetes"

cluster:
  name: homelab
  id: 1

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

# Good defaults
bpf:
  masquerade: true

tolerations:
  - operator: "Exists"

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi