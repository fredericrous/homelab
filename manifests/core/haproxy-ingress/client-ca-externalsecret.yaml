apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: client-ca-cert
  namespace: haproxy-controller
spec:
  refreshInterval: 30m
  
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: client-ca-cert
    creationPolicy: Owner
    deletionPolicy: Retain
    # Create as Opaque type with ca.crt key for HAProxy
    template:
      type: Opaque
      data:
        ca.crt: '{{ .ca_crt | toString }}'
  
  data:
  - secretKey: ca_crt
    remoteRef:
      key: secret/data/client-ca
      property: ca.crt