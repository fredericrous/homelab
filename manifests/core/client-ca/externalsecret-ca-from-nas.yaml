# ExternalSecret to sync CA certificate from NAS Vault to Main Cluster Vault
# This enables cross-cluster certificate management
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sync-ca-from-nas
  namespace: vault
spec:
  refreshInterval: 5m
  
  secretStoreRef:
    name: nas-vault-backend
    kind: ClusterSecretStore
  
  target:
    # This creates a temporary secret that we'll use to populate main Vault
    name: nas-ca-cert-temp
    creationPolicy: Owner
    deletionPolicy: Delete
  
  data:
  - secretKey: ca_crt
    remoteRef:
      key: secret/data/pki/ca
      property: ca.crt
---
# Job to sync the CA from ESO secret to main Vault
apiVersion: batch/v1
kind: Job
metadata:
  name: sync-ca-to-vault
  namespace: vault
spec:
  template:
    spec:
      serviceAccountName: vault-auth
      restartPolicy: OnFailure
      containers:
      - name: sync
        image: vault:1.14.1
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Wait for secret to be created by ESO
          while ! kubectl get secret nas-ca-cert-temp >/dev/null 2>&1; do
            echo "Waiting for ESO to create secret..."
            sleep 5
          done
          
          # Get CA certificate
          CA_CERT=$(kubectl get secret nas-ca-cert-temp -o jsonpath='{.data.ca_crt}' | base64 -d)
          
          # Authenticate to Vault
          export VAULT_ADDR=http://vault:8200
          vault login -method=kubernetes role=vault-auth
          
          # Store in main Vault
          vault kv put secret/client-ca ca.crt="$CA_CERT"
          
          echo "✅ CA certificate synced from NAS to main Vault"