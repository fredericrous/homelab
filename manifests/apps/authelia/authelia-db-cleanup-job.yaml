apiVersion: batch/v1
kind: Job
metadata:
  name: authelia-db-cleanup
  namespace: authelia
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: psql
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          set -e
          echo "Cleaning up authelia database..."
          
          # Drop and recreate the database
          PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres-apps-rw.postgres.svc.cluster.local -U authelia -d postgres <<EOF
          DROP DATABASE IF EXISTS authelia;
          CREATE DATABASE authelia OWNER authelia;
          GRANT ALL PRIVILEGES ON DATABASE authelia TO authelia;
          \c authelia
          GRANT ALL ON SCHEMA public TO authelia;
          EOF
          
          echo "Database cleanup completed!"
        env:
        - name: POSTGRES_PASSWORD
          value: "authelia-db-password"