name: rook-ceph
project: core
namespace: rook-ceph
path: manifests/core/rook-ceph
autoSync: "false"  # Storage control plane is critical
prune: "false"     # Never auto-prune storage resources
syncWave: "-22"
serverSideApply: "true"
syncOptions:
  - CreateNamespace=true
  - ServerSideApply=true
  - Replace=true
  - SkipDryRunOnMissingResource=true  # Skip CRD validation during dry-run
retryLimit: 5
syncTimeout: 600  # 10 minutes for Rook-Ceph
ignoreDifferences:
  - group: ceph.rook.io
    kind: CephCluster
    jsonPointers:
    - /status
  - group: ceph.rook.io
    kind: CephBlockPool
    jsonPointers:
    - /status
  - group: ceph.rook.io
    kind: CephFilesystem
    jsonPointers:
    - /status