apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-ovh-webhook
spec:
  acme:
    solvers:
    - dns01:
        webhook:
          groupName: acme.daddyshome.fr
          solverName: ovh
          config:
            endpoint: ovh-eu
            # The webhook v0.3.2 doesn't support *Ref for these fields
            # TODO: Implement proper Kustomize variable substitution
            applicationKey: "a4598a81b100e759"
            consumerKey: "cb8d03d3d3a2de55f9df196190022425"
            # Keep the secretRef for applicationSecret as it's supported
            applicationSecretRef:
              key: applicationSecret
              name: ovh-credentials