apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: authelia

resources:
  # App-specific resources
  - namespace.yaml
  - authelia-secrets-eso.yaml  # ESO resource for Authelia secrets
  - postgres-superuser-eso.yaml  # ESO resource for PostgreSQL credentials
  - ovh-credentials-eso.yaml  # ESO resource for OVH credentials
  - configmap.yaml
  - ca-configmap.yaml
  - ca-certificates-secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  # Argo Workflows
  - argo-workflow-rbac.yaml
  - workflow-database-setup.yaml
  - workflow-database-cleanup.yaml
  # - postgres-setup.yaml  # Replaced by workflow-database-setup.yaml
  # - vault-secrets-init.yaml  # Not needed, using ESO