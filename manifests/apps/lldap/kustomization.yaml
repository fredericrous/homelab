apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lldap

resources:
  # App-specific resources
  - namespace.yaml
  - serviceaccount.yaml
  # Argo Workflows
  - argo-workflow-rbac.yaml
  - workflow-vault-populate.yaml
  - workflow-database-setup.yaml
  # - job-vault-populate-lldap.yaml  # Replaced by workflow-vault-populate.yaml
  # - job-reset-admin-password.yaml  # Replaced by workflow (if needed)
  - pvc.yaml
  - lldap-secrets-eso.yaml  # ESO resource for LLDAP secrets
  - ovh-credentials-eso.yaml  # ESO resource for OVH credentials
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Note: Domain substitution happens via ArgoCD plugin
# The plugin replaces ${ARGO_EXTERNAL_DOMAIN} variables

patches:
  # Add backup annotations for persistent volumes
  - target:
      kind: Deployment
      name: lldap
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: lldap
      spec:
        template:
          metadata:
            annotations:
              backup.velero.io/backup-volumes: lldap-data