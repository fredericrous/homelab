apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-registry-user
  namespace: harbor
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-registry-user-secret
    template:
      type: Opaque
  data:
  - secretKey: username
    remoteRef:
      key: secret/harbor/registry-user
      property: username
  - secretKey: password
    remoteRef:
      key: secret/harbor/registry-user
      property: password