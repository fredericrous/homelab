apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      serviceAccountName: openwebui
      containers:
      - name: openwebui
        image: ghcr.io/open-webui/open-webui:main
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: OLLAMA_BASE_URL
          value: "http://vllm.vllm.svc.cluster.local:80/v1"
        - name: OPENAI_API_BASE_URL
          value: "http://vllm.vllm.svc.cluster.local:80/v1"
        - name: OPENAI_API_KEY
          value: "dummy-key"
        - name: WEBUI_AUTH
          value: "True"
        - name: WEBUI_NAME
          value: "HomeLab AI"
        - name: DEFAULT_MODELS
          value: "microsoft/phi-2"
        volumeMounts:
        - name: data
          mountPath: /app/backend/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: openwebui-data