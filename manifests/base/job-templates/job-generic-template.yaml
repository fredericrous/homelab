# Generic job template for one-time operations
apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-runner
  namespace: PLACEHOLDER
---
apiVersion: batch/v1
kind: Job
metadata:
  name: generic-job
  namespace: PLACEHOLDER
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: job-runner
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: job-runner
        image: bitnami/kubectl:latest
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: JOB_SCRIPT
          value: |
            echo "Replace this with your job script"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          eval "$JOB_SCRIPT"