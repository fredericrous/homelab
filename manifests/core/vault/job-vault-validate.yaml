apiVersion: batch/v1
kind: Job
metadata:
  name: vault-validate
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    argocd.argoproj.io/hook: PostSync
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
      - name: validate
        image: hashicorp/vault:1.20.1
        command:
        - /scripts/validate-vault-setup.sh
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_SKIP_VERIFY
          value: "true"
        volumeMounts:
        - name: vault-admin-token
          mountPath: /vault-admin-token
          readOnly: true
        - name: validation-scripts
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: vault-admin-token
        secret:
          secretName: vault-admin-token
      - name: validation-scripts
        configMap:
          name: vault-validation
          defaultMode: 0755