{{- if .Values.postgres.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "app-setup.fullname" . }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "app-setup.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-setup
spec:
  ttlSecondsAfterFinished: {{ .Values.jobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.jobs.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.jobs.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "app-setup.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-setup
    spec:
      serviceAccountName: {{ .Values.serviceAccount }}
      restartPolicy: OnFailure
      containers:
      - name: postgres-setup
        image: {{ .Values.jobs.image }}
        env:
        - name: PGHOST
          value: {{ .Values.postgres.host }}
        - name: PGUSER
          value: postgres
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgres.superuserSecret }}
              key: password
        - name: VAULT_ADDR
          value: {{ .Values.vault.address }}
        command: ['/bin/sh', '/scripts/create-db.sh']
        volumeMounts:
        - name: script
          mountPath: /scripts
        - name: vault-token
          mountPath: /vault-token
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: {{ include "app-setup.fullname" . }}-postgres-script
          defaultMode: 0755
      - name: vault-token
        secret:
          secretName: {{ .Values.vault.tokenSecret }}
          items:
          - key: token
            path: token
{{- end }}