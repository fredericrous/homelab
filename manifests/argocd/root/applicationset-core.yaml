# ApplicationSet for core platform components
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core
  namespace: argocd
spec:
  generators:
  # Single git generator for core app configurations
  - git:
      repoURL: https://github.com/fredericrous/homelab.git
      revision: main
      files:
      - path: "manifests/core/**/app.yaml"
  
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/fredericrous/homelab.git
        targetRevision: main
        path: '{{path}}'
        # Use Kustomize patches to substitute values from global-config.yaml
        kustomize:
          patches:
          # Patch for Cilium to replace PLACEHOLDER_CONTROL_PLANE_IP
          - target:
              kind: DaemonSet
              name: cilium
              namespace: kube-system
            patch: |
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: cilium
                namespace: kube-system
              spec:
                template:
                  spec:
                    containers:
                    - name: cilium-agent
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '192.168.1.67'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
                    initContainers:
                    - name: config
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '192.168.1.67'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
                    - name: mount-cgroup
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '192.168.1.67'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
                    - name: apply-sysctl-overwrites
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '192.168.1.67'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
                    - name: clean-cilium-state
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '192.168.1.67'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
                    - name: install-cni-binaries
                      env:
                      - name: KUBERNETES_SERVICE_HOST
                        value: '192.168.1.67'
                      - name: KUBERNETES_SERVICE_PORT
                        value: "6443"
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace={{default "true" .createNamespace}}
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSyncOnly=true
        - ServerSideApply={{default "false" .serverSideApply}}
        - Replace=true  # Needed for CRDs
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3
      
      # Standard ignore differences for common operators
      ignoreDifferences:
      # CloudNativePG
      - group: postgresql.cnpg.io
        kind: Cluster
        jsonPointers:
        - /spec/instances
        - /status
      # Cert-manager
      - group: cert-manager.io
        kind: Certificate
        jsonPointers:
        - /status
      # External Secrets Operator
      - group: external-secrets.io
        kind: ExternalSecret
        jsonPointers:
        - /status
        - /status/refreshTime
        - /status/syncedResourceVersion
      # Rook-Ceph
      - group: ceph.rook.io
        kind: CephCluster
        jsonPointers:
        - /status
      - group: ceph.rook.io
        kind: CephBlockPool
        jsonPointers:
        - /status
      # Cilium - ignore env vars that are substituted during bootstrap
      - group: apps
        kind: DaemonSet
        name: cilium
        namespace: kube-system
        jqPathExpressions:
        - .spec.template.spec.containers[].env[]? | select(.name == "KUBERNETES_SERVICE_HOST").value
        - .spec.template.spec.initContainers[].env[]? | select(.name == "KUBERNETES_SERVICE_HOST").value