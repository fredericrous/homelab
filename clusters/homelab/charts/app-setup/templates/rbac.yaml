{{- if .Values.rbac.create }}
{{- if .Values.postgres.enabled }}
---
# Allow reading postgres superuser secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "app-setup.fullname" . }}-postgres-reader
  namespace: postgres
  labels:
    {{- include "app-setup.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["{{ .Values.postgres.superuserSecret }}"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "app-setup.fullname" . }}-postgres-reader
  namespace: postgres
  labels:
    {{- include "app-setup.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "app-setup.fullname" . }}-postgres-reader
subjects:
- kind: ServiceAccount
  name: {{ include "app-setup.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}

{{- range .Values.rbac.additionalNamespaces }}
---
# Additional namespace access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "app-setup.fullname" $ }}-{{ . }}-access
  namespace: {{ . }}
  labels:
    {{- include "app-setup.labels" $ | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "app-setup.fullname" $ }}-{{ . }}-access
  namespace: {{ . }}
  labels:
    {{- include "app-setup.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "app-setup.fullname" $ }}-{{ . }}-access
subjects:
- kind: ServiceAccount
  name: {{ include "app-setup.serviceAccountName" $ }}
  namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}