apiVersion: batch/v1
kind: Job
metadata:
  name: vault-setup
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: default  # Will be patched by the app
      restartPolicy: OnFailure
      containers:
      - name: vault-setup
        image: hashicorp/vault:1.17.3
        command: ['/bin/sh', '/scripts/setup.sh']
        env:
        - name: VAULT_ADDR
          value: http://vault-vault.vault.svc.cluster.local:8200
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-admin-token
              key: token
# APP_NAME will be added by patches
        volumeMounts:
        - name: script
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: script
        configMap:
          name: vault-setup-script
          defaultMode: 0755