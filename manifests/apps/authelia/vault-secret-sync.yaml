# Service account for Authelia
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authelia
  namespace: authelia
---
# VaultStaticSecret for Authelia secrets
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: authelia-secrets
  namespace: authelia
spec:
  vaultAuthRef: authelia-auth
  mount: secret
  type: kv-v2
  path: authelia
  destination:
    create: true  # Create the secret from Vault
    name: authelia-secrets
    transformation:
      templates:
        JWT_SECRET:
          text: '{{ .Secrets.jwt-secret }}'
        SESSION_SECRET:
          text: '{{ .Secrets.session-secret }}'
        STORAGE_ENCRYPTION_KEY:
          text: '{{ .Secrets.storage-encryption-key }}'
        STORAGE_PASSWORD:
          text: '{{ .Secrets.storage-password }}'
        AUTHENTICATION_BACKEND_LDAP_PASSWORD:
          text: '{{ .Secrets.ldap-password }}'
  refreshAfter: 30s
  hmacSecretData: true