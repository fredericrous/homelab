apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-envsubst-plugin-config
  namespace: argocd
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: argocd-envsubst-plugin
    spec:
      generate:
        command: ["sh", "-c"]
        args:
          - |
            # Render manifests with Kustomize, handling Helm charts
            kustomize build . --enable-helm > all.yaml
            
            # Apply environment variable substitution
            envsubst < all.yaml
      discover:
        find:
          command: ["sh", "-c", "find . -name 'kustomization.yaml' -o -name 'kustomization.yml' | grep -q . && echo 'kustomization found'"]