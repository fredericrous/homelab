apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: haproxy-default-ssl
  namespace: haproxy-controller
spec:
  secretName: haproxy-default-ssl-tls
  issuerRef:
    name: letsencrypt-ovh-webhook
    kind: ClusterIssuer
  commonName: "*.daddyshome.fr"
  dnsNames:
  - "*.daddyshome.fr"
  - "daddyshome.fr"