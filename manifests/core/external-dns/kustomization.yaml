apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-dns

resources:
  - namespace.yaml
  - ovh-credentials-externalsecret.yaml
  - vault-populate-job.yaml

helmCharts:
  - name: external-dns
    repo: https://kubernetes-sigs.github.io/external-dns/
    version: 1.15.0  # Latest stable chart version
    releaseName: external-dns
    namespace: external-dns
    valuesFile: values.yaml