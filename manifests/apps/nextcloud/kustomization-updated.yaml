apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nextcloud

# Use shared bases
resources:
  # Include shared vault auth base
  - ../base/vault-auth
  # App-specific resources
  - namespace.yaml
  - serviceaccount.yaml  # For the main app, not vault-config
  - pvc.yaml
  - pvc-smb.yaml
  - job-vault-configure-nextcloud.yaml
  - nextcloud-vault-secret.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - ingress-mobile.yaml
  # Database initialization
  - postgres-superuser-secret.yaml
  - postgres-create-db-fixed.yaml
  # Vault secrets initialization
  - vault-populate-secrets-job.yaml
  # Jobs for initial setup and configuration
  - job-initial-setup.yaml
  - job-configure-local-external-storage.yaml
  - job-configure-utf8-support.yaml

# Include backup base for velero annotations
bases:
  - ../base/backup

# Patches to customize the shared bases
patches:
  # Patch vault auth with correct service account and role
  - target:
      kind: VaultAuth
      name: vault-auth
    patch: |-
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultAuth
      metadata:
        name: nextcloud-auth
      spec:
        kubernetes:
          role: nextcloud
          serviceAccount: nextcloud
  
  # Patch the RBAC for vault token reader
  - target:
      kind: RoleBinding
      name: PLACEHOLDER-vault-admin-token-reader
    patch: |-
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: nextcloud-vault-admin-token-reader
      subjects:
      - kind: ServiceAccount
        name: vault-config
        namespace: nextcloud
  
  # Patch backup annotations
  - target:
      kind: Deployment
      name: nextcloud
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nextcloud
      spec:
        template:
          metadata:
            annotations:
              backup.velero.io/backup-volumes: nextcloud-data
  
  # App-specific patches
  - path: patch-security-context.yaml
    target:
      kind: Deployment
      name: nextcloud
  - path: patch-smb-volumes.yaml
    target:
      kind: Deployment
      name: nextcloud
  # - path: patch-gpu-runtime.yaml  # Enable once GPU node is fixed
  #   target:
  #     kind: Deployment
  #     name: nextcloud