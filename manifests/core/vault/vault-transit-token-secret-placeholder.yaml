# This is a placeholder for the vault-transit-token secret
# The actual secret is created by Terraform with the real token
# This placeholder prevents ArgoCD from pruning the secret
apiVersion: v1
kind: Secret
metadata:
  name: vault-transit-token
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-options: Replace=false
type: Opaque
stringData:
  token: "PLACEHOLDER_WILL_BE_REPLACED_BY_TERRAFORM"