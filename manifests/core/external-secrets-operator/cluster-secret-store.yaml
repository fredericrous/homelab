apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  annotations:
    argocd.argoproj.io/sync-wave: "10"  # After operator is deployed
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"  # KV v2 mount path
      version: "v2"
      
      # Kubernetes auth
      auth:
        kubernetes:
          mountPath: "kubernetes-eso"  # Dedicated auth path for ESO
          role: "eso-role"
          serviceAccountRef:
            name: "external-secrets"  # Default ESO service account
            namespace: "external-secrets"