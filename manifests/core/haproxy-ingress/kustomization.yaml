apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: haproxy-controller

resources:
  - ../../base/vault-auth
  - haproxy-ingress.yaml
  - ingressclass.yaml
  - client-ca-secret.yaml
  - vault-configure-haproxy.yaml

patches:
  - target:
      kind: Deployment
      name: haproxy-kubernetes-ingress
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--ingress-class=haproxy"
  - target:
      kind: ConfigMap
      name: haproxy-kubernetes-ingress
    patch: |-
      - op: add
        path: /data/client-ca
        value: "haproxy-controller/client-ca-cert"
  - target:
      kind: Service
      name: haproxy-kubernetes-ingress
    patch: |-
      - op: replace
        path: /spec/ports/0/nodePort
        value: 30080
      - op: replace
        path: /spec/ports/1/nodePort
        value: 30443
      - op: replace
        path: /spec/ports/2/nodePort
        value: 31024
  - target:
      kind: VaultAuth
      name: vault-auth
    patch: |-
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultAuth
      metadata:
        name: vault-auth
        namespace: haproxy-controller
      spec:
        kubernetes:
          role: haproxy-ingress
          serviceAccount: default
  - target:
      kind: RoleBinding  
      name: PLACEHOLDER-vault-admin-token-reader
      namespace: vault
    patch: |-
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: haproxy-vault-admin-token-reader
        namespace: vault
      subjects:
      - kind: ServiceAccount
        name: vault-config
        namespace: haproxy-controller