---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-vault-setup-script
  namespace: postgres
data:
  setup.sh: |
    #!/bin/sh
    set -e
    
    echo "🔐 Setting up Vault secrets for PostgreSQL..."
    
    # Set Vault address first
    export VAULT_ADDR=http://vault-vault.vault.svc.cluster.local:8200
    
    # Wait for Vault to be ready
    echo "Setting up Vault connection to $VAULT_ADDR"
    until vault status | grep -q "Sealed.*false"; do
      echo "Waiting for Vault to be unsealed..."
      sleep 5
    done
    echo "✅ Vault is ready"
    
    # Check if PostgreSQL superuser credentials already exist
    if vault kv get -mount=secret postgres > /dev/null 2>&1; then
      echo "✅ PostgreSQL superuser credentials already exist in Vault"
    else
      echo "📝 Creating PostgreSQL superuser credentials in Vault"
      vault kv put -mount=secret postgres \
        POSTGRES_USER=postgres \
        POSTGRES_PASSWORD=$(head -c 32 /dev/urandom | base64 | tr -d "=+/" | head -c 32)
    fi
    
    # Check if application databases credentials are set
    for APP in authelia nextcloud harbor lldap; do
      if vault kv get -mount=secret $APP/postgres > /dev/null 2>&1; then
        echo "✅ PostgreSQL credentials for $APP already exist"
      else
        echo "📝 Creating PostgreSQL credentials for $APP"
        vault kv put -mount=secret $APP/postgres \
          username=$APP \
          password=$(head -c 16 /dev/urandom | base64 | tr -d "=+/" | head -c 16)
      fi
    done
    
    # Create Vault policy for PostgreSQL
    echo "📝 Creating PostgreSQL Vault policy"
    vault policy write postgres-policy - <<EOF
    path "secret/data/postgres" {
      capabilities = ["read"]
    }
    EOF
    
    # Create Kubernetes auth role for postgres namespace
    echo "📝 Creating PostgreSQL Kubernetes auth role"
    vault write auth/kubernetes/role/postgres \
      bound_service_account_names=postgres-vault-setup,default \
      bound_service_account_namespaces=postgres \
      policies=postgres-policy \
      ttl=24h
    
    echo "✅ PostgreSQL Vault setup complete!"