apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
      - name: init-vault
        image: hashicorp/vault:1.20.1
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Install bash, jq and kubectl
          echo "📦 Installing required tools..."
          apk add --no-cache bash jq kubectl
          
          # Make script executable
          chmod +x /scripts/vault-init.sh
          
          # Execute the initialization script
          echo "🚀 Running Vault initialization script..."
          exec /scripts/vault-init.sh
        env:
        - name: VAULT_SKIP_VERIFY
          value: "true"
        volumeMounts:
        - name: recovery
          mountPath: /recovery
        - name: init-script
          mountPath: /scripts
      volumes:
      - name: recovery
        configMap:
          name: vault-recovery
          optional: true
      - name: init-script
        configMap:
          name: vault-init-script
          defaultMode: 0755