apiVersion: batch/v1
kind: Job
metadata:
  name: build-stremio-web
  namespace: stremio
spec:
  template:
    spec:
      initContainers:
      - name: git-clone
        image: alpine/git:latest
        command:
        - sh
        - -c
        - |
          cd /workspace
          rm -rf ..?* .[!.]* *
          git clone https://github.com/Stremio/stremio-web.git .
          git checkout development
          ls -la
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      containers:
      - name: buildctl
        image: moby/buildkit:latest
        command:
        - sh
        - -c
        - |
          # Copy docker config from mounted secret
          echo "Setting up Docker authentication..."
          mkdir -p ~/.docker
          cp /docker-config/.dockerconfigjson ~/.docker/config.json
          
          # Extract credentials from config
          export HARBOR_USER=$(cat ~/.docker/config.json | jq -r '.auths["harbor-registry.harbor.svc.cluster.local:5000"].username')
          export HARBOR_PASS=$(cat ~/.docker/config.json | jq -r '.auths["harbor-registry.harbor.svc.cluster.local:5000"].password')
          
          # Test authentication with Harbor registry v2 API
          echo "Testing Harbor registry authentication..."
          apk add --no-cache curl jq
          
          # Check if image already exists
          echo "Checking if image already exists in Harbor..."
          if curl -f -s -u "$HARBOR_USER:$HARBOR_PASS" \
            "http://harbor-registry.harbor.svc.cluster.local:5000/v2/library/stremio-web/manifests/latest" >/dev/null; then
            echo "Image already exists in Harbor. Skipping build."
            exit 0
          fi
          
          # Build and push directly to registry
          echo "Image not found. Starting build..."
          buildctl --addr tcp://buildkitd:1234 build \
            --frontend dockerfile.v0 \
            --local context=/workspace \
            --local dockerfile=/workspace \
            --output type=image,name=harbor-registry.harbor.svc.cluster.local:5000/library/stremio-web:latest,push=true
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: docker-config
          mountPath: /docker-config
          readOnly: true
        env:
        - name: DOCKER_CONFIG
          value: /root/.docker
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: build-workspace
      - name: docker-config
        secret:
          secretName: harbor-registry-creds
      restartPolicy: Never
