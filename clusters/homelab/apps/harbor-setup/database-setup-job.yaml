apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-database-setup
  namespace: postgres
spec:
  template:
    metadata:
      name: harbor-database-setup
    spec:
      serviceAccountName: postgres-admin
      containers:
      - name: postgres-setup
        image: postgres:15
        env:
        - name: PGHOST
          value: postgres-apps-rw.postgres.svc.cluster.local
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: postgres-apps-superuser
              key: username
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-apps-superuser
              key: password
        command:
        - /bin/bash
        - -c
        - |
          set -e
          
          # Wait for PostgreSQL to be ready
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready; do
            echo "PostgreSQL is not ready yet. Waiting..."
            sleep 5
          done
          
          # Function to check if database exists
          check_database_exists() {
            psql -tAc "SELECT 1 FROM pg_database WHERE datname='$1'" | grep -q 1
          }
          
          # Get the database password from vault secret (synced by ESO)
          DB_PASSWORD=$(cat /vault-secrets/password)
          
          # Create Harbor databases if they don't exist
          databases=("registry" "notary_signer" "notary_server")
          
          for db in "${databases[@]}"; do
            if ! check_database_exists "$db"; then
              echo "Creating Harbor database: $db..."
              psql <<-EOF
                CREATE USER harbor WITH ENCRYPTED PASSWORD '$DB_PASSWORD';
                CREATE DATABASE $db OWNER harbor;
                GRANT ALL PRIVILEGES ON DATABASE $db TO harbor;
                \c $db
                GRANT ALL ON SCHEMA public TO harbor;
          EOF
            else
              echo "Harbor database $db already exists"
            fi
          done
          
          echo "Harbor database setup completed!"
        volumeMounts:
        - name: db-secrets
          mountPath: /vault-secrets
          readOnly: true
      volumes:
      - name: db-secrets
        secret:
          secretName: harbor-db
      restartPolicy: OnFailure
  backoffLimit: 3