apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-database-setup
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c']
        args:
        - |
          echo "Waiting for PostgreSQL cluster..."
          until nc -z postgres-apps-rw.postgres.svc.cluster.local 5432; do
            echo "PostgreSQL not ready yet..."
            sleep 5
          done
          echo "PostgreSQL is ready"
      containers:
      - name: postgres-setup
        image: postgres:16-alpine
        env:
        - name: PGHOST
          value: postgres-apps-rw.postgres.svc.cluster.local
        - name: PGPORT
          value: "5432"
        - name: PGUSER
          value: postgres
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-superuser-secret
              key: password
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: database-password
        command:
        - sh
        - -c
        - |
          set -e
          echo "Setting up Nextcloud database..."
          
          # Check if user exists
          if psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='nextcloud'" | grep -q 1; then
            echo "✓ User 'nextcloud' already exists"
            # Update password
            psql -c "ALTER USER nextcloud WITH PASSWORD '$DB_PASSWORD';"
          else
            psql -c "CREATE USER nextcloud WITH PASSWORD '$DB_PASSWORD';"
            echo "✓ User 'nextcloud' created"
          fi
          
          # Check if database exists
          if psql -tAc "SELECT 1 FROM pg_database WHERE datname='nextcloud'" | grep -q 1; then
            echo "✓ Database 'nextcloud' already exists"
          else
            psql -c "CREATE DATABASE nextcloud OWNER nextcloud;"
            echo "✓ Database 'nextcloud' created"
          fi
          
          # Grant privileges
          psql -c "GRANT ALL PRIVILEGES ON DATABASE nextcloud TO nextcloud;"
          echo "✓ Privileges granted"
          
          # Connect to nextcloud database and set UTF8
          psql -d nextcloud -c "ALTER DATABASE nextcloud SET lc_collate TO 'en_US.UTF-8';" || true
          psql -d nextcloud -c "ALTER DATABASE nextcloud SET lc_ctype TO 'en_US.UTF-8';" || true
          
          echo "✅ Database setup complete"