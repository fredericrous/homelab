apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ovh-credentials-vault
  namespace: cert-manager
spec:
  vaultAuthRef: cert-manager-auth
  type: kv-v2
  mount: secret
  path: cert-manager/ovh
  destination:
    name: ovh-credentials
    create: true
    type: Opaque
  refreshAfter: 30s