# ClusterSecretStore for accessing NAS Vault
# Enables cross-cluster secret synchronization
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: nas-vault-backend
spec:
  provider:
    vault:
      server: "PLACEHOLDER_NAS_VAULT_ADDR"  # NAS Vault
      path: "secret"
      version: "v2"

      auth:
        # Token auth - token must be created separately during deployment
        # The nas-vault-token secret is created by configure-nas-eso-sync.sh
        # when NAS_ESO_TOKEN is available
        tokenSecretRef:
          name: nas-vault-token
          namespace: external-secrets
          key: token
