apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: velero

resources:
  # Include shared vault auth base
  - ../../../base/vault-auth
  # Include job templates
  - ../../../base/job-templates
  # App-specific resources
  - namespace-velero.yaml
  - volumesnapshotclass-rbd.yaml
  - volumesnapshotclass-cephfs.yaml
  # - vault-auth-velero.yaml  # Now provided by base/vault-auth
  - vaultstaticsecret-velero-credentials.yaml
  - secret-velero-credentials.yaml
  - pvc-nfs-velero.yaml
  # - job-vault-configure-velero.yaml  # Now using job-templates base
  # - job-vault-policy-update.yaml  # Replaced by job-vault-configure-velero.yaml
  # - job-vault-populate-secrets.yaml  # Now using job-templates base
  - cronjob-backup-sync-nfs.yaml

helmCharts:
  - name: snapshot-controller
    repo: https://piraeus.io/helm-charts
    version: 4.1.0
    releaseName: snapshot-controller
    namespace: kube-system
    valuesFile: values-snapshot-controller.yaml
  - name: velero
    repo: https://vmware-tanzu.github.io/helm-charts
    version: 10.1.0
    releaseName: velero
    namespace: velero
    valuesFile: values-velero.yaml

patches:
  # Customize the vault auth from base
  - target:
      kind: VaultAuth
      name: vault-auth
    patch: |-
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultAuth
      metadata:
        name: velero-auth
        namespace: velero
      spec:
        kubernetes:
          role: velero
          serviceAccount: velero
  
  # Customize the RBAC for vault token reader
  - target:
      kind: RoleBinding
      name: PLACEHOLDER-vault-admin-token-reader
      namespace: vault
    patch: |-
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: velero-vault-admin-token-reader
        namespace: vault
      subjects:
      - kind: ServiceAccount
        name: vault-config
        namespace: velero
  
  # Customize the vault configure job from v2 template
  - target:
      kind: Job
      name: vault-configure
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: vault-configure-velero
        namespace: velero
      spec:
        template:
          spec:
            containers:
            - name: vault-configure
              env:
              - name: SERVICE_NAME
                value: velero
              - name: POLICY_NAME
                value: velero
              - name: ROLE_NAME
                value: velero
              - name: SERVICE_ACCOUNT
                value: vault-auth-velero
              - name: NAMESPACE
                value: velero
              - name: POLICY_CONTENT
                value: |
                  path "secret/data/velero" {
                    capabilities = ["create", "read", "update", "patch", "list"]
                  }
                  path "secret/data/velero/*" {
                    capabilities = ["create", "read", "update", "patch", "list"]
                  }
                  path "secret/metadata/velero" {
                    capabilities = ["list"]
                  }
                  path "secret/metadata/velero/*" {
                    capabilities = ["list"]
                  }
  
  # Customize the vault populate job from v2 template
  - target:
      kind: Job
      name: vault-populate
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: vault-populate-velero-secrets
        namespace: velero
      spec:
        template:
          spec:
            serviceAccountName: vault-auth-velero
            containers:
            - name: vault-populate
              env:
              - name: SERVICE_NAME
                value: velero
              - name: POPULATE_SCRIPT
                value: |
                  # Get service account token
                  SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  
                  # Login to Vault using Kubernetes auth
                  echo "Logging into Vault..."
                  VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
                    role=velero \
                    jwt=$SA_TOKEN)
                  
                  export VAULT_TOKEN
                  
                  # Check and populate AWS credentials
                  echo "Checking AWS credentials..."
                  if ! vault kv get secret/velero >/dev/null 2>&1; then
                    echo "Creating AWS credentials in Vault..."
                    vault kv put secret/velero \
                      aws_access_key_id="${AWS_ACCESS_KEY_ID}" \
                      aws_secret_access_key="${AWS_SECRET_ACCESS_KEY}"
                  else
                    echo "AWS credentials already exist. Updating..."
                    vault kv patch secret/velero \
                      aws_access_key_id="${AWS_ACCESS_KEY_ID}" \
                      aws_secret_access_key="${AWS_SECRET_ACCESS_KEY}"
                  fi
                  
                  # Check and populate MinIO password
                  echo "Checking MinIO credentials..."
                  if ! vault kv get secret/velero/minio >/dev/null 2>&1; then
                    echo "Generating MinIO password..."
                    MINIO_PASSWORD=$(openssl rand -base64 32)
                    vault kv put secret/velero/minio \
                      password="$MINIO_PASSWORD"
                    echo "MinIO password created"
                  else
                    echo "MinIO password already exists"
                  fi
              - name: VAULT_SKIP_VERIFY
                value: "true"
              - name: AWS_ACCESS_KEY_ID
                value: "REPLACE_WITH_ACTUAL_KEY"  # TODO: Add as secret
              - name: AWS_SECRET_ACCESS_KEY
                value: "REPLACE_WITH_ACTUAL_SECRET"  # TODO: Add as secret