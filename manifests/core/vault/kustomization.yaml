apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vault

# ConfigMaps no longer needed with simplified init

resources:
  # Include base resources
  # NOTE: Vault doesn't use vault-auth base because:
  # 1. It doesn't need VSO to manage its own secrets
  # 2. This avoids circular dependency (VSO needs Vault, Vault needs VSO CRDs)
  # 3. Vault uses direct secret mounts and init containers
  - ../../base/job-templates
  # App-specific resources
  - namespace.yaml
  - vault-config.yaml
  - vault-config-serviceaccount.yaml  # Service account for vault-config jobs
  - vault-storage.yaml
  # - job-vault-force-init.yaml  # Only use if you need to wipe vault data
  - vault-service.yaml
  - ingress.yaml
  - rbac-vault-config-role.yaml
  - rbac-vault-secret-manager.yaml
  - vault-transit-token-secret-placeholder.yaml  # Placeholder to prevent ArgoCD from pruning the secret
  # - job-configure-transit-token.yaml  # Not needed - terraform creates the secret
  - job-vault-init-simplified.yaml  # Simplified init for transit unseal
  - vault-configure-argocd-job.yaml  # Configure Vault for ArgoCD after initialization
  - job-configure-app-ovh-access.yaml  # Configure OVH access for apps
  - job-configure-cert-manager-vault-access.yaml  # Configure cert-manager Vault access
  # vault-pvc.yaml is duplicate of vault-storage.yaml

patches:
  - path: patch-velero-backup.yaml
    target:
      kind: StatefulSet
      name: vault
  - path: patch-liveness-probe.yaml
    target:
      kind: StatefulSet
      name: vault
  
  # Add sync waves to jobs for proper ordering
  - target:
      kind: Job
      name: secret-copier
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: secret-copier
        annotations:
          argocd.argoproj.io/sync-wave: "-1"
  
  
  - target:
      kind: Job
      name: vault-configure
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: vault-configure
        annotations:
          argocd.argoproj.io/sync-wave: "3"
  
  - target:
      kind: Job
      name: vault-populate
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: vault-populate
        annotations:
          argocd.argoproj.io/sync-wave: "4"
  
  # Comment out secret-copier for now - it creates a circular dependency
  # The secret it's trying to copy (ovh-credentials) might not exist yet
