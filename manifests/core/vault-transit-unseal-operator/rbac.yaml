apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-transit-unseal-operator
  namespace: vault-transit-unseal-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-transit-unseal-operator
rules:
# Core resources
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
# Custom resources
- apiGroups: ["vault.homelab.io"]
  resources: ["vaulttransitunseals"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["vault.homelab.io"]
  resources: ["vaulttransitunseals/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["vault.homelab.io"]
  resources: ["vaulttransitunseals/finalizers"]
  verbs: ["update"]
# Events for debugging
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# Leader election
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-transit-unseal-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-transit-unseal-operator
subjects:
- kind: ServiceAccount
  name: vault-transit-unseal-operator
  namespace: vault-transit-unseal-operator
