apiVersion: batch/v1
kind: Job
metadata:
  name: vault-populate
  namespace: default  # Will be overridden
spec:
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: OnFailure
      containers:
      - name: vault-populate
        image: hashicorp/vault:1.16
        command: ["/scripts/populate-vault.sh"]
        env:
        - name: VAULT_ADDR
          value: http://vault.vault.svc.cluster.local:8200
        - name: SERVICE_NAME
          value: ""  # Set by service patch
        - name: POPULATE_SCRIPT
          value: |  # Set by service patch
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: vault-populate-scripts
          defaultMode: 0755
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-populate-scripts
  namespace: default  # Will be overridden
data:
  populate-vault.sh: |
    #!/bin/sh
    set -e
    
    # Wait for Vault to be ready
    until vault status 2>/dev/null | grep -q "Sealed.*false"; do
      echo "Waiting for Vault to be unsealed..."
      sleep 5
    done
    
    # Get admin token from vault namespace
    echo "Fetching vault admin token..."
    export VAULT_TOKEN=$(kubectl get secret vault-admin-token -n vault -o jsonpath='{.data.token}' | base64 -d)
    
    if [ -z "$VAULT_TOKEN" ]; then
      echo "Error: Could not fetch vault admin token"
      exit 1
    fi
    
    echo "Populating ${SERVICE_NAME} secrets..."
    
    # Execute service-specific populate script
    eval "${POPULATE_SCRIPT}"
    
    echo "${SERVICE_NAME} secrets population completed successfully"