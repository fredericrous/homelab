apiVersion: batch/v1
kind: Job
metadata:
  name: authelia-vault-secrets-init
  namespace: vault
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: vault-init
        image: hashicorp/vault:1.14.0
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-init-token
              key: token
        command:
        - /bin/sh
        - -c
        - |
          # Initialize postgres superuser secret
          vault kv put secret/postgres/superuser \
            password=initial-password-change-me
          
          # Initialize authelia secrets
          # Generate random secrets using /dev/urandom
          SESSION_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '\n=' | cut -c1-32)
          STORAGE_KEY=$(head -c 32 /dev/urandom | base64 | tr -d '\n=' | cut -c1-32)
          JWT_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '\n=' | cut -c1-32)
          
          echo "Generated secrets:"
          echo "SESSION_SECRET: $SESSION_SECRET"
          echo "STORAGE_KEY: $STORAGE_KEY"
          echo "JWT_SECRET: $JWT_SECRET"
          
          vault kv put secret/authelia \
            session-secret="$SESSION_SECRET" \
            storage-encryption-key="$STORAGE_KEY" \
            storage-password="authelia-db-password" \
            jwt-secret="$JWT_SECRET" \
            ldap-password="lldap-admin-password"
          
          echo "Vault secrets initialized successfully"
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-init-token
  namespace: vault
stringData:
  token: REPLACE_WITH_VAULT_TOKEN  # This should be populated from vault-admin-token secret