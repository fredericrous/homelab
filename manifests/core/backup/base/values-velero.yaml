credentials:
  existingSecret: velero-credentials

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  server:
    create: true
    name: velero

deployNodeAgent: true

nodeAgent:
  podVolumePath: /var/lib/kubelet/pods
  privileged: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: false

backupsEnabled: true
restoreOnlyMode: false

logLevel: info
logFormat: text

defaultBackupTTL: 720h
defaultItemOperationTimeout: 4h

uploaderType: kopia
