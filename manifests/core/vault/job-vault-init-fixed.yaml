apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
      - name: vault-init
        image: hashicorp/vault:1.17.6
        command:
        - sh
        - -c
        - |
          set -e
          
          # Wait for Vault pod to be running
          echo "Waiting for Vault pod to be ready..."
          for i in {1..30}; do
            if kubectl get pod vault-0 -n vault -o jsonpath='{.status.phase}' 2>/dev/null | grep -q "Running"; then
              echo "Vault pod is running"
              break
            fi
            echo "Waiting for Vault pod... ($i/30)"
            sleep 2
          done
          
          # Check if already initialized (vault status returns exit code 2 when uninitialized)
          VAULT_STATUS=$(vault status -format=json 2>&1 || echo "{}")
          if echo "$VAULT_STATUS" | jq -e '.initialized == true' >/dev/null 2>&1; then
            echo "Vault is already initialized"
            
            # Check if we have the keys
            if kubectl get secret -n vault vault-keys >/dev/null 2>&1 && kubectl get secret -n vault vault-admin-token >/dev/null 2>&1; then
              echo "Vault keys and admin token already exist. Exiting successfully."
              exit 0
            else
              echo "WARNING: Vault is initialized but keys are missing!"
              echo "This is a critical issue - the vault data is locked and cannot be recovered without the original keys."
              echo "You may need to delete the PVC and start fresh if you don't have a backup of the keys."
              
              # Create a placeholder secret to prevent jobs from failing
              cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: vault-keys
            namespace: vault
            annotations:
              vault-init-error: "vault-initialized-but-keys-missing"
          type: Opaque
          data:
            error: $(echo -n "Vault is initialized but original keys are missing. Manual intervention required." | base64)
          EOF
              
              exit 1
            fi
          fi
          
          echo "Vault is not initialized. Proceeding with initialization..."
          
          # Initialize Vault
          echo "Initializing Vault..."
          INIT_OUTPUT=$(vault operator init -key-shares=1 -key-threshold=1 -format=json)
          
          # Extract values
          UNSEAL_KEY=$(echo "$INIT_OUTPUT" | jq -r '.unseal_keys_b64[0]')
          ROOT_TOKEN=$(echo "$INIT_OUTPUT" | jq -r '.root_token')
          
          # Create secret with unseal key and root token
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: vault-keys
            namespace: vault
          type: Opaque
          data:
            unseal-key: $(echo -n "$UNSEAL_KEY" | base64)
            root-token: $(echo -n "$ROOT_TOKEN" | base64)
          EOF
          
          # Also create the vault-root-token secret for backward compatibility
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: vault-root-token
            namespace: vault
          type: Opaque
          data:
            root-token: $(echo -n "$ROOT_TOKEN" | base64)
          EOF
          
          echo "Vault initialization complete. Secrets created."
          
          # Unseal Vault
          echo "Unsealing Vault..."
          vault operator unseal "$UNSEAL_KEY"
          
          # Configure Vault with admin service account
          export VAULT_TOKEN="$ROOT_TOKEN"
          
          echo "Enabling secrets engines..."
          vault secrets enable -path=secret kv-v2 || true
          vault auth enable kubernetes || true
          
          echo "Configuring Kubernetes auth..."
          vault write auth/kubernetes/config \
            kubernetes_host=https://$KUBERNETES_PORT_443_TCP_ADDR:443
          
          # Create admin policy with full privileges
          echo "Creating admin policy..."
          vault policy write admin-policy - <<'POLICY'
          # Full access to all paths
          path "*" {
            capabilities = ["create", "read", "update", "delete", "list", "sudo"]
          }
          POLICY
          
          # Create admin service account token
          echo "Creating admin token..."
          ADMIN_TOKEN=$(vault token create -policy=admin-policy -period=768h -format=json | jq -r '.auth.client_token')
          
          # Save admin token as secret
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: vault-admin-token
            namespace: vault
          type: Opaque
          data:
            token: $(echo -n "$ADMIN_TOKEN" | base64)
          EOF
          
          echo "Vault initialization and configuration complete!"
          
        env:
        - name: VAULT_ADDR
          value: http://vault:8200
        - name: VAULT_SKIP_VERIFY
          value: "true"