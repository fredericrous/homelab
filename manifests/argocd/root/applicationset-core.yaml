# ApplicationSet for core platform components
# Note: To use a different homelab-values repo, update the repoURL below
# and ensure you've created a repository secret with matching URL
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core
  namespace: argocd
spec:
  generators:
  - matrix:
      generators:
      # Get all core app configurations
      - git:
          repoURL: https://github.com/fredericrous/homelab
          revision: main
          files:
          - path: "manifests/core/**/app.yaml"
      # Get global configuration from private repo
      - git:
          repoURL: https://github.com/fredericrous/homelab-values
          revision: main
          files:
          - path: "global-config.yaml"
          pathParamPrefix: config

  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/fredericrous/homelab.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace={{default "true" .createNamespace}}
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSyncOnly=true
        - ServerSideApply={{default "false" .serverSideApply}}
        - Replace=true  # Needed for CRDs
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3

      # Standard ignore differences for common operators
      ignoreDifferences:
      # CloudNativePG
      - group: postgresql.cnpg.io
        kind: Cluster
        jsonPointers:
        - /spec/instances
        - /status
      # Cert-manager
      - group: cert-manager.io
        kind: Certificate
        jsonPointers:
        - /status
      # External Secrets Operator
      - group: external-secrets.io
        kind: ExternalSecret
        jsonPointers:
        - /status
        - /status/refreshTime
        - /status/syncedResourceVersion
      # Rook-Ceph
      - group: ceph.rook.io
        kind: CephCluster
        jsonPointers:
        - /status
      - group: ceph.rook.io
        kind: CephBlockPool
        jsonPointers:
        - /status
