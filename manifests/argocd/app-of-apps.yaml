# Root Application - the App of Apps
# This is the only Application we manually create
# It manages all other Applications via ApplicationSets
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  # Ensure proper cleanup on delete
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  # Use restricted bootstrap project instead of default
  project: bootstrap
  
  source:
    repoURL: https://github.com/fredericrous/homelab.git
    targetRevision: main
    path: manifests/argocd/root
  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  # Keep revision history clean
  revisionHistoryLimit: 5
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true
    - ServerSideApply=true
    - PrunePropagationPolicy=foreground
    - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m