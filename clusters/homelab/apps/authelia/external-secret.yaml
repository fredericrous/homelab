apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authelia-secrets
  namespace: authelia
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: authelia-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTHELIA_JWT_SECRET
      remoteRef:
        key: authelia
        property: JWT_SECRET
    - secretKey: AUTHELIA_SESSION_SECRET
      remoteRef:
        key: authelia
        property: SESSION_SECRET
    - secretKey: AUTHELIA_STORAGE_ENCRYPTION_KEY
      remoteRef:
        key: authelia
        property: STORAGE_ENCRYPTION_KEY
    - secretKey: AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD
      remoteRef:
        key: authelia
        property: LDAP_PASSWORD
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authelia-db-app
  namespace: authelia
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: authelia-db-app
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: authelia/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: authelia/postgres
        property: password