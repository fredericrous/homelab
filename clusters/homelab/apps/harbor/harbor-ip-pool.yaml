apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: harbor-pool
  namespace: metallb-system
spec:
  addresses:
  - 192.168.1.220/32  # Dedicated IP for Harbor registry
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: harbor-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - harbor-pool
  nodeSelectors:
  - matchLabels:
      kubernetes.io/hostname: k8s-cp-01  # Advertise from control plane