# Generic template for copying secrets between namespaces
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-copier
  namespace: PLACEHOLDER
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: PLACEHOLDER-secret-copier
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: PLACEHOLDER-secret-copier
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: PLACEHOLDER-secret-copier
subjects:
- kind: ServiceAccount
  name: secret-copier
  namespace: PLACEHOLDER
---
apiVersion: batch/v1
kind: Job
metadata:
  name: secret-copier
  namespace: PLACEHOLDER
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: secret-copier
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: secret-copier
        image: bitnami/kubectl:latest
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: SOURCE_SECRET
          value: PLACEHOLDER
        - name: SOURCE_NAMESPACE
          value: PLACEHOLDER
        - name: TARGET_NAMESPACE
          value: PLACEHOLDER
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Copying secret ${SOURCE_SECRET} from ${SOURCE_NAMESPACE} to ${TARGET_NAMESPACE}..."
          
          # Get the source secret
          kubectl get secret "${SOURCE_SECRET}" -n "${SOURCE_NAMESPACE}" -o yaml > /tmp/source-secret.yaml
          
          # Remove namespace-specific fields and apply to target namespace
          cat /tmp/source-secret.yaml | \
            sed "s/namespace: ${SOURCE_NAMESPACE}/namespace: ${TARGET_NAMESPACE}/" | \
            grep -v "uid:" | \
            grep -v "resourceVersion:" | \
            grep -v "creationTimestamp:" | \
            kubectl apply -f -
          
          echo "Secret ${SOURCE_SECRET} copied to namespace ${TARGET_NAMESPACE}"