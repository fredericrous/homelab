apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: harbor-pool
  namespace: metallb-system
spec:
  addresses:
  - 192.168.1.90-192.168.1.91  # IP range for Harbor services
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: harbor-l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - harbor-pool