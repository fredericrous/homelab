# Additional RBAC for vault-config service account to access Vault resources
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-config-pod-reader
  namespace: vault
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["vault-admin-token", "vault-keys"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vso-vault-config-pod-reader
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-config-pod-reader
subjects:
- kind: ServiceAccount
  name: vault-config
  namespace: vault-secrets-operator