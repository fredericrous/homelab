{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-superuser-reflected
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "app-setup.labels" . | nindent 4 }}
  annotations:
    reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: {{ .Values.namespace | quote }}
    reflector.v1.k8s.emberstack.com/reflects: "postgres/postgres-superuser"
type: kubernetes.io/basic-auth
{{- end }}