apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vault-secrets-operator

resources:
  # Include shared vault auth base (for vault-config service account)
  - ../../base/vault-auth
  # App-specific resources (VSO doesn't need job-templates)
  - job-vault-configure-vso.yaml
  - job-configure-default-vault-access.yaml  # Configure default namespace access
  - smb-credentials-vso.yaml  # VSO resource for SMB credentials
  - vault-auth-global.yaml
  - fix-vault-config-rbac.yaml  # Additional RBAC for vault-config to access Vault pods

# Install Vault Secrets Operator via Helm
helmCharts:
- name: vault-secrets-operator
  repo: https://helm.releases.hashicorp.com
  version: 0.10.0
  namespace: vault-secrets-operator
  releaseName: vault-secrets-operator
  includeCRDs: true  # Helm v3 - include CRDs in the installation
  valuesInline:
    # Disable the pre-upgrade hook for CRDs to avoid conflicts with ArgoCD
    upgradeCRDs:
      enabled: false
    # Add sync-wave annotation to all Helm resources (including CRDs)
    # This ensures they are created before any VSO custom resources
    commonAnnotations:
      argocd.argoproj.io/sync-wave: "-10"
    controller:
      manager:
        image:
          repository: hashicorp/vault-secrets-operator
          tag: 0.10.0
    # For ArgoCD compatibility - disable tests
    tests:
      enabled: false

patches:
  # Add sync-wave to all VSO custom resources to ensure they're created after Helm chart
  - target:
      group: secrets.hashicorp.com
      version: v1beta1
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          argocd.argoproj.io/sync-wave: "10"
  
  # Add sync-wave to jobs to run after VSO resources
  - target:
      kind: Job
    patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "20"
  
  # Customize the vault auth from base
  - target:
      kind: VaultAuth
      name: vault-auth
    patch: |-
      apiVersion: secrets.hashicorp.com/v1beta1
      kind: VaultAuth
      metadata:
        name: vault-auth
        namespace: vault-secrets-operator
        annotations:
          argocd.argoproj.io/sync-wave: "10"
      spec:
        kubernetes:
          role: vault-secrets-operator
          serviceAccount: vault-secrets-operator-controller-manager
  
  # Customize the RBAC for vault token reader
  - target:
      kind: RoleBinding
      name: PLACEHOLDER-vault-admin-token-reader
      namespace: vault
    patch: |-
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: vso-vault-admin-token-reader
        namespace: vault
      subjects:
      - kind: ServiceAccount
        name: vault-config
        namespace: vault-secrets-operator
  
