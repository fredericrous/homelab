# Service account for LLDAP
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lldap
  namespace: lldap
---
# VaultStaticSecret for LLDAP secrets
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: lldap-secrets
  namespace: lldap
spec:
  vaultAuthRef: lldap-auth
  mount: secret
  type: kv-v2
  path: lldap
  destination:
    create: true  # Create the secret from Vault
    name: lldap-secrets
  refreshAfter: 30s
  hmacSecretData: true
