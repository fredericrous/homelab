apiVersion: v1
kind: ConfigMap
metadata:
  name: maddy-config
  namespace: maddy
data:
  maddy.conf: |
    # Maddy Mail Server - basic configuration for local email delivery
    
    state_dir /var/lib/maddy
    runtime_dir /var/run/maddy
    
    hostname mx.daddyshome.fr
    
    # Local domains
    $(local_domains) = daddyshome.fr
    $(primary_domain) = daddyshome.fr
    
    # TLS configuration - using cert-manager certificate
    tls file /etc/maddy/tls/tls.crt /etc/maddy/tls/tls.key
    
    # Authentication
    auth.pass_table local_authdb {
        table sql_table {
            driver sqlite3
            dsn credentials.db
            table_name passwords
        }
    }
    
    # Local storage
    storage.imapsql local_mailboxes {
        driver sqlite3
        dsn imapsql.db
    }
    
    # SMTP configuration
    smtp tcp://0.0.0.0:25 {
        limits {
            all rate 20 1s
            all concurrency 10
        }
        
        dmarc no
        check {
            require_mx_record
            require_matching_rdns
        }
        
        source $(local_domains) {
            reject 521 5.1.8 "User does not exist"
        }
        
        default_source {
            destination postmaster $(local_domains) {
                deliver_to &local_mailboxes
            }
            default_destination {
                reject 550 5.1.1 "User does not exist"
            }
        }
    }
    
    # Submission endpoint for authenticated users
    submission tcp://0.0.0.0:587 {
        limits {
            all rate 50 1s
            all concurrency 10
        }
        
        auth &local_authdb
        
        source $(local_domains) {
            check {
                authorize_sender {
                    prepare_email identity
                }
            }
            
            destination postmaster $(local_domains) {
                deliver_to &local_mailboxes
            }
            default_destination {
                modify {
                    dkim $(primary_domain) $(local_domains) default
                }
                deliver_to &remote_queue
            }
        }
        default_source {
            reject 501 5.1.8 "Non-local sender domain"
        }
    }
    
    # Target for remote delivery
    target.remote outbound_delivery {
        limits {
            destination rate 20 1s
            destination concurrency 10
        }
        mx_auth {
            dane
            mtasts {
                cache fs
                fs_dir mtasts_cache/
            }
            local_policy {
                min_tls_level encrypted
                min_mx_level none
            }
        }
    }
    
    target.queue remote_queue {
        target &outbound_delivery
        autogenerated_msg_domain $(primary_domain)
        bounce {
            destination postmaster $(local_domains) {
                deliver_to &local_mailboxes
            }
            default_destination {
                reject 550 5.0.0 "Refusing to send DSN to non-local recipient"
            }
        }
    }
    
    # IMAP endpoint
    imap tcp://0.0.0.0:143 {
        auth &local_authdb
        storage &local_mailboxes
    }