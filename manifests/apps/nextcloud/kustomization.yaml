apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nextcloud

# App-specific resources
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac-setup-jobs.yaml
  - pvc.yaml
  - pvc-nfs.yaml
  # - job-vault-configure-nextcloud.yaml  # Replaced by job template
  # - nextcloud-vault-connection.yaml  # Now provided by base/vault-auth
  # - nextcloud-vault-auth.yaml  # Now provided by base/vault-auth
  - nextcloud-externalsecret.yaml  # App-specific ExternalSecret
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - ingress-mobile.yaml
  # Database initialization (idempotent - safe to run multiple times)
  - postgres-superuser-externalsecret.yaml
  # ArgoCD Sync Hooks
  # - job-presync-vault-setup.yaml  # Obsolete with ESO/VSO
  - job-presync-database.yaml
  - job-initial-setup.yaml
  - job-postsync-fix-permissions.yaml
  - job-configure-local-external-storage.yaml
  - job-configure-utf8-support.yaml
  - job-postsync-configure.yaml

# Patches
patches:
  # Add backup annotations
  - target:
      kind: Deployment
      name: nextcloud
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nextcloud
      spec:
        template:
          metadata:
            annotations:
              backup.velero.io/backup-volumes: nextcloud-data
  
  # App-specific patches
  - path: patch-security-context.yaml
    target:
      kind: Deployment
      name: nextcloud
  - path: patch-nfs-volumes.yaml
    target:
      kind: Deployment
      name: nextcloud
  # - path: patch-gpu-runtime.yaml  # Enable once GPU node is fixed
  #   target:
  #     kind: Deployment
  #     name: nextcloud
  
