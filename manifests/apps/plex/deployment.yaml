apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: plex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      serviceAccountName: plex
      # GPU Feature Discovery will label nodes with nvidia.com/gpu
      # No manual nodeSelector needed when using gpu resources
      # runtimeClassName: nvidia # Disabled - nvidia runtime not available
      containers:
      - name: plex
        image: plexinc/pms-docker:latest
        env:
        - name: TZ
          value: "Europe/Paris"
        - name: PLEX_CLAIM
          valueFrom:
            secretKeyRef:
              name: plex-config
              key: claim_token
        - name: ADVERTISE_IP
          value: "https://plex.daddyshome.fr/"
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,video,utility"
        ports:
        - containerPort: 32400
          name: plex
        resources:
          limits:
            memory: 4Gi
          requests:
            memory: 2Gi
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /data
        # - name: nfs-media
        #   mountPath: /media
        - name: transcode
          mountPath: /transcode
        # securityContext:
        #   privileged: true  # Required for GPU access
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: plex-config
      - name: data
        emptyDir: {}  # Can be replaced with another PVC if needed
      - name: transcode
        emptyDir: {}  # Temp storage for transcoding
      # - name: nfs-media
      #   persistentVolumeClaim:
      #     claimName: plex-nfs-media