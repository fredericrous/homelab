apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cilium
  namespace: kube-system
spec:
  template:
    spec:
      containers:
      - name: cilium-agent
        env:
        - name: KUBERNETES_SERVICE_HOST
          value: "192.168.1.67"  # This will be replaced by kustomize replacements
        - name: KUBERNETES_SERVICE_PORT
          value: "6443"
      initContainers:
      - name: config
        env:
        - name: KUBERNETES_SERVICE_HOST
          value: "192.168.1.67"
        - name: KUBERNETES_SERVICE_PORT
          value: "6443"
      - name: mount-cgroup
        env:
        - name: KUBERNETES_SERVICE_HOST
          value: "192.168.1.67"
        - name: KUBERNETES_SERVICE_PORT
          value: "6443"
      - name: apply-sysctl-overwrites
        env:
        - name: KUBERNETES_SERVICE_HOST
          value: "192.168.1.67"
        - name: KUBERNETES_SERVICE_PORT
          value: "6443"
      - name: clean-cilium-state
        env:
        - name: KUBERNETES_SERVICE_HOST
          value: "192.168.1.67"
        - name: KUBERNETES_SERVICE_PORT
          value: "6443"
      - name: install-cni-binaries
        env:
        - name: KUBERNETES_SERVICE_HOST
          value: "192.168.1.67"
        - name: KUBERNETES_SERVICE_PORT
          value: "6443"