apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: vault-populate-template
  namespace: argo
spec:
  templates:
  # Template for checking if a secret exists in Vault
  - name: check-vault-secret
    inputs:
      parameters:
      - name: secret-path
    container:
      image: hashicorp/vault:1.20.1
      env:
      - name: VAULT_ADDR
        value: "http://vault.vault.svc.cluster.local:8200"
      - name: VAULT_TOKEN
        valueFrom:
          secretKeyRef:
            name: vault-admin-token
            key: token
      command:
      - sh
      - -c
      - |
        set -e
        
        SECRET_PATH="{{inputs.parameters.secret-path}}"
        
        # Check if secret exists
        if vault kv get "$SECRET_PATH" 2>/dev/null; then
          echo "Secret $SECRET_PATH already exists in Vault."
          echo "exists" > /tmp/result
        else
          echo "Secret $SECRET_PATH does not exist in Vault."
          echo "not-found" > /tmp/result
        fi
        
        cat /tmp/result
    outputs:
      parameters:
      - name: result
        valueFrom:
          path: /tmp/result

  # Template for creating a secret in Vault
  - name: create-vault-secret
    inputs:
      parameters:
      - name: secret-path
      - name: secret-data
    container:
      image: hashicorp/vault:1.20.1
      env:
      - name: VAULT_ADDR
        value: "http://vault.vault.svc.cluster.local:8200"
      - name: VAULT_TOKEN
        valueFrom:
          secretKeyRef:
            name: vault-admin-token
            key: token
      command:
      - sh
      - -c
      - |
        set -e
        
        SECRET_PATH="{{inputs.parameters.secret-path}}"
        SECRET_DATA='{{inputs.parameters.secret-data}}'
        
        echo "Creating secret at $SECRET_PATH in Vault..."
        
        # Create the secret using the provided data
        echo "$SECRET_DATA" | vault kv put "$SECRET_PATH" -
        
        echo "Secret created successfully"
        echo "created" > /tmp/result
    outputs:
      parameters:
      - name: result
        valueFrom:
          path: /tmp/result

  # Template for waiting for Vault to be ready
  - name: wait-vault-ready
    container:
      image: hashicorp/vault:1.20.1
      env:
      - name: VAULT_ADDR
        value: "http://vault.vault.svc.cluster.local:8200"
      command:
      - sh
      - -c
      - |
        set -e
        
        # Wait for Vault to be ready and unsealed
        while true; do
          if vault status 2>/dev/null | grep -q "Sealed.*false"; then
            echo "Vault is ready and unsealed"
            break
          else
            echo "Waiting for Vault to be unsealed..."
            sleep 5
          fi
        done
        
        echo "ready" > /tmp/result
    outputs:
      parameters:
      - name: result
        valueFrom:
          path: /tmp/result

  # Template for generating random passwords
  - name: generate-password
    inputs:
      parameters:
      - name: length
        value: "16"
    container:
      image: alpine:latest
      command:
      - sh
      - -c
      - |
        # Install openssl if not available
        which openssl >/dev/null 2>&1 || apk add --no-cache openssl
        
        LENGTH="{{inputs.parameters.length}}"
        
        # Generate random password
        PASSWORD=$(openssl rand -base64 "$LENGTH" | tr -d '\n=' | cut -c1-"$LENGTH")
        
        echo "$PASSWORD" > /tmp/password
        echo "Generated password of length $LENGTH"
    outputs:
      parameters:
      - name: password
        valueFrom:
          path: /tmp/password

  # Template for generating htpasswd
  - name: generate-htpasswd
    inputs:
      parameters:
      - name: username
      - name: password
    container:
      image: httpd:2.4-alpine
      command:
      - sh
      - -c
      - |
        USERNAME="{{inputs.parameters.username}}"
        PASSWORD="{{inputs.parameters.password}}"
        
        # Generate htpasswd hash
        HTPASSWD=$(htpasswd -nbB "$USERNAME" "$PASSWORD")
        
        echo "$HTPASSWD" > /tmp/htpasswd
        echo "Generated htpasswd for user: $USERNAME"
    outputs:
      parameters:
      - name: htpasswd
        valueFrom:
          path: /tmp/htpasswd