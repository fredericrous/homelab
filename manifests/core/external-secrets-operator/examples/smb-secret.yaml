# Example: SMB credentials using External Secrets Operator
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: smb-credentials
  namespace: default  # Or whatever namespace needs it
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  refreshInterval: 30m  # Sync every 30 minutes
  
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: smb-credentials  # K8s secret name
    creationPolicy: Owner  # ESO owns the secret
    deletionPolicy: Retain  # Keep secret if ExternalSecret is deleted
    
    # Optional: Template the secret data
    template:
      type: Opaque
      engineVersion: v2
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  
  # What to fetch from Vault
  data:
  - secretKey: username  # Key in K8s secret
    remoteRef:
      key: secret/data/nfs  # Vault path
      property: username    # Key in Vault secret
  - secretKey: password
    remoteRef:
      key: secret/data/nfs
      property: password