apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-ovh-webhook"
    haproxy.org/ssl-redirect: "false"
    # mTLS client certificate verification (HAProxyTech annotations)
    haproxy.org/client-ca: "haproxy-controller/client-ca-cert"
    # Make client certificates required (not optional)
    haproxy.org/client-crt-optional: "false"
    # ArgoCD specific settings for gRPC
    haproxy.org/backend-server-proto: "h2"
    haproxy.org/check: "true"
    haproxy.org/check-port: "8080"
    haproxy.org/check-proto: "http"
    haproxy.org/check-uri: "/healthz"
    # Timeouts for ArgoCD operations
    haproxy.org/timeout-client: "300s"
    haproxy.org/timeout-server: "300s"
spec:
  ingressClassName: haproxy
  tls:
  - hosts:
    - argocd.daddyshome.fr
    secretName: argocd-server-tls
  rules:
  - host: argocd.daddyshome.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80