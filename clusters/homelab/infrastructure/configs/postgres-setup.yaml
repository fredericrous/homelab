---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-setup
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/homelab/infrastructure/configs/postgres-setup
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
  force: true
  dependsOn:
    - name: vault-transit-config
    - name: external-secrets-config
    - name: cloudnative-pg