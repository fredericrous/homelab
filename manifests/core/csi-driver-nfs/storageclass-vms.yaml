apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-vms
provisioner: nfs.csi.k8s.io
parameters:
  server: "192.168.1.42"
  share: "/VMs"
  csi.storage.k8s.io/node-stage-secret-name: "nfscreds"
  csi.storage.k8s.io/node-stage-secret-namespace: "default"
mountOptions:
  - nfsvers=4.1
  - hard
  - timeo=600
  - retrans=2
  - noresvport