apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-vault-populate
  namespace: harbor
spec:
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: OnFailure
      containers:
      - name: vault-populate
        image: hashicorp/vault:1.17.6
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_NAMESPACE
          value: "vault"
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Get Vault token from the vault namespace
          export VAULT_TOKEN=$(kubectl get secret vault-admin-token -n vault -o jsonpath='{.data.token}' | base64 -d)
          
          # Check if Harbor database secret already exists
          if vault kv get secret/harbor/database 2>/dev/null; then
            echo "Harbor database secret already exists in Vault. Skipping."
          else
            echo "Creating Harbor database secret in Vault..."
            vault kv put secret/harbor/database \
              password="HarborDB123"
          fi
          
          # Check if Harbor registry secret already exists
          if vault kv get secret/harbor/registry 2>/dev/null; then
            echo "Harbor registry secret already exists in Vault. Skipping."
          else
            echo "Creating Harbor registry secret in Vault..."
            # Generate htpasswd for harbor_registry_user
            # Password: 33V4wUaUxgEC2cFEqENfkv
            HTPASSWD='harbor_registry_user:$2y$05$LT7ytH9EJNDqiGaoupVQrudKtXRNhPRl92NmC7vL7k2ngnnH.RjaK'
            
            # Generate random HTTP secret (16 chars)
            HTTP_SECRET=$(head -c 16 /dev/urandom | base64 | tr -d '\n=' | cut -c1-16)
            
            vault kv put secret/harbor/registry \
              password="33V4wUaUxgEC2cFEqENfkv" \
              htpasswd="$HTPASSWD" \
              http_secret="$HTTP_SECRET"
          fi
          
          echo "Harbor secrets successfully populated in Vault"