---
# RoleBinding to allow authelia service account to read postgres superuser secret
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authelia-postgres-superuser-reader
  namespace: postgres
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: postgres-superuser-reader
subjects:
- kind: ServiceAccount
  name: authelia
  namespace: authelia
---
# RoleBinding to allow authelia service account to read vault token
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authelia-vault-token-reader
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-secret-reader
subjects:
- kind: ServiceAccount
  name: authelia
  namespace: authelia