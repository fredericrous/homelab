# ClusterSecretStore for accessing NAS Vault
# Enables cross-cluster secret synchronization
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://192.168.1.42:61200"  # QNAP Vault
      path: "secret"
      version: "v2"
      
      auth:
        # Option 1: Token auth (simpler but requires token management)
        tokenSecretRef:
          name: vault-transit-token
          namespace: external-secrets
          key: token
        
        # Option 2: Kubernetes auth (if NAS Vault trusts main cluster)
        # kubernetes:
        #   mountPath: "kubernetes-main-cluster"
        #   role: "external-secrets"
        #   serviceAccountRef:
        #     name: external-secrets
        #     namespace: external-secrets
---
# Secret to store NAS Vault access token
# This should be created during deployment or via sealed-secrets
apiVersion: v1
kind: Secret
metadata:
  name: nas-vault-token
  namespace: external-secrets
type: Opaque
stringData:
  # Token with read access to secret/pki/* in NAS Vault
  token: "hvs.PLACEHOLDER"  # Replace during deployment