apiVersion: v1
kind: Namespace
metadata:
  name: postgres
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-apps
  namespace: postgres
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-apps
  namespace: postgres
spec:
  instances: 1
  
  # PostgreSQL version
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6
  
  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
  
  # Bootstrap configuration
  # Enable superuser access for database creation
  enableSuperuserAccess: true
  
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: postgres-superuser-secret
      # Initial databases and users will be created by individual apps
  
  # Storage configuration
  storage:
    size: 10Gi
    storageClass: rook-ceph-block
  
  # Resources
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 1000m
  
  # Node affinity to run on worker nodes
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node.kubernetes.io/type
            operator: In
            values:
            - worker
