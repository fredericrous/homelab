# External-DNS Helm Chart Values
# https://github.com/kubernetes-sigs/external-dns/tree/main/charts/external-dns

# Image configuration
image:
  registry: registry.k8s.io
  repository: external-dns/external-dns
  tag: v0.14.2  # Stable version with OVH support

# Service account configuration
serviceAccount:
  create: true
  name: external-dns

# RBAC configuration
rbac:
  create: true

# Sources to watch for DNS records
sources:
  - service
  - ingress
  # - istio-gateway  # Uncomment if using Istio
  # - istio-virtualservice  # Uncomment if using Istio
  # - crd  # Uncomment if using custom resources

# Ignore resources with this annotation set to "true"
ignoreAnnotation: "external-dns.alpha.kubernetes.io/ignore"

# DNS provider configuration
provider: ovh

# OVH-specific configuration
ovh:
  endpoint: ovh-eu  # OVH Europe endpoint

# Environment variables from secret
env:
  - name: OVH_APPLICATION_KEY
    valueFrom:
      secretKeyRef:
        name: ovh-credentials
        key: OVH_APPLICATION_KEY
  - name: OVH_APPLICATION_SECRET
    valueFrom:
      secretKeyRef:
        name: ovh-credentials
        key: OVH_APPLICATION_SECRET
  - name: OVH_CONSUMER_KEY
    valueFrom:
      secretKeyRef:
        name: ovh-credentials
        key: OVH_CONSUMER_KEY

# Domains to manage - external-dns will automatically manage all subdomains
domainFilters:
  - daddyshome.fr
  # Future: add more domains here when needed
  # - example.com

# Exclude domains - useful when you add more domains but want to exclude specific subdomains
excludeDomains: []
  # Example: 
  # - internal.daddyshome.fr
  # - staging.example.com

# No annotation filter - manage ALL ingresses/services in the allowed domains
# annotationFilter: ""  # Removed to process all resources

# Regex filters for more control (commented out for now, but useful for future)
# regexDomainFilter: "^([a-z0-9-]+\\.)*daddyshome\\.fr$"
# regexDomainExclusion: "^([a-z0-9-]+\\.)*internal\\.daddyshome\\.fr$"

# Interval between sync runs
interval: 30s

# Log level
logLevel: info

# Policy for DNS record ownership
policy: sync  # sync = create and delete records (upsert-only would be safer but less automated)

# Registry for tracking DNS record ownership
registry: txt
txtOwnerId: homelab-external-dns
txtPrefix: "_external-dns."  # Prefix to avoid conflicts with other TXT records
txtSuffix: ""  # No suffix needed

# Safety features
dryRun: false  # Set to true for testing
once: false    # Set to true to run only once (useful for migration)

# Provider-specific settings for OVH
ovh:
  # Rate limiting to avoid API throttling
  rateLimit: 20  # Requests per second
  # Batch changes for efficiency
  batchChangeSize: 100

# Resources
resources:
  requests:
    memory: 50Mi
    cpu: 10m
  limits:
    memory: 100Mi
    cpu: 50m

# Pod annotations
podAnnotations:
  reloader.stakater.com/auto: "true"  # Auto-reload on secret changes

# Security context
securityContext:
  fsGroup: 65534
  runAsNonRoot: true
  runAsUser: 65534

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# Deployment strategy
deploymentStrategy:
  type: Recreate