apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-initial-setup
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "10"
spec:
  template:
    metadata:
      labels:
        app: nextcloud-setup
    spec:
      serviceAccountName: nextcloud
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-nextcloud
        image: bitnami/kubectl:1.28
        command:
        - sh
        - -c
        - |
          echo "Waiting for Nextcloud deployment..."
          # First wait for deployment to exist
          until kubectl get deployment -n nextcloud nextcloud >/dev/null 2>&1; do
            echo "Waiting for deployment to be created..."
            sleep 5
          done
          
          # Then wait for service to be ready
          echo "Waiting for Nextcloud service to be ready..."
          until nc -z nextcloud.nextcloud.svc.cluster.local 80 2>/dev/null; do
            echo "Nextcloud service is not ready yet..."
            sleep 10
          done
          echo "Nextcloud is ready!"
      - name: wait-for-database
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          echo "Waiting for PostgreSQL to be ready..."
          until nc -z postgres-apps-rw.postgres.svc.cluster.local 5432; do
            echo "PostgreSQL is not ready yet..."
            sleep 10
          done
          echo "PostgreSQL is ready!"
      containers:
      - name: setup
        image: nextcloud:29-apache
        command:
        - sh
        - -c
        - |
          set -e
          echo "🛠️ Checking Nextcloud installation status..."
          
          # Install jq for JSON parsing
          apt-get update >/dev/null 2>&1 && apt-get install -y jq >/dev/null 2>&1
          
          # Fix permissions first
          chmod 0770 /var/www/html/data || true
          chown www-data:www-data /var/www/html/data || true
          
          # Check if Nextcloud is installed
          INSTALLED=$(su -s /bin/sh www-data -c "php occ status --output=json 2>/dev/null" | jq -r '.installed' || echo "false")
          
          if [ "$INSTALLED" = "false" ]; then
            echo "📦 Installing Nextcloud..."
            
            # Run installation with proper variable expansion
            su -s /bin/bash www-data -c "php occ maintenance:install \
              --database pgsql \
              --database-host \"$POSTGRES_HOST\" \
              --database-name \"$POSTGRES_DB\" \
              --database-user \"$POSTGRES_USER\" \
              --database-pass \"$POSTGRES_PASSWORD\" \
              --admin-user \"$NEXTCLOUD_ADMIN_USER\" \
              --admin-pass \"$NEXTCLOUD_ADMIN_PASSWORD\" \
              --data-dir /var/www/html/data"
            
            echo "✅ Nextcloud installed successfully"
          else
            echo "✅ Nextcloud is already installed"
          fi
          
          # Configure trusted domains
          echo "🌐 Configuring trusted domains..."
          su -s /bin/sh www-data -c "php occ config:system:set trusted_domains 0 --value='drive.daddyshome.fr'"
          su -s /bin/sh www-data -c "php occ config:system:set trusted_domains 1 --value='nextcloud.nextcloud.svc.cluster.local'"
          
          # Configure Redis
          echo "📊 Configuring Redis cache..."
          su -s /bin/sh www-data -c "php occ config:system:set redis host --value='${REDIS_HOST}'"
          su -s /bin/sh www-data -c "php occ config:system:set redis port --value='${REDIS_PORT}'"
          su -s /bin/sh www-data -c "php occ config:system:set redis dbindex --value='0'"
          su -s /bin/sh www-data -c "php occ config:system:set memcache.distributed --value='\\OC\\Memcache\\Redis'"
          su -s /bin/sh www-data -c "php occ config:system:set memcache.locking --value='\\OC\\Memcache\\Redis'"
          
          echo "✅ Initial setup complete"
        env:
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: database-host
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: database-name
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: database-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: database-password
        - name: NEXTCLOUD_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: admin-username
        - name: NEXTCLOUD_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: admin-password
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: redis-host
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: nextcloud-secrets
              key: redis-port
        volumeMounts:
        - name: nextcloud-data
          mountPath: /var/www/html
      volumes:
      - name: nextcloud-data
        persistentVolumeClaim:
          claimName: nextcloud-data