apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-transit-unseal-operator
  namespace: vault-transit-unseal-operator
  labels:
    app.kubernetes.io/name: vault-transit-unseal-operator
    app.kubernetes.io/instance: vault-transit-unseal-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vault-transit-unseal-operator
      app.kubernetes.io/instance: vault-transit-unseal-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-transit-unseal-operator
        app.kubernetes.io/instance: vault-transit-unseal-operator
    spec:
      serviceAccountName: vault-transit-unseal-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
      - name: manager
        image: ghcr.io/fredericrous/vault-transit-unseal-operator:0.3.0
        imagePullPolicy: Always
        env:
        - name: WATCH_NAMESPACE
          value: ""  # Watch all namespaces
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
