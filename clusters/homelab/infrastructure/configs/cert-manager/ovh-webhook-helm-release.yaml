apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ovh-webhook
  namespace: flux-system
spec:
  targetNamespace: cert-manager
  interval: 30m
  chart:
    spec:
      chart: ovh-webhook
      version: "0.3.1"
      sourceRef:
        kind: HelmRepository
        name: ovh-webhook
        namespace: flux-system
      interval: 12h
  dependsOn:
    - name: cert-manager
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    groupName: ovh.acme.cert-manager.io
    
    # Resource limits for homelab environment
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi