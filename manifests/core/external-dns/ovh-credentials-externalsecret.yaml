apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ovh-credentials
  namespace: external-dns
spec:
  refreshInterval: 30m
  
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: ovh-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    # External-DNS expects these specific keys
    template:
      engineVersion: v2
      data:
        OVH_APPLICATION_KEY: "{{ .applicationKey }}"
        OVH_APPLICATION_SECRET: "{{ .applicationSecret }}"
        OVH_CONSUMER_KEY: "{{ .consumerKey }}"
  
  # Fetch all keys from external-dns specific path
  dataFrom:
  - extract:
      key: secret/data/external-dns/ovh