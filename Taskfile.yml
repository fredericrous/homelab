version: '3'

dotenv: ['.env']

includes:
  nas:
    taskfile: ./nas/Taskfile.yml
    dir: ./nas

vars:
  TERRAFORM_DIR: './terraform'
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  TALOSCONFIG: '{{.ROOT_DIR}}/talosconfig'

env:
  KUBECONFIG: '{{.KUBECONFIG}}'
  SHELL: /bin/bash

tasks:
  default:
    desc: Run full deployment
    cmds:
      - task: deploy

  # Helper task to check prerequisites
  check-prereq:
    desc: Check prerequisites
    silent: true
    cmds:
      - |
        if ! command -v yq &> /dev/null; then
          echo "ERROR: yq is required but not installed. Install with: brew install yq"
          exit 1
        fi
      - |
        if [ ! -f ".env" ]; then
          echo "ERROR: .env file not found. Copy .env.example and update with your values"
          exit 1
        fi

  deploy:
    desc: Deploy complete Kubernetes cluster
    deps: [check-prereq]
    cmds:
      - task: prereq
      - task: stage1
      - task: stage2
      - task: stage3

  prereq:
    desc: Pre-flight checks
    dir: '{{.TERRAFORM_DIR}}'
    deps: [check-prereq]
    preconditions:
      - sh: test -f terraform.tfvars
      - msg: "terraform.tfvars not found. Copy terraform.tfvars.example and update with your values"
    cmds:
      - terraform init -upgrade

  stage1:
    desc: "Stage 1: Create VMs with Terraform"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [check-prereq]
    cmds:
      - echo "Creating VMs..."
      - terraform apply -target=module.vms -auto-approve

  stage2:
    desc: "Stage 2: Wait for VMs and configure Talos"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [check-prereq]
    cmds:
      - echo "Waiting for VMs to get IP addresses..."
      - ./scripts/wait-vms-ready.sh {{.CONTROL_PLANE_IP}} {{.WORKER_1_IP}} {{.WORKER_2_IP}}
      - terraform apply -var="configure_talos=true" -auto-approve

  stage3:
    desc: "Stage 4: Get kubeconfig"
    deps: [check-prereq]
    env:
      TALOSCONFIG: '{{.TALOSCONFIG}}'
    cmds:
      - talosctl kubeconfig -n {{.CONTROL_PLANE_IP}} -f {{.KUBECONFIG}}
      - chmod 600 {{.KUBECONFIG}}
      - echo "Waiting for Kubernetes API..."
      - kubectl wait --for=condition=Ready nodes --all --timeout=300s

  destroy:
    desc: Destroy the cluster
    dir: '{{.TERRAFORM_DIR}}'
    deps: [check-prereq]
    prompt: This will destroy the entire cluster. Are you sure?
    cmds:
      - terraform destroy -auto-approve
      - rm -f {{.KUBECONFIG}} {{.TALOSCONFIG}}
      - ./scripts/cleanup-vms.sh
      - |
        echo
        echo "=== IMPORTANT: GPU Passthrough Users ==="
        echo "If you have VMs with GPU passthrough, you MUST reboot the Proxmox host"
        echo "before creating new VMs with GPU, otherwise you'll get QEMU errors."
        echo
        echo "Run: task reboot-proxmox"
        echo
        echo "This will prevent the 'pci_irq_handler: Assertion' error."

  cleanup-vms:
    desc: "Clean up existing VMs from Proxmox (use before fresh deploy)"
    dir: '{{.TERRAFORM_DIR}}'
    deps: [check-prereq]
    prompt: This will stop and remove all VMs defined in terraform.tfvars. Are you sure?
    cmds:
      - ./scripts/cleanup-vms.sh

  reboot-proxmox:
    desc: "Reboot Proxmox host (required after destroying VMs with GPU passthrough)"
    dir: '{{.TERRAFORM_DIR}}'
    prompt: This will reboot the Proxmox host. Are you sure?
    cmds:
      - ./scripts/reboot-proxmox.sh
