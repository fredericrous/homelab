apiVersion: batch/v1
kind: Job
metadata:
  name: lldap-populate-secrets
  namespace: lldap
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "5"
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
      - name: populate-secrets
        image: hashicorp/vault:1.20.1
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "🔐 Populating LLDAP secrets in Vault..."
          
          # Vault address from main cluster Vault
          export VAULT_ADDR=http://vault.vault.svc.cluster.local:8200
          
          # Get admin token from reflected secret
          export VAULT_TOKEN=$(cat /vault-admin-token/token)
          
          # Function to check if secret exists
          secret_exists() {
            vault kv get "$1" >/dev/null 2>&1
          }
          
          # Create LLDAP configuration secret if it doesn't exist
          if ! secret_exists "secret/lldap"; then
            echo "📝 Creating LLDAP secrets..."
            
            # Generate secure passwords
            LLDAP_JWT_SECRET=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 32 | head -n 1)
            LLDAP_USER_PASS=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 16 | head -n 1)
            LLDAP_LDAP_USER_PASS=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 16 | head -n 1)
            
            vault kv put secret/lldap \
              LLDAP_JWT_SECRET="$LLDAP_JWT_SECRET" \
              LLDAP_USER_PASS="$LLDAP_USER_PASS" \
              LLDAP_LDAP_USER_PASS="$LLDAP_LDAP_USER_PASS" \
              LLDAP_LDAP_BASE_DN="dc=daddyshome,dc=fr" \
              LLDAP_LDAP_USER_DN="admin" \
              LLDAP_DATABASE_URL="sqlite:///data/users.db?mode=rwc" \
              LLDAP_USER_DN="admin@daddyshome.fr"
            
            echo "✅ LLDAP secrets created"
            
            # Store admin credentials in a separate path for easy retrieval
            vault kv put secret/lldap/admin-credentials \
              username="admin@daddyshome.fr" \
              password="$LLDAP_USER_PASS" \
              ldap-admin-dn="cn=admin,dc=daddyshome,dc=fr" \
              ldap-admin-password="$LLDAP_LDAP_USER_PASS"
            
            echo "✅ Admin credentials stored at secret/lldap/admin-credentials"
          else
            echo "✅ LLDAP secrets already exist"
          fi
          
          # Create LLDAP database credentials if using PostgreSQL
          if ! secret_exists "secret/lldap/postgres"; then
            echo "📝 Creating LLDAP PostgreSQL credentials..."
            
            POSTGRES_PASSWORD=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 32 | head -n 1)
            
            vault kv put secret/lldap/postgres \
              database-host="postgres-apps-rw.postgres.svc.cluster.local" \
              database-port="5432" \
              database-name="lldap" \
              database-user="lldap" \
              database-password="$POSTGRES_PASSWORD"
            
            echo "✅ LLDAP PostgreSQL credentials created"
          else
            echo "✅ LLDAP PostgreSQL credentials already exist"
          fi
          
          echo "✅ All LLDAP secrets populated successfully"
        volumeMounts:
        - name: vault-admin-token
          mountPath: /vault-admin-token
          readOnly: true
      volumes:
      - name: vault-admin-token
        secret:
          secretName: vault-admin-token  # Reflected from vault namespace by Reflector