apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: plex
spec:
  type: ClusterIP
  selector:
    app: plex
  ports:
  - name: plex
    port: 32400
    targetPort: 32400
    protocol: TCP
  # Additional Plex ports for discovery and streaming
  - name: plex-dlna
    port: 1900
    targetPort: 1900
    protocol: UDP
  - name: plex-dlna-tcp
    port: 32469
    targetPort: 32469
    protocol: TCP
  - name: plex-discovery
    port: 5353
    targetPort: 5353
    protocol: UDP
  - name: plex-roku
    port: 8324
    targetPort: 8324
    protocol: TCP
  - name: plex-gdm-1
    port: 32410
    targetPort: 32410
    protocol: UDP
  - name: plex-gdm-2
    port: 32412
    targetPort: 32412
    protocol: UDP
  - name: plex-gdm-3
    port: 32413
    targetPort: 32413
    protocol: UDP
  - name: plex-gdm-4
    port: 32414
    targetPort: 32414
    protocol: UDP