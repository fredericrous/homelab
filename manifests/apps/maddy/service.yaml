apiVersion: v1
kind: Service
metadata:
  name: maddy
  namespace: maddy
spec:
  selector:
    app: maddy
  ports:
  - port: 25
    targetPort: 25
    protocol: TCP
    name: smtp
  - port: 143
    targetPort: 143
    protocol: TCP
    name: imap
  - port: 587
    targetPort: 587
    protocol: TCP
    name: submission
  type: ClusterIP