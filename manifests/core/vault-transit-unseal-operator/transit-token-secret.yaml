# This is a placeholder to prevent ArgoCD from deleting the secret
# The actual secret should be created manually or via External Secrets
# 
# To create manually:
# kubectl create secret generic vault-transit-token \
#   -n vault \
#   --from-literal=token=<YOUR_TRANSIT_TOKEN>
#
# For better security, use External Secrets Operator:
# - Store the token in a secure location (AWS Secrets Manager, etc)
# - Create an ExternalSecret to sync it
---
apiVersion: v1
kind: Secret
metadata:
  name: vault-transit-token
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
type: Opaque
stringData:
  token: "PLACEHOLDER_WILL_BE_REPLACED"