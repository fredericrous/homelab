apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # CloudNative-PG operator
  - https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.21/releases/cnpg-1.21.0.yaml
  # ArgoCD Sync Hooks
  # - job-presync-vault-setup.yaml  # Obsolete with ESO/VSO
  # - vault-token-reader-rbac.yaml  # No longer needed with Reflector
  # Argo Workflow
  - argo-workflow-rbac.yaml
  - vault-admin-token-reflector.yaml  # Reflects vault-admin-token to postgres namespace
  - workflow-populate-vault-secrets.yaml  # PreSync: Creates postgres superuser secret
  - workflow-init-databases.yaml  # PostSync: Creates app databases
  # - job-post-sync-configure.yaml  # Replaced by workflow-init-databases.yaml
  # External Secrets
  - postgres-superuser-externalsecret.yaml
  # Init SQL ConfigMap
  - init-sql-configmap.yaml
  # PostgreSQL cluster for apps
  - postgres-cluster.yaml

patches:
  # Fix webhook connectivity on Talos Linux with Cilium
  - patch-webhook-failure-policy.yaml