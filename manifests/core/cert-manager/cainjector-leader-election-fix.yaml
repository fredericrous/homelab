# Fix for cainjector leader election in cert-manager namespace instead of kube-system
apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-manager-cainjector
  namespace: cert-manager
data:
  # Force leader election to happen in cert-manager namespace
  leader-election-namespace: cert-manager
---
# Additional RBAC for cainjector to manage leases in cert-manager namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-cainjector:leaderelection
  namespace: cert-manager
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-cainjector:leaderelection
  namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-cainjector:leaderelection
subjects:
- kind: ServiceAccount
  name: cert-manager-cainjector
  namespace: cert-manager