apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cert-manager

resources:
  # Core cert-manager installation
  - https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
  
  # Vault configuration
  # - job-vault-configure-cert-manager.yaml  # Replaced by job template
  # - vault-connection.yaml  # Now provided by base/vault-auth
  # - vault-auth-cert-manager.yaml  # Now provided by base/vault-auth
  # - job-vault-populate-secrets.yaml  # Replaced by job template
  - ovh-credentials-externalsecret.yaml
  
  # OVH DNS-01 webhook for Let's Encrypt
  - webhook-ovh-manifests.yaml  # Generated from helm template
  # - ovh-credentials-secret.yaml # Replaced by VaultStaticSecret
  - ovh-webhook-rbac-fix.yaml   # RBAC to allow webhook to read secrets
  - ovh-webhook-kube-system-fix.yaml  # RBAC to allow webhook to read kube-system configmap
  # - ovh-credentials-copy-job.yaml # Replaced by job template
  - clusterissuer-letsencrypt-ovh-webhook-secure.yaml
  
  # Fix leader election issues (Talos doesn't allow kube-system access)
  # - cainjector-leader-election-fix.yaml  # Conflicts with cert-manager's built-in resources
  # - cert-manager-leader-election-fix.yaml

patches:
  # Strategic merge patches for cert-manager components
  - path: cainjector-patch.yaml
  - path: cert-manager-controller-patch.yaml
  - path: webhook-security-patch.yaml