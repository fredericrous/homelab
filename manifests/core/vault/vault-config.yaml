apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
data:
  vault.hcl: |
    ui = true
    disable_mlock = true
    
    listener "tcp" {
      tls_disable = 1
      address = "[::]:8200"
      cluster_address = "[::]:8201"
    }
    
    storage "file" {
      path = "/vault/data"
    }
    
    # Transit auto-unseal using NAS Vault
    seal "transit" {
      address = "PLACEHOLDER_NAS_VAULT_ADDR"
      disable_renewal = "false"
      key_name = "autounseal"
      mount_path = "transit"
      tls_skip_verify = "true"
      # Token will be injected via init container
      token = "TRANSIT_TOKEN_PLACEHOLDER"
    }
    
    # API address
    api_addr = "http://vault.vault.svc.cluster.local:8200"
    
    # Enable the database secrets engine
    # This will be configured after initialization
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-server-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
- kind: ServiceAccount
  name: vault
  namespace: vault
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: vault
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: config-templater
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          # Copy the config from ConfigMap volume
          cp /vault/config-template/vault.hcl /vault/config/vault.hcl
          # Replace the placeholder with the actual token
          # First, escape special characters that have meaning in sed replacement
          TOKEN=$(printf '%s' "$VAULT_SEAL_TRANSIT_TOKEN" | sed 's/[[\.*^$()+?{|]/\\&/g')
          # Use @ as delimiter since it's less likely to appear in tokens than |
          sed -i "s@TRANSIT_TOKEN_PLACEHOLDER@${TOKEN}@g" /vault/config/vault.hcl
          echo "Config templating complete"
        env:
        - name: VAULT_SEAL_TRANSIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-transit-token
              key: token
        volumeMounts:
        - name: config-template
          mountPath: /vault/config-template
        - name: config
          mountPath: /vault/config
      containers:
      - name: vault
        image: hashicorp/vault:1.20.1
        command:
        - vault
        - server
        - -config=/vault/config/vault.hcl
        env:
        - name: VAULT_ADDR
          value: http://127.0.0.1:8200
        - name: VAULT_API_ADDR
          value: http://vault.vault.svc.cluster.local:8200
        - name: VAULT_CLUSTER_ADDR
          value: http://vault.vault.svc.cluster.local:8201
        - name: VAULT_SEAL_TRANSIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-transit-token
              key: token
        ports:
        - containerPort: 8200
          name: http
        - containerPort: 8201
          name: cluster
        volumeMounts:
        - name: data
          mountPath: /vault/data
        - name: config
          mountPath: /vault/config
        livenessProbe:
          httpGet:
            path: /v1/sys/health?standbyok=true
            port: 8200
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            memory: 256Mi
            cpu: 250m
          limits:
            memory: 512Mi
            cpu: 500m
      volumes:
      - name: config-template
        configMap:
          name: vault-config
      - name: config
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: vault-data
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node.kubernetes.io/type
                operator: In
                values:
                - worker