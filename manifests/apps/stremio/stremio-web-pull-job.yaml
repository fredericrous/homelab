apiVersion: batch/v1
kind: Job
metadata:
  name: stremio-web-pull
  namespace: stremio
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: pull-and-save
        image: moby/buildkit:latest
        command:
        - sh
        - -c
        - |
          # Install necessary tools
          apk add --no-cache skopeo
          
          # Pull image using skopeo with insecure flag
          echo "Pulling image from Harbor..."
          skopeo copy --insecure-policy --src-tls-verify=false \
            --src-creds="harbor_registry_user:33V4wUaUxgEC2cFEqENfkv" \
            docker://harbor-registry.harbor.svc.cluster.local:5000/library/stremio-web:latest \
            oci:/tmp/stremio-web:latest
          
          echo "Image pulled successfully"
          
          # Extract the image content
          mkdir -p /stremio-web-content
          cd /tmp/stremio-web
          
          # Find and extract the layers
          for layer in $(find . -name "*.tar.gz" -o -name "*.tar"); do
            echo "Extracting layer: $layer"
            tar -xf "$layer" -C /stremio-web-content 2>/dev/null || true
          done
          
          # Copy the built files to the PVC
          echo "Copying web content to PVC..."
          cp -r /stremio-web-content/var/www/stremio-web/* /output/ || \
          cp -r /stremio-web-content/* /output/
          
          echo "Content copied successfully"
          ls -la /output/
        volumeMounts:
        - name: stremio-web-data
          mountPath: /output
      volumes:
      - name: stremio-web-data
        persistentVolumeClaim:
          claimName: stremio-web-data