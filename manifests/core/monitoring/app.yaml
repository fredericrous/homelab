# ArgoCD Application for monitoring stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: core
  source:
    repoURL: https://github.com/fredericrous/homelab
    targetRevision: HEAD
    path: manifests/core/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Ignore differences in Prometheus/Grafana configs that are dynamically updated
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: prometheus-kube-prometheus-stack-prometheus
      jsonPointers:
        - /data
    - group: ""
      kind: ConfigMap
      name: prometheus-kube-prometheus-stack-prometheus-rulefiles-0
      jsonPointers:
        - /data