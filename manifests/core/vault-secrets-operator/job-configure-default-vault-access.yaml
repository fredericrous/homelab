apiVersion: batch/v1
kind: Job
metadata:
  name: vault-configure-default-access
  namespace: vault-secrets-operator
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "5"
spec:
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: OnFailure
      containers:
      - name: configure
        image: hashicorp/vault:1.20.1
        env:
        - name: VAULT_ADDR
          value: http://vault.vault.svc.cluster.local:8200
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Install bash if needed (vault:1.20.1 is alpine-based)
          apk add --no-cache bash
          
          # Make script executable
          chmod +x /scripts/configure-default-namespace-access.sh
          
          # Execute the configuration script
          echo "🚀 Running default namespace configuration script..."
          exec /scripts/configure-default-namespace-access.sh
        volumeMounts:
        - name: admin-token
          mountPath: /vault/admin-token
          readOnly: true
        - name: config-scripts
          mountPath: /scripts
      volumes:
      - name: admin-token
        secret:
          secretName: vault-admin-token
      - name: config-scripts
        configMap:
          name: vso-config-scripts
          defaultMode: 0755