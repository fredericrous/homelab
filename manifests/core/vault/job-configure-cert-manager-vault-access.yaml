apiVersion: batch/v1
kind: Job
metadata:
  name: vault-configure-cert-manager
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "4"
spec:
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: OnFailure
      containers:
      - name: configure
        image: hashicorp/vault:1.20.1
        env:
        - name: VAULT_ADDR
          value: http://vault:8200
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Wait for Vault to be ready
          until vault status; do
            echo "Waiting for Vault to be ready..."
            sleep 5
          done
          
          # Login with admin token
          if [ -f /vault/admin-token/token ]; then
            export VAULT_TOKEN=$(cat /vault/admin-token/token)
          else
            echo "Admin token not found!"
            exit 1
          fi
          
          # Create policy for cert-manager
          vault policy write cert-manager - <<EOF
          path "secret/data/ovh-dns" {
            capabilities = ["read"]
          }
          
          path "secret/data/cert-manager/*" {
            capabilities = ["read"]
          }
          
          path "secret/metadata/cert-manager/*" {
            capabilities = ["list"]
          }
          EOF
          
          # Create Kubernetes auth role for cert-manager
          vault write auth/kubernetes/role/cert-manager \
            bound_service_account_names=cert-manager \
            bound_service_account_namespaces=cert-manager \
            policies=cert-manager \
            ttl=24h
          
          echo "✅ Cert-manager Vault access configured"
        volumeMounts:
        - name: admin-token
          mountPath: /vault/admin-token
          readOnly: true
      volumes:
      - name: admin-token
        secret:
          secretName: vault-admin-token