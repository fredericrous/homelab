apiVersion: batch/v1
kind: Job
metadata:
  name: vault-populate
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/hook: PostSync
spec:
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
      - name: populate-secrets
        image: hashicorp/vault:1.20.1
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          
          echo "🔐 Populating Initial Vault Secrets"
          echo "===================================="
          
          # Source health check functions
          source /scripts/vault-health-check.sh
          
          # Main function to populate secrets
          populate_secrets() {
            # Check Vault health
            check_vault_health 30 || return 1
            
            # Verify admin token
            verify_admin_token || return 1
            
            # Check KV engine is ready
            if ! check_secret_engine "secret" "kv" "2"; then
              log_error "KV v2 engine not found at secret/"
              return 1
            fi
            
            echo ""
            echo "📝 Populating initial secrets..."
            
            # Create namespace structure
            local namespaces=(
              "secret/velero"
              "secret/nfs"
              "secret/ovh-dns"
              "secret/harbor"
              "secret/nextcloud"
              "secret/authelia"
              "secret/lldap"
              "secret/plex"
              "secret/database"
            )
            
            for ns in "${namespaces[@]}"; do
              echo "  Creating namespace: $ns"
              # Create a placeholder to establish the path
              vault kv put "$ns/placeholder" init="true" >/dev/null 2>&1 || true
            done
            
            # Populate secrets from environment if available
            populate_from_env() {
              local secret_path="$1"
              local env_prefix="$2"
              shift 2
              local keys=("$@")
              
              local has_values=false
              for key in "${keys[@]}"; do
                local env_var="${env_prefix}_${key^^}"
                env_var="${env_var//-/_}"  # Replace dashes with underscores
                
                if [ -n "${!env_var:-}" ]; then
                  has_values=true
                  break
                fi
              done
              
              if [ "$has_values" = "true" ]; then
                echo "  Populating $secret_path from environment..."
                local args=()
                for key in "${keys[@]}"; do
                  local env_var="${env_prefix}_${key^^}"
                  env_var="${env_var//-/_}"
                  if [ -n "${!env_var:-}" ]; then
                    args+=("$key=${!env_var}")
                  fi
                done
                
                if [ ${#args[@]} -gt 0 ]; then
                  vault kv put "$secret_path" "${args[@]}" >/dev/null || {
                    log_error "Failed to populate $secret_path"
                    return 1
                  }
                  log_success "Populated $secret_path"
                fi
              else
                log_info "No environment variables found for $secret_path"
              fi
            }
            
            # Populate OVH credentials if provided
            populate_from_env "secret/ovh-dns" "OVH" \
              "applicationKey" "applicationSecret" "consumerKey"
            
            # Populate Velero S3 credentials if provided
            populate_from_env "secret/velero" "VELERO" \
              "aws_access_key_id" "aws_secret_access_key" "bucket" "region"
            
            # Populate NFS credentials if provided
            populate_from_env "secret/nfs" "NFS" \
              "username" "password" "server" "path"
            
            # Check if any secrets from external files
            if [ -d /vault-secrets ]; then
              echo ""
              echo "📂 Loading secrets from /vault-secrets..."
              for file in /vault-secrets/*; do
                if [ -f "$file" ]; then
                  local filename=$(basename "$file")
                  local secret_name="${filename%.*}"
                  echo "  Processing $filename..."
                  
                  # Determine format based on extension
                  case "$filename" in
                    *.json)
                      vault kv put "secret/imported/$secret_name" @"$file" || {
                        log_warning "Failed to import $filename"
                      }
                      ;;
                    *.yaml|*.yml)
                      log_info "YAML import not yet implemented for $filename"
                      ;;
                    *)
                      # Treat as key=value file
                      while IFS='=' read -r key value; do
                        [ -z "$key" ] && continue
                        vault kv patch "secret/imported/$secret_name" "$key=$value" >/dev/null 2>&1 || \
                        vault kv put "secret/imported/$secret_name" "$key=$value" >/dev/null || {
                          log_warning "Failed to import $key from $filename"
                        }
                      done < "$file"
                      ;;
                  esac
                fi
              done
            fi
            
            echo ""
            log_success "Initial secret population complete"
            
            # Show summary
            echo ""
            echo "📊 Secret Summary:"
            local count=$(vault kv list -format=json secret/ 2>/dev/null | jq -r '.[] | select(. != "placeholder")' | wc -l)
            echo "  Total secret paths: $count"
            
            return 0
          }
          
          # Install required tools
          echo "📦 Installing required tools..."
          apk add --no-cache bash jq >/dev/null 2>&1 || true
          
          # Run main function
          populate_secrets || exit 1
          
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_SKIP_VERIFY
          value: "true"
        # Optional: Add environment variables for secrets
        # - name: OVH_APPLICATIONKEY
        #   valueFrom:
        #     secretKeyRef:
        #       name: ovh-credentials-import
        #       key: applicationKey
        #       optional: true
        volumeMounts:
        - name: vault-admin-token
          mountPath: /vault-admin-token
          readOnly: true
        - name: health-check
          mountPath: /scripts
          readOnly: true
        - name: vault-secrets
          mountPath: /vault-secrets
          readOnly: true
      volumes:
      - name: vault-admin-token
        secret:
          secretName: vault-admin-token
      - name: health-check
        configMap:
          name: vault-health-check
          defaultMode: 0755
      - name: vault-secrets
        configMap:
          name: vault-import-secrets
          optional: true