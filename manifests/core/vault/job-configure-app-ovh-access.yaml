apiVersion: batch/v1
kind: Job
metadata:
  name: vault-configure-ovh-access
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "4"
spec:
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: OnFailure
      containers:
      - name: configure
        image: hashicorp/vault:1.20.1
        env:
        - name: VAULT_ADDR
          value: http://vault:8200
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Wait for Vault to be ready
          until vault status; do
            echo "Waiting for Vault to be ready..."
            sleep 5
          done
          
          # Login with admin token
          if [ -f /vault/admin-token/token ]; then
            export VAULT_TOKEN=$(cat /vault/admin-token/token)
          else
            echo "Admin token not found!"
            exit 1
          fi
          
          # Update policies for services that need OVH credentials
          
          # LLDAP policy update
          vault policy write lldap - <<EOF
          path "secret/data/lldap/*" {
            capabilities = ["read"]
          }
          path "secret/data/ovh-dns" {
            capabilities = ["read"]
          }
          EOF
          
          # Authelia policy update
          vault policy write authelia - <<EOF
          path "secret/data/authelia/*" {
            capabilities = ["read"]
          }
          path "secret/data/ovh-dns" {
            capabilities = ["read"]
          }
          EOF
          
          # Harbor policy update
          vault policy write harbor - <<EOF
          path "secret/data/harbor/*" {
            capabilities = ["read"]
          }
          path "secret/data/ovh-dns" {
            capabilities = ["read"]
          }
          EOF
          
          echo "✅ OVH access policies updated for all services"
        volumeMounts:
        - name: admin-token
          mountPath: /vault/admin-token
          readOnly: true
      volumes:
      - name: admin-token
        secret:
          secretName: vault-admin-token