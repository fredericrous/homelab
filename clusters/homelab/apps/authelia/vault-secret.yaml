apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: authelia-secrets
  namespace: authelia
spec:
  vaultAuthRef: authelia
  type: kv-v2
  mount: secret
  path: authelia
  destination:
    name: authelia-secrets
    create: true
    type: Opaque
    transformation:
      templates:
        AUTHELIA_JWT_SECRET:
          text: '{{ .Secrets.JWT_SECRET }}'
        AUTHELIA_SESSION_SECRET:
          text: '{{ .Secrets.SESSION_SECRET }}'
        AUTHELIA_STORAGE_ENCRYPTION_KEY:
          text: '{{ .Secrets.STORAGE_ENCRYPTION_KEY }}'
        AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD:
          text: '{{ .Secrets.LDAP_PASSWORD }}'
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: authelia-db-secrets
  namespace: authelia
spec:
  vaultAuthRef: authelia
  type: kv-v2
  mount: secret
  path: authelia/postgres
  destination:
    name: authelia-db-app
    create: true
    type: kubernetes.io/basic-auth
    transformation:
      templates:
        username:
          text: '{{ .Secrets.username }}'
        password:
          text: '{{ .Secrets.password }}'