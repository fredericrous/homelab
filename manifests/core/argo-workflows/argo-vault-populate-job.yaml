apiVersion: batch/v1
kind: Job
metadata:
  name: argo-workflows-vault-populate
  namespace: argo-workflows
spec:
  template:
    spec:
      serviceAccountName: default
      restartPolicy: OnFailure
      containers:
      - name: vault-populate
        image: hashicorp/vault:1.20.1
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-admin-token
              key: token
              optional: true  # Skip if Vault not initialized yet
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          # Check if Vault is accessible and token exists
          if [ -z "$VAULT_TOKEN" ]; then
            echo "Vault token not available yet. Skipping vault population."
            exit 0
          fi
          
          # Check if Vault is reachable
          if ! vault status > /dev/null 2>&1; then
            echo "Vault is not reachable. Skipping vault population."
            exit 0
          fi
          
          # Create Argo Workflows database credentials if they don't exist
          if vault kv get secret/argo-workflows/database 2>/dev/null; then
            echo "Argo Workflows database secret already exists in Vault. Skipping."
          else
            echo "Creating Argo Workflows database secret in Vault..."
            vault kv put secret/argo-workflows/database \
              username="argo" \
              password="$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 32 | head -n 1)"
          fi
          
          echo "Argo Workflows secrets successfully populated in Vault"