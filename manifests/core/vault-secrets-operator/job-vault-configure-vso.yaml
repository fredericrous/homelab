apiVersion: batch/v1
kind: Job
metadata:
  name: vault-configure-vso
  namespace: vault-secrets-operator
  annotations:
    argocd.argoproj.io/sync-wave: "5"  # Run after VSO is deployed
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-config
      containers:
      - name: vault-configure
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          
          # Install vault CLI
          echo "📦 Installing Vault CLI..."
          apt-get update && apt-get install -y curl
          curl -fsSL https://apt.releases.hashicorp.com/gpg | apt-key add -
          apt-get install -y software-properties-common
          apt-add-repository "deb [arch=amd64] https://apt.releases.hashicorp.com $(lsb_release -cs) main"
          apt-get update && apt-get install -y vault
          
          # Make script executable
          chmod +x /scripts/configure-vault-for-vso.sh
          
          # Execute the configuration script
          echo "🚀 Running VSO configuration script..."
          exec /scripts/configure-vault-for-vso.sh
        volumeMounts:
        - name: config-scripts
          mountPath: /scripts
      volumes:
      - name: config-scripts
        configMap:
          name: vso-config-scripts
          defaultMode: 0755