# Job to copy OVH credentials to namespaces that need them
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ovh-credentials-copier
  namespace: cert-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ovh-credentials-copier
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ovh-credentials-copier
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ovh-credentials-copier
subjects:
- kind: ServiceAccount
  name: ovh-credentials-copier
  namespace: cert-manager
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ovh-credentials-copier
  namespace: cert-manager
spec:
  template:
    spec:
      serviceAccountName: ovh-credentials-copier
      restartPolicy: OnFailure
      containers:
      - name: copier
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Copying OVH credentials to namespaces..."
          
          # Get the OVH credentials from cert-manager namespace
          kubectl get secret ovh-credentials -n cert-manager -o yaml > /tmp/ovh-creds.yaml
          
          # List of namespaces that need the credentials
          NAMESPACES="authelia harbor lldap vault"
          
          for ns in $NAMESPACES; do
            echo "Copying to namespace: $ns"
            # Remove namespace-specific fields and apply to target namespace
            cat /tmp/ovh-creds.yaml | \
              sed 's/namespace: cert-manager/namespace: '"$ns"'/' | \
              grep -v "uid:" | \
              grep -v "resourceVersion:" | \
              grep -v "creationTimestamp:" | \
              kubectl apply -f -
          done
          
          echo "OVH credentials copied to all namespaces"