# Required: The name of the application
appName: ""

# Namespace where the setup jobs will run
namespace: ""

# Service account configuration
serviceAccount:
  # Create a service account
  create: true
  # Name of the service account
  name: ""  # defaults to chart fullname if not set

# PostgreSQL database setup
postgres:
  enabled: true
  host: postgres-apps-rw.postgres.svc.cluster.local
  # Database name (defaults to appName)
  database: ""
  # Username (defaults to appName)
  username: ""
  # Superuser secret name in postgres namespace
  superuserSecret: postgres-apps-superuser

# Vault setup  
vault:
  enabled: true
  address: http://vault-vault.vault.svc.cluster.local:8200
  tokenSecret: vault-admin-token
  # Secrets to create, with structure:
  # - path: secret/app/section
  #   data:
  #     key: value or __GENERATE_PASSWORD__ or __GENERATE_BASE64__
  secrets: []

# Job configuration
jobs:
  postgresImage: postgres:16-alpine
  vaultImage: hashicorp/vault:1.17.3
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  activeDeadlineSeconds: 600

# RBAC configuration
rbac:
  # Create RBAC resources
  create: true
  # Additional namespaces to grant access to
  additionalNamespaces: []