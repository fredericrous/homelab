apiVersion: v1
kind: ConfigMap
metadata:
  name: test-config
  namespace: envsubst-test
data:
  # These values will be substituted by the envsubst plugin
  cluster-info: |
    Cluster Name: ${CLUSTER_NAME}
    Cluster Domain: ${CLUSTER_DOMAIN}
    External Domain: ${EXTERNAL_DOMAIN}
    
  storage-info: |
    Default Storage Class: ${STORAGE_CLASS_DEFAULT}
    Block Storage Class: ${STORAGE_CLASS_BLOCK}
    
  service-endpoints: |
    Vault Address: ${VAULT_ADDR}
    PostgreSQL Host: ${POSTGRES_HOST}
    
  resource-defaults: |
    Default Replicas: ${DEFAULT_REPLICAS}
    CPU Request: ${DEFAULT_CPU_REQUEST:-100m}
    Memory Request: ${DEFAULT_MEMORY_REQUEST:-256Mi}