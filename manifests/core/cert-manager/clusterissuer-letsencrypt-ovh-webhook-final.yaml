apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-ovh-webhook-final
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@daddyshome.fr
    privateKeySecretRef:
      name: letsencrypt-ovh-webhook-final
    solvers:
    - dns01:
        webhook:
          groupName: acme.daddyshome.fr
          solverName: ovh
          config:
            endpoint: ovh-eu
            # Application key must be provided in the config
            # Get it from OVH API: https://eu.api.ovh.com/createApp/
            applicationKey: "REPLACE_WITH_YOUR_APP_KEY"
            applicationSecretRef:
              key: applicationSecret
              name: ovh-credentials
            # Consumer key must be provided in the config
            consumerKey: "REPLACE_WITH_YOUR_CONSUMER_KEY"