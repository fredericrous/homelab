apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: maddy-tls
  namespace: maddy
spec:
  secretName: maddy-tls
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  commonName: maddy.maddy.svc.cluster.local
  dnsNames:
  - maddy.maddy.svc.cluster.local
  - maddy.maddy.svc
  - maddy.maddy
  - maddy
  - mx.daddyshome.fr
  - localhost
  ipAddresses:
  - 127.0.0.1
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days