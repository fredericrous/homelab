# ApplicationSet for user applications
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  generators:
  # Matrix generator combines app configs with global defaults
  - matrix:
      generators:
      # First: Get all app configurations
      - git:
          repoURL: https://github.com/fredericrous/homelab.git
          revision: main
          files:
          - path: "manifests/apps/**/app.yaml"
      # Second: Get global configuration
      - git:
          repoURL: https://github.com/fredericrous/homelab.git
          revision: main
          files:
          - path: "manifests/argocd/root/global-config.yaml"
  
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/fredericrous/homelab.git
        targetRevision: main
        path: '{{path}}'
        {{- if .plugin }}
        # Pass environment variables from global config to the plugin
        plugin:
          name: '{{plugin}}'
          env:
          - name: ARGO_EXTERNAL_DOMAIN
            value: '{{defaultExternalDomain}}'
          - name: ARGO_HARBOR_IP
            value: '{{harborIP}}'
          - name: ARGO_HARBOR_REGISTRY
            value: '{{harborRegistry}}'
          - name: ARGO_HARBOR_REGISTRY_TLS
            value: '{{harborRegistryTLS}}'
          - name: ARGO_CLUSTER_DOMAIN
            value: '{{clusterDomain}}'
          - name: ARGO_CONTROL_PLANE_IP
            value: '{{controlPlaneIP}}'
          - name: ARGO_METALLB_POOL
            value: '{{metallbPool}}'
          - name: ARGO_HAPROXY_MOBILE_IP
            value: '{{haproxyMobileIP}}'
          - name: ARGO_QNAP_NAS_IP
            value: '{{qnapNasIP}}'
          - name: ARGO_NAS_VAULT_ADDR
            value: '{{nasVaultAddr}}'
          - name: ARGO_MINIO_QNAP_URL
            value: '{{minioQnapUrl}}'
          - name: ARGO_MINIO_BROWSER_REDIRECT_URL
            value: '{{minioBrowserRedirectUrl}}'
          - name: ARGO_MINIO_SERVER_URL
            value: '{{minioServerUrl}}'
          - name: ARGO_VAULT_API_ADDR
            value: '{{vaultApiAddr}}'
          - name: ARGO_VAULT_CLUSTER_ADDR
            value: '{{vaultClusterAddr}}'
        {{- end }}
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3