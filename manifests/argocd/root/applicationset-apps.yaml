# ApplicationSet for user applications
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  generators:
  # Matrix generator combines app configs with global defaults
  - matrix:
      generators:
      # First: Get all app configurations
      - git:
          repoURL: https://github.com/fredericrous/homelab.git
          revision: main
          files:
          - path: "manifests/apps/**/app.yaml"
          exclude:
          - path: "manifests/apps/lldap/app.yaml"
          - path: "manifests/apps/harbor/app.yaml"
          - path: "manifests/apps/stremio/app.yaml"
      # Second: Get global configuration
      - git:
          repoURL: https://github.com/fredericrous/homelab.git
          revision: main
          files:
          - path: "manifests/argocd/root/global-config.yaml"
  
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "{{syncWave}}"
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{project}}'
      source:
        repoURL: https://github.com/fredericrous/homelab.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 3