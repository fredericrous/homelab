apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vault-init
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-system
  interval: 10m
  path: ./clusters/homelab/infrastructure/configs/vault-init
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: vault
      namespace: flux-system