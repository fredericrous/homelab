apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-fix-permissions
  namespace: nextcloud
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "5"
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: fix-permissions
        image: bitnami/kubectl:1.28
        command:
        - bash
        - -c
        - |
          echo "🔧 Fixing Nextcloud data directory permissions..."
          
          # Wait a bit for deployment to stabilize
          sleep 10
          
          # Get the Nextcloud pod
          POD=$(kubectl get pod -n nextcloud -l app=nextcloud -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -z "$POD" ]; then
            echo "⚠️  No Nextcloud pod found yet. This is normal during initial deployment."
            exit 0
          fi
          
          # Fix permissions via kubectl exec
          echo "Fixing permissions on pod: $POD"
          kubectl exec -n nextcloud $POD -c nextcloud -- chmod 0770 /var/www/html/data || true
          kubectl exec -n nextcloud $POD -c nextcloud -- chown www-data:www-data /var/www/html/data || true
          kubectl exec -n nextcloud $POD -c nextcloud -- chown -R www-data:www-data /var/www/html/config || true
          kubectl exec -n nextcloud $POD -c nextcloud -- chmod -R 0750 /var/www/html/config || true
          
          echo "✅ Permissions fixed!"
      serviceAccountName: nextcloud