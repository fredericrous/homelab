---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: authelia-tls-secret-manager
  namespace: authelia
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: authelia
  name: authelia-tls-secret-manager
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: ["cert-manager.io"]
  resources: ["certificates"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: istio-ingress
  name: authelia-tls-secret-manager-ingress
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: authelia-tls-secret-manager-cross-namespace
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
  resourceNames: ["client-ca-cert"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authelia-tls-secret-manager
  namespace: authelia
subjects:
- kind: ServiceAccount
  name: authelia-tls-secret-manager
  namespace: authelia
roleRef:
  kind: Role
  name: authelia-tls-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: authelia-tls-secret-manager-ingress
  namespace: istio-ingress
subjects:
- kind: ServiceAccount
  name: authelia-tls-secret-manager
  namespace: authelia
roleRef:
  kind: Role
  name: authelia-tls-secret-manager-ingress
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: authelia-tls-secret-manager-cross-namespace
subjects:
- kind: ServiceAccount
  name: authelia-tls-secret-manager
  namespace: authelia
roleRef:
  kind: ClusterRole
  name: authelia-tls-secret-manager-cross-namespace
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: authelia-tls-secret-manager
  namespace: authelia
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: secret-manager
        image: bitnami/kubectl:1.28
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        command:
        - /bin/sh
        - -c
        - |
          set -e
          
          echo "🔒 FluxCD: Managing Authelia Istio TLS secret for mTLS..."
          
          # Wait for dependencies
          echo "⏳ Waiting for cert-manager certificate..."
          kubectl wait --for=condition=Ready certificate authelia-tls -n authelia --timeout=300s
          
          # Clean up old secrets if they exist
          kubectl delete secret authelia-tls-secret -n authelia --ignore-not-found=true
          kubectl delete secret authelia-tls-secret -n istio-ingress --ignore-not-found=true
          
          # Get required data
          TLS_CRT=$(kubectl get secret authelia-tls -n authelia -o jsonpath='{.data.tls\.crt}' | base64 -d)
          TLS_KEY=$(kubectl get secret authelia-tls -n authelia -o jsonpath='{.data.tls\.key}' | base64 -d)
          CA_CRT=$(kubectl get secret client-ca-cert -n istio-ingress -o jsonpath='{.data.ca\.crt}' | base64 -d)
          
          # Create Istio-compatible TLS secret files
          echo "$TLS_CRT" > /tmp/tls.crt
          echo "$TLS_KEY" > /tmp/tls.key
          CA_CRT_B64=$(echo -n "$CA_CRT" | base64 -w 0)
          
          # Create secret in istio-ingress namespace (where Gateway pod runs)
          kubectl create secret tls authelia-tls-secret -n istio-ingress \
            --cert=/tmp/tls.crt \
            --key=/tmp/tls.key
          
          kubectl patch secret authelia-tls-secret -n istio-ingress \
            --patch="{\"data\":{\"cacert\":\"$CA_CRT_B64\"}}"
          
          kubectl label secret authelia-tls-secret -n istio-ingress \
            istio/tls-secret=true \
            app.kubernetes.io/managed-by=flux
          
          # Also create in authelia namespace for consistency
          kubectl create secret tls authelia-tls-secret -n authelia \
            --cert=/tmp/tls.crt \
            --key=/tmp/tls.key
          
          kubectl patch secret authelia-tls-secret -n authelia \
            --patch="{\"data\":{\"cacert\":\"$CA_CRT_B64\"}}"
          
          kubectl label secret authelia-tls-secret -n authelia \
            istio/tls-secret=true \
            app.kubernetes.io/managed-by=flux
          
          echo "✅ FluxCD: Authelia Istio TLS secret configured successfully"
      serviceAccountName: authelia-tls-secret-manager