apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harbor-registry-tls
  namespace: stremio
spec:
  secretName: harbor-registry-tls
  dnsNames:
  - harbor-registry.harbor.svc.cluster.local
  - harbor-registry.harbor.svc
  - harbor-registry.harbor
  - harbor.harbor.svc.cluster.local
  - harbor-core.harbor.svc.cluster.local
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
---
# Create the CA issuer if it doesn't exist
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-issuer
spec:
  ca:
    secretName: ca-key-pair