apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-cni
  namespace: istio-system
spec:
  interval: 30m
  dependsOn:
  - name: istio-base
  chart:
    spec:
      chart: cni
      version: "1.23.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Ambient mode requires CNI
    cni:
      ambient:
        enabled: true
      # Use Cilium's chaining mode
      chaining: true