apiVersion: batch/v1
kind: Job
metadata:
  name: vault-configure-vso
  namespace: vault-secrets-operator
  annotations:
    argocd.argoproj.io/sync-wave: "5"  # Run after VSO is deployed
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-config
      containers:
      - name: vault-configure
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e

          # Wait for Vault to be ready
          echo "Waiting for Vault to be ready..."
          for i in {1..30}; do
            if kubectl get pod -n vault vault-0 -o jsonpath='{.status.phase}' | grep -q "Running"; then
              echo "Vault is running"
              break
            fi
            echo "Waiting for Vault... ($i/30)"
            sleep 5
          done

          # Get Vault admin token
          export VAULT_TOKEN=$(kubectl get secret -n vault vault-admin-token -o jsonpath='{.data.token}' | base64 -d)
          export VAULT_ADDR=http://vault.vault.svc.cluster.local:8200

          # Install vault CLI
          apt-get update && apt-get install -y curl
          curl -fsSL https://apt.releases.hashicorp.com/gpg | apt-key add -
          apt-get install -y software-properties-common
          apt-add-repository "deb [arch=amd64] https://apt.releases.hashicorp.com $(lsb_release -cs) main"
          apt-get update && apt-get install -y vault

          # Configure Vault for VSO
          echo "Configuring Vault policies for VSO..."

          # Create VSO policy
          vault policy write vso - <<'EOF'
          # Allow VSO to read all secrets
          path "secret/data/*" {
            capabilities = ["read", "list"]
          }
          path "secret/metadata/*" {
            capabilities = ["list", "read"]
          }
          # Allow authentication
          path "auth/kubernetes/login" {
            capabilities = ["create", "update"]
          }
          # Allow to check authentication configuration
          path "auth/kubernetes/role/*" {
            capabilities = ["read", "list"]
          }
          path "sys/auth" {
            capabilities = ["read"]
          }
          EOF

          # Create Kubernetes auth role for VSO
          vault write auth/kubernetes/role/vault-secrets-operator \
            bound_service_account_names=vault-secrets-operator-controller-manager \
            bound_service_account_namespaces=vault-secrets-operator \
            policies=vso \
            ttl=24h

          echo "✅ Vault configured for VSO"
