# Bitnami Harbor values with internal TLS
expose:
  type: proxy
  proxy:
    httpPort: 80
    httpsPort: 443
# External URL
externalURL: http://192.168.1.90

# Enable internal TLS
internalTLS:
  enabled: true
  certSource: auto  # Let Harbor generate its own certificates
  core:
    secretName: harbor-core-tls
  jobservice:
    secretName: harbor-jobservice-tls
  portal:
    secretName: harbor-portal-tls
  registry:
    secretName: harbor-registry-tls
  trivy:
    secretName: harbor-trivy-tls
  exporter:
    secretName: harbor-exporter-tls

# Configure nginx proxy
nginx:
  enabled: true
  tls:
    enabled: false

# Admin password from existing secret
adminPassword: ""
existingAdminPasswordSecret: harbor-admin-secret

# Use external Redis
redis:
  enabled: false
externalRedis:
  host: redis-standalone.ot-operators.svc.cluster.local
  port: 6379

# Persistence
persistence:
  enabled: true
  storageClass: "rook-ceph-block"

# Use external PostgreSQL
postgresql:
  enabled: false

# External database configuration
externalDatabase:
  host: postgres-apps-rw.postgres.svc.cluster.local
  port: 5432
  user: harbor
  password: ""  # Using existingSecret instead
  sslmode: disable
  coreDatabase: core
  existingSecret: harbor-database-secret
  existingSecretPasswordKey: db-password

# Core configuration
core:
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1000m

# Registry configuration
registry:
  replicas: 1
  persistence:
    enabled: true
    storageClass: "rook-ceph-block"
    size: 50Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 2Gi
      cpu: 1000m
  # Registry credentials managed by existingSecret
  existingSecret: harbor-registry-secret

# Jobservice configuration
jobservice:
  replicas: 1
  persistence:
    enabled: true
    storageClass: "rook-ceph-block"
    size: 10Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1000m

# Portal configuration
portal:
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

# Trivy configuration
trivy:
  enabled: true
  replicas: 1
  persistence:
    enabled: true
    storageClass: "rook-ceph-block"
    size: 5Gi

# Metrics
metrics:
  enabled: true

# Velero backup annotations
jobservice:
  podAnnotations:
    backup.velero.io/backup-volumes: job-logs

registry:
  podAnnotations:
    backup.velero.io/backup-volumes: registry-data

trivy:
  podAnnotations:
    backup.velero.io/backup-volumes: data
