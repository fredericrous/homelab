apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plex

resources:
  # App-specific resources
  - namespace.yaml
  - serviceaccount.yaml
  # - vault-connection.yaml  # Now provided by base/vault-auth
  # - job-vault-configure-plex.yaml  # Replaced by job template
  # - vault-setup-job.yaml  # Replaced by job-vault-configure-plex.yaml
  # - plex-vault-auth.yaml  # Now provided by base/vault-auth
  - plex-config-externalsecret.yaml
  # Argo Workflow
  - argo-workflow-rbac.yaml
  - workflow-vault-populate.yaml
  # - job-vault-populate-plex.yaml  # Replaced by workflow-vault-populate.yaml
  - pvc-config.yaml
  - pvc-nfs-media.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

patches:
  # Add backup annotations
  - target:
      kind: Deployment
      name: plex
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: plex
      spec:
        template:
          metadata:
            annotations:
              backup.velero.io/backup-volumes: plex-config
  # Enable GPU support
  - path: patch-gpu-enable.yaml
    target:
      kind: Deployment
      name: plex