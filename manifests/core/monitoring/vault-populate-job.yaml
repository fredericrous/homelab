# Populate monitoring secrets in Vault
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-populate-monitoring
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-auth
      containers:
        - name: populate
          image: vault:1.18.3
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-admin-token
                  key: token
                  optional: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              
              # Wait for Vault
              until vault status 2>/dev/null; do
                echo "Waiting for Vault..."
                sleep 5
              done
              
              # Check if secrets already exist
              echo "🔍 Checking existing monitoring secrets..."
              
              # Grafana admin password
              if ! vault kv get secret/monitoring/grafana >/dev/null 2>&1; then
                echo "📝 Creating Grafana admin password..."
                GRAFANA_PASS=$(openssl rand -base64 32)
                vault kv put secret/monitoring/grafana \
                  admin-user="admin" \
                  admin-password="$GRAFANA_PASS"
                echo "   Generated password: $GRAFANA_PASS"
              else
                echo "✅ Grafana credentials already exist"
              fi
              
              # AlertManager config
              if ! vault kv get secret/monitoring/alertmanager >/dev/null 2>&1; then
                echo "📝 Creating AlertManager config..."
                vault kv put secret/monitoring/alertmanager \
                  slack-api-url="https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK" \
                  smtp-host="smtp.gmail.com:587" \
                  smtp-from="alerts@daddyshome.fr" \
                  smtp-username="your-email@gmail.com" \
                  smtp-password="your-app-password"
              else
                echo "✅ AlertManager config already exists"
              fi
              
              # Loki S3 config (for future object storage)
              if ! vault kv get secret/monitoring/loki >/dev/null 2>&1; then
                echo "📝 Creating Loki S3 config..."
                vault kv put secret/monitoring/loki \
                  s3-endpoint="http://minio.minio.svc.cluster.local:9000" \
                  s3-access-key="loki" \
                  s3-secret-key="$(openssl rand -base64 32)" \
                  s3-bucket="loki"
              else
                echo "✅ Loki config already exists"
              fi
              
              # Prometheus remote write (for long-term storage)
              if ! vault kv get secret/monitoring/prometheus >/dev/null 2>&1; then
                echo "📝 Creating Prometheus remote write config..."
                vault kv put secret/monitoring/prometheus \
                  remote-write-url="http://thanos-receive.monitoring.svc.cluster.local:19291/api/v1/receive" \
                  remote-write-username="prometheus" \
                  remote-write-password="$(openssl rand -base64 32)"
              else
                echo "✅ Prometheus config already exists"
              fi
              
              echo "✅ Monitoring secrets populated in Vault"