{{- if .Values.vault.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app-setup.fullname" . }}-vault-script
  labels:
    {{- include "app-setup.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault-setup
data:
  setup.sh: |
    #!/bin/sh
    set -e
    
    echo "🔐 Setting up Vault secrets for {{ .Values.appName }}..."
    
    # Wait for Vault to be ready
    until vault status | grep -q "Sealed.*false"; do
      echo "Waiting for Vault to be unsealed..."
      sleep 5
    done
    echo "✅ Vault is ready"
    
    # Function to generate secure random string
    generate_secret() {
      head -c 32 /dev/urandom | base64 | tr -d '\n'
    }
    
    # Process secrets
    {{- range .Values.vault.secrets }}
    SECRET_PATH="{{ .path }}"
    
    if vault kv get -mount=secret "$SECRET_PATH" > /dev/null 2>&1; then
      echo "✅ Secret at $SECRET_PATH already exists"
      # Update with any new keys
      {{- range $key, $value := .data }}
      {{- if eq $value "__GENERATE_PASSWORD__" }}
      if ! vault kv get -mount=secret "$SECRET_PATH" -field={{ $key }} > /dev/null 2>&1; then
        vault kv patch -mount=secret "$SECRET_PATH" {{ $key }}=$(generate_secret) || true
      fi
      {{- else if eq $value "__GENERATE_BASE64__" }}
      if ! vault kv get -mount=secret "$SECRET_PATH" -field={{ $key }} > /dev/null 2>&1; then
        vault kv patch -mount=secret "$SECRET_PATH" {{ $key }}=$(generate_secret | base64 | tr -d '\n') || true
      fi
      {{- else }}
      vault kv patch -mount=secret "$SECRET_PATH" {{ $key }}="{{ $value }}" || true
      {{- end }}
      {{- end }}
    else
      echo "📝 Creating secret at $SECRET_PATH"
      vault kv put -mount=secret "$SECRET_PATH" \
        {{- range $key, $value := .data }}
        {{- if eq $value "__GENERATE_PASSWORD__" }}
        {{ $key }}=$(generate_secret) \
        {{- else if eq $value "__GENERATE_BASE64__" }}
        {{ $key }}=$(generate_secret | base64 | tr -d '\n') \
        {{- else }}
        {{ $key }}="{{ $value }}" \
        {{- end }}
        {{- end }}
        placeholder="end"
    fi
    {{- end }}
    
    # Create Vault policy for the app
    echo "📝 Creating {{ .Values.appName }} Vault policy"
    vault policy write {{ .Values.appName }}-policy - <<EOF
    path "secret/data/{{ .Values.appName }}" {
      capabilities = ["read"]
    }
    path "secret/data/{{ .Values.appName }}/*" {
      capabilities = ["read"]
    }
    EOF
    
    # Create Kubernetes auth role
    echo "📝 Creating {{ .Values.appName }} Kubernetes auth role"
    vault write auth/kubernetes/role/{{ .Values.appName }} \
      bound_service_account_names={{ include "app-setup.serviceAccountName" . }} \
      bound_service_account_namespaces={{ .Values.appName }} \
      policies={{ .Values.appName }}-policy \
      ttl=24h
    
    {{- if .Values.vault.customScript }}
    echo "🔧 Running custom vault setup script..."
    {{ .Values.vault.customScript | nindent 4 }}
    {{- end }}
    
    echo "✅ {{ .Values.appName }} Vault setup complete!"
{{- end }}