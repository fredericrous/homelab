# This patch adds ArgoCD sync-wave annotations to ensure proper ordering
# Apply to CephCluster to delay it until after operator is ready
apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "10"  # Deploy after operator
---
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: replicapool
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "15"  # Deploy after cluster
---
apiVersion: ceph.rook.io/v1
kind: CephFilesystem
metadata:
  name: myfs
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "15"  # Deploy after cluster
---
apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: ceph-objectstore
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "15"  # Deploy after cluster