apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: flux-system
spec:
  targetNamespace: metallb-system
  interval: 10m
  chart:
    spec:
      chart: metallb
      version: 0.14.9
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controller:
      resources:
        limits:
          cpu: 100m
          memory: 100Mi
        requests:
          cpu: 25m
          memory: 25Mi
    speaker:
      resources:
        limits:
          cpu: 100m
          memory: 100Mi
        requests:
          cpu: 25m
          memory: 25Mi
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1beta1
              kind: IPAddressPool
              name: primary-pool
            patch: |-
              - op: replace
                path: /spec/addresses/0
                value: "192.168.1.80-192.168.1.89"