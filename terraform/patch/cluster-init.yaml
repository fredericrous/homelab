# Minimal cluster configuration for Cilium
cluster:
  # Allow workloads on control plane
  allowSchedulingOnControlPlanes: true
  network:
    # Disable default CNI - Cilium will be installed via Helm
    cni:
      name: none
  proxy:
    disabled: true
machine:
  # Disable kubespan
  network:
    kubespan:
      enabled: false
