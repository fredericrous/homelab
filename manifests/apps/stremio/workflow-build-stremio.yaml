apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: build-stremio-web
  namespace: stremio
spec:
  entrypoint: build-stremio
  serviceAccountName: argo-workflow
  volumeClaimTemplates:
  - metadata:
      name: workspace
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi
      storageClassName: rook-ceph-block

  volumes:
  - name: docker-config
    secret:
      secretName: harbor-registry-creds

  templates:
  - name: build-stremio
    dag:
      tasks:
      - name: git-clone
        template: git-clone
      - name: check-image-exists
        template: check-image-exists
        dependencies: [git-clone]
      - name: build-and-push
        template: build-and-push
        dependencies: [check-image-exists]
        when: "{{tasks.check-image-exists.outputs.result}} == 'not-found'"

  - name: git-clone
    container:
      image: alpine/git:latest
      command:
      - sh
      - -c
      - |
        cd /workspace
        rm -rf ..?* .[!.]* *
        git clone https://github.com/Stremio/stremio-web.git .
        git checkout development
        ls -la
      volumeMounts:
      - name: workspace
        mountPath: /workspace

  - name: check-image-exists
    container:
      image: alpine:latest
      command:
      - sh
      - -c
      - |
        # Install required tools
        apk add --no-cache curl jq
        
        # Copy docker config
        mkdir -p ~/.docker
        cp /docker-config/.dockerconfigjson ~/.docker/config.json
        
        # Extract credentials
        export HARBOR_USER=$(cat ~/.docker/config.json | jq -r '.auths["harbor-registry.harbor.svc.cluster.local:5000"].username')
        export HARBOR_PASS=$(cat ~/.docker/config.json | jq -r '.auths["harbor-registry.harbor.svc.cluster.local:5000"].password')
        
        # Check if image exists
        echo "Checking if image already exists in Harbor..."
        if curl -f -s -u "$HARBOR_USER:$HARBOR_PASS" \
          "http://harbor-registry.harbor.svc.cluster.local:5000/v2/library/stremio-web/manifests/latest" >/dev/null; then
          echo "Image already exists in Harbor."
          echo "exists" > /tmp/result
        else
          echo "Image not found in Harbor."
          echo "not-found" > /tmp/result
        fi
        
        # Output the result
        cat /tmp/result
      volumeMounts:
      - name: docker-config
        mountPath: /docker-config
        readOnly: true
    outputs:
      parameters:
      - name: result
        valueFrom:
          path: /tmp/result

  - name: build-and-push
    container:
      image: moby/buildkit:latest
      command:
      - sh
      - -c
      - |
        # Copy docker config
        echo "Setting up Docker authentication..."
        mkdir -p ~/.docker
        cp /docker-config/.dockerconfigjson ~/.docker/config.json
        
        # Build and push
        echo "Building and pushing image..."
        buildctl --addr tcp://buildkitd.stremio:1234 build \
          --frontend dockerfile.v0 \
          --local context=/workspace \
          --local dockerfile=/workspace \
          --output type=image,name=harbor-registry.harbor.svc.cluster.local:5000/library/stremio-web:latest,push=true
      volumeMounts:
      - name: workspace
        mountPath: /workspace
      - name: docker-config
        mountPath: /docker-config
        readOnly: true
      env:
      - name: DOCKER_CONFIG
        value: /root/.docker