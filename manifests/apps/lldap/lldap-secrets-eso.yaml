# LLDAP secrets from Vault using External Secrets Operator
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lldap-secrets
  namespace: lldap
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  refreshInterval: 5m
  
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: lldap-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  
  # Fetch all keys from the lldap path in Vault
  dataFrom:
  - extract:
      key: secret/data/lldap