apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envsubst-test
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  source:
    repoURL: https://github.com/fredericrous/homelab
    targetRevision: main
    path: manifests/apps/envsubst-test
    # Force the use of the envsubst plugin
    plugin:
      name: envsubst
  destination:
    server: https://kubernetes.default.svc
    namespace: envsubst-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m