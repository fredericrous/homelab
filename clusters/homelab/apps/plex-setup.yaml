apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex-setup
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  targetNamespace: flux-system
  chart:
    spec:
      chart: ./clusters/homelab/charts/app-setup
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: flux-system
  dependsOn:
    - name: vault
      namespace: flux-system
    - name: external-secrets
      namespace: flux-system
  values:
    appName: plex
    vault:
      secrets:
        - path: plex/config
          data:
            claim: "${PLEX_CLAIM_TOKEN}"
            timezone: "Europe/Paris"
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ConfigMap
              name: plex-vault-script
            patch: |
              - op: replace
                path: /data/setup-vault.sh
                value: |
                  #!/bin/sh
                  set -e
                  
                  echo "Setting up Vault for plex..."
                  
                  # Store secrets in vault
                  vault kv put secret/plex/config \
                    claim="${PLEX_CLAIM_TOKEN}" \
                    timezone="Europe/Paris"
                  
                  echo "Vault setup complete for plex"