apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vault

configMapGenerator:
  - name: vault-init-scripts
    files:
      - init-vault.sh=scripts/init-vault.sh

resources:
  # Include base resources
  # - ../../base/vault-auth  # Temporarily disabled - requires VSO CRDs
  - ../../base/job-templates
  # App-specific resources
  - namespace.yaml
  - vault-config.yaml
  - vault-config-serviceaccount.yaml  # Service account for vault-config jobs
  - vault-storage.yaml
  - vault-service.yaml
  - ingress.yaml
  - rbac-vault-config-role.yaml
  - rbac-vault-secret-manager.yaml
  - job-vault-init.yaml
  - job-vault-unseal.yaml
  - vault-configure-argocd-job.yaml  # Configure Vault for ArgoCD after initialization
  # vault-pvc.yaml is duplicate of vault-storage.yaml

patches:
  - path: patch-velero-backup.yaml
    target:
      kind: StatefulSet
      name: vault
  - path: patch-liveness-probe.yaml
    target:
      kind: StatefulSet
      name: vault
  
  # Customize the secret copier job from template
  # Keep using the original service account name from the template
  - target:
      kind: ServiceAccount
      name: secret-copier
    patch: |-
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: secret-copier
        namespace: vault
  
  - target:
      kind: ClusterRole
      name: PLACEHOLDER-secret-copier
    patch: |-
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: vault-secret-copier
  
  - target:
      kind: ClusterRoleBinding
      name: PLACEHOLDER-secret-copier
    patch: |-
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: vault-secret-copier
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: vault-secret-copier
      subjects:
      - kind: ServiceAccount
        name: secret-copier
        namespace: vault
  
  - target:
      kind: Job
      name: secret-copier
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: secret-copier
        namespace: vault
      spec:
        template:
          spec:
            serviceAccountName: secret-copier
            containers:
            - name: secret-copier
              env:
              - name: SOURCE_SECRET
                value: ovh-credentials
              - name: SOURCE_NAMESPACE
                value: cert-manager
              - name: TARGET_NAMESPACE
                value: vault