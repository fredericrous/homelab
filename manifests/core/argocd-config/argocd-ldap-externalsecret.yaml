apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-ldap-credentials
  namespace: argocd
spec:
  refreshInterval: 30m
  
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  
  target:
    name: argocd-secret
    creationPolicy: Merge  # Merge with existing secret
    deletionPolicy: Retain
    # Only add the specific LDAP password key
    template:
      data:
        dex.ldap.bindPW: '{{ .ldap_bindPW | toString }}'
  
  data:
  - secretKey: ldap_bindPW
    remoteRef:
      key: secret/data/argocd/ldap
      property: dex.ldap.bindPW