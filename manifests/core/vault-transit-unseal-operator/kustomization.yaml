apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vault-transit-unseal-operator

helmCharts:
- name: vault-transit-unseal-operator
  repo: https://fredericrous.github.io/charts
  version: 1.0.5
  releaseName: vault-transit-unseal-operator
  namespace: vault-transit-unseal-operator
  includeCrds: true
  valuesInline:
    # Update to v1.0.9 image
    image:
      tag: "1.0.9"
    
    # Command-line flags configuration
    watchNamespace: ""  # Watch all namespaces
    enableLeaderElection: false  # Single replica, no leader election needed
    maxConcurrentReconciles: 3  # Default value
    
    # Disable webhook for now (not needed for basic functionality)
    webhook:
      enabled: false
    
    # CRDs are now installed by default (crds.install: true)

resources:
- namespace.yaml