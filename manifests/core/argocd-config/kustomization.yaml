apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # External Secrets for ArgoCD
  - argocd-ldap-externalsecret.yaml
  
  # Any other ArgoCD configuration can be added here
  # Examples:
  # - argocd-cm-patch.yaml        # ArgoCD ConfigMap patches
  # - argocd-rbac-cm-patch.yaml   # RBAC configuration
  # - argocd-repositories.yaml    # Repository credentials

# Install the envsubst plugin via Helm
helmCharts:
- name: argocd-envsubst-plugin
  repo: https://fredericrous.github.io/charts
  version: 2.1.0  # v2.1 adds .env file support
  releaseName: argocd-envsubst-plugin
  namespace: argocd
  valuesInline:
    image:
      tag: "2.1.0"
    # The plugin will now load variables from .env files in the repository
    # No need for ConfigMap reference anymore