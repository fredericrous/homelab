apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # External Secrets for ArgoCD
  - argocd-ldap-externalsecret.yaml
  - externalsecret-envsubst-values.yaml  # Fallback for envsubst values
  
  # Any other ArgoCD configuration can be added here
  # Examples:
  # - argocd-cm-patch.yaml        # ArgoCD ConfigMap patches
  # - argocd-rbac-cm-patch.yaml   # RBAC configuration
  # - argocd-repositories.yaml    # Repository credentials

# Install the envsubst plugin via Helm
helmCharts:
- name: argocd-envsubst-plugin
  repo: https://fredericrous.github.io/charts
  version: 3.0.1  # v3.0 adds improved cache handling and strict mode
  releaseName: argocd-envsubst-plugin
  namespace: argocd
  valuesInline:
    image:
      tag: "3.0.1"
    # Mount both ConfigMap and Secret for values
    volumes:
    - name: envsubst-values
      configMap:
        name: argocd-envsubst-values
        optional: true
    - name: envsubst-values-external
      secret:
        secretName: argocd-envsubst-values-external
        optional: true
    volumeMounts:
    - name: envsubst-values
      mountPath: /envsubst-values
      readOnly: true
    - name: envsubst-values-external
      mountPath: /envsubst-values-external
      readOnly: true