apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cert-manager-ovh-credentials
  namespace: flux-system
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: cert-manager-env-config
    template:
      engineVersion: v2
      data:
        CERT_MANAGER_OVH_APPLICATION_KEY: "{{ .applicationKey }}"
        CERT_MANAGER_OVH_APPLICATION_SECRET: "{{ .applicationSecret }}"
        CERT_MANAGER_OVH_CONSUMER_KEY: "{{ .consumerKey }}"
  dataFrom:
    - extract:
        key: secret/ovh-dns