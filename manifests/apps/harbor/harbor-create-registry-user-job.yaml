apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-create-registry-user
  namespace: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  template:
    spec:
      serviceAccountName: vault-config
      restartPolicy: OnFailure
      containers:
      - name: create-user
        image: curlimages/curl:latest
        env:
        - name: HARBOR_URL
          value: "http://harbor-core.harbor.svc.cluster.local"
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: harbor-admin-secret
              key: harborAdminPassword
        - name: REGISTRY_USERNAME
          valueFrom:
            secretKeyRef:
              name: harbor-registry-user-secret
              key: username
        - name: REGISTRY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: harbor-registry-user-secret
              key: password
        command:
        - sh
        - -c
        - |
          set -e
          
          # Wait for Harbor to be ready
          echo "Waiting for Harbor to be ready..."
          until curl -f -s "$HARBOR_URL/api/v2.0/systeminfo" >/dev/null; do
            echo "Waiting for Harbor..."
            sleep 5
          done
          
          # Check if user already exists
          echo "Checking if user $REGISTRY_USERNAME exists..."
          if curl -s -u "admin:$ADMIN_PASSWORD" "$HARBOR_URL/api/v2.0/users?username=$REGISTRY_USERNAME" | grep -q "$REGISTRY_USERNAME"; then
            echo "User $REGISTRY_USERNAME already exists"
            exit 0
          fi
          
          # Create the user
          echo "Creating user $REGISTRY_USERNAME..."
          curl -X POST -u "admin:$ADMIN_PASSWORD" \
            -H "Content-Type: application/json" \
            -d '{
              "username": "'"$REGISTRY_USERNAME"'",
              "password": "'"$REGISTRY_PASSWORD"'",
              "realname": "Registry User",
              "email": "registry@harbor.local"
            }' \
            "$HARBOR_URL/api/v2.0/users"
          
          echo "User created successfully"
          
          # Add user to library project as Developer (role_id: 2)
          echo "Adding user to library project..."
          curl -X POST -u "admin:$ADMIN_PASSWORD" \
            -H "Content-Type: application/json" \
            -d '{
              "role_id": 2,
              "member_user": {
                "username": "'"$REGISTRY_USERNAME"'"
              }
            }' \
            "$HARBOR_URL/api/v2.0/projects/library/members" || echo "User might already be a member"
          
          echo "User configuration completed"