apiVersion: v1
kind: Namespace
metadata:
  name: postgres
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-apps
  namespace: postgres
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-apps
  namespace: postgres
spec:
  instances: 1
  
  # PostgreSQL version
  imageName: ghcr.io/cloudnative-pg/postgresql:16.6
  
  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
  
  # Bootstrap configuration
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: postgres-superuser-secret
      postInitSQL:
        - "CREATE USER harbor WITH PASSWORD 'HarborDB123'"
        - "CREATE DATABASE registry OWNER harbor"
        - "CREATE DATABASE core OWNER harbor"
        - "CREATE DATABASE notary_signer OWNER harbor"
        - "CREATE DATABASE notary_server OWNER harbor"
        - "GRANT ALL PRIVILEGES ON DATABASE registry TO harbor"
        - "GRANT ALL PRIVILEGES ON DATABASE core TO harbor"
        - "GRANT ALL PRIVILEGES ON DATABASE notary_signer TO harbor"
        - "GRANT ALL PRIVILEGES ON DATABASE notary_server TO harbor"
        - "CREATE USER lldap WITH PASSWORD 'lldap-db-password'"
        - "CREATE DATABASE lldap OWNER lldap"
        - "GRANT ALL PRIVILEGES ON DATABASE lldap TO lldap"
        - "CREATE USER authelia WITH PASSWORD 'authelia-db-password'"
        - "CREATE DATABASE authelia OWNER authelia"
        - "GRANT ALL PRIVILEGES ON DATABASE authelia TO authelia"
  
  # Storage configuration
  storage:
    size: 10Gi
    storageClass: rook-ceph-block
  
  # Resources
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 1000m
  
  # Node affinity to run on worker nodes
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node.kubernetes.io/type
            operator: In
            values:
            - worker
