# This creates a copy of vault-admin-token in postgres namespace using Reflector
# The original secret in vault namespace should have the annotation:
# reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "postgres"
apiVersion: v1
kind: Secret
metadata:
  name: vault-admin-token
  namespace: postgres
  annotations:
    reflector.v1.k8s.emberstack.com/reflects: "vault/vault-admin-token"
    argocd.argoproj.io/sync-wave: "-20"  # Create before workflows
type: Opaque