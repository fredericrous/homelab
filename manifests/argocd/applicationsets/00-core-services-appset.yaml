apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-services-apps
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      # Core infrastructure - Deploy first
      - name: rook-ceph
        namespace: rook-ceph
        path: manifests/core/rook-ceph
        syncWave: "1"
      - name: vault
        namespace: vault
        path: manifests/core/vault
        syncWave: "2"
      - name: vault-secrets-operator
        namespace: vault-secrets-operator-system
        path: manifests/core/vault-secrets-operator
        syncWave: "3"
      - name: cert-manager
        namespace: cert-manager
        path: manifests/core/cert-manager
        syncWave: "4"
      - name: cloudnative-pg
        namespace: cnpg-system
        path: manifests/core/cloudnative-pg
        syncWave: "5"
      - name: metallb
        namespace: metallb-system
        path: manifests/core/metallb
        syncWave: "6"
      - name: haproxy
        namespace: haproxy
        path: manifests/core/haproxy
        syncWave: "7"
      - name: csi-driver-nfs
        namespace: default
        path: manifests/core/csi-driver-nfs
        syncWave: "8"
      - name: csi-driver-smb
        namespace: default
        path: manifests/core/csi-driver-smb
        syncWave: "9"
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: '{{syncWave}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/FREDERICGIUSTI/homelab.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m